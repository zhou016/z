<!-- Generated by Trae Work -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>AI 对话</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --surface: #ffffff;
      --surface-2: #f0f4ff;
      --ink: #172033;
      --muted: #6b7280;
      --rule: #d8deea;
      --accent: #3b82f6;
      --accent-2: #7c3aed;
      --danger: #ef4444;
      --success: #16a34a;
      --shadow: 0 18px 45px rgba(15, 23, 42, 0.11);
      --chat-font-size: 17px;
      --radius: 18px;
      --sidebar-width: 302px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      margin: 0;
      background: radial-gradient(circle at top left, rgba(59, 130, 246, 0.14), transparent 34%),
        radial-gradient(circle at bottom right, rgba(124, 58, 237, 0.12), transparent 34%),
        var(--bg);
      color: var(--ink);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Microsoft YaHei", sans-serif;
      overflow: hidden;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
      user-select: none;
    }

    .app {
      height: 100%;
      display: grid;
      grid-template-columns: var(--sidebar-width) minmax(0, 1fr);
      padding: 16px;
      gap: 16px;
    }

    .sidebar,
    .chat {
      background: rgba(255, 255, 255, 0.84);
      border: 1px solid rgba(216, 222, 234, 0.88);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      min-height: 0;
    }

    .sidebar {
      border-radius: 24px;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      overflow-x: hidden;
    }

    .sidebar-head {
      padding: 18px;
      border-bottom: 1px solid var(--rule);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
      font-weight: 800;
      letter-spacing: 0.02em;
    }

    .logo {
      width: 34px;
      height: 34px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      display: grid;
      place-items: center;
      color: #fff;
      font-weight: 900;
    }

    .sidebar-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 14px;
    }

    .sidebar-top .brand {
      margin-bottom: 0;
    }

    .back-btn {
      height: 34px;
      padding: 0 10px;
      border-radius: 12px;
      background: var(--surface-2);
      color: var(--ink);
      font-size: 13px;
      font-weight: 800;
      border: 1px solid var(--rule);
    }

    .new-session {
      width: 100%;
      height: 42px;
      border-radius: 14px;
      background: var(--ink);
      color: #fff;
      font-weight: 700;
    }

    .panel {
      padding: 14px 18px 18px;
      border-bottom: 1px solid var(--rule);
    }

    .panel-title {
      margin: 0 0 10px;
      font-size: 13px;
      color: var(--muted);
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .field {
      display: grid;
      gap: 6px;
      margin-bottom: 10px;
    }

    .field:last-child {
      margin-bottom: 0;
    }

    label {
      font-size: 12px;
      color: var(--muted);
      font-weight: 700;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid var(--rule);
      background: #fff;
      color: var(--ink);
      border-radius: 12px;
      outline: 0;
      transition: border 0.18s, box-shadow 0.18s, background 0.18s;
    }

    input,
    select {
      height: 38px;
      padding: 0 11px;
    }

    textarea {
      resize: none;
      padding: 10px 12px;
      line-height: 1.55;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: rgba(59, 130, 246, 0.76);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.14);
    }

    .row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .row > * {
      min-width: 0;
    }

    .btn {
      min-height: 38px;
      padding: 0 12px;
      border-radius: 12px;
      background: var(--surface-2);
      color: var(--ink);
      font-weight: 800;
      border: 1px solid transparent;
      white-space: nowrap;
    }

    .btn:hover {
      border-color: rgba(59, 130, 246, 0.24);
    }

    .btn.primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #fff;
    }

    .btn.ghost {
      background: transparent;
      border-color: var(--rule);
    }

    .btn.danger {
      color: var(--danger);
      background: rgba(239, 68, 68, 0.08);
    }

    .btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .switch-line {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-top: 10px;
      font-size: 13px;
      color: var(--muted);
      font-weight: 700;
    }

    .switch {
      position: relative;
      width: 45px;
      height: 25px;
    }

    .switch input {
      display: none;
    }

    .switch span {
      position: absolute;
      inset: 0;
      background: #d1d5db;
      border-radius: 99px;
      transition: background 0.18s;
    }

    .switch span::after {
      content: "";
      position: absolute;
      width: 19px;
      height: 19px;
      left: 3px;
      top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.18s;
      box-shadow: 0 2px 8px rgba(15, 23, 42, 0.2);
    }

    .switch input:checked + span {
      background: var(--accent);
    }

    .switch input:checked + span::after {
      transform: translateX(20px);
    }

    .sessions {
      flex: 1;
      overflow: auto;
      padding: 10px;
    }

    .session-item {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      width: 100%;
      text-align: left;
      border-radius: 14px;
      padding: 11px 10px;
      background: transparent;
      color: var(--ink);
    }

    .session-item.active {
      background: var(--surface-2);
    }

    .session-title {
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      font-size: 14px;
      font-weight: 800;
    }

    .session-meta {
      margin-top: 2px;
      font-size: 11px;
      color: var(--muted);
      font-weight: 600;
    }

    .session-delete {
      width: 28px;
      height: 28px;
      border-radius: 10px;
      background: rgba(239, 68, 68, 0.08);
      color: var(--danger);
      display: grid;
      place-items: center;
    }

    .chat {
      border-radius: 24px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    .chat-head {
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 18px 0 20px;
      border-bottom: 1px solid var(--rule);
      gap: 14px;
    }

    .title-area {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .chat-name {
      font-size: 17px;
      font-weight: 900;
      outline: 0;
      border-radius: 9px;
      padding: 3px 5px;
      max-width: min(50vw, 420px);
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .chat-name:focus {
      background: var(--surface-2);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.12);
    }

    .icon-btn {
      width: 36px;
      height: 36px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      background: var(--surface-2);
      color: var(--ink);
      font-weight: 900;
      border: 1px solid transparent;
    }

    .icon-btn:hover {
      border-color: rgba(59, 130, 246, 0.26);
    }

    .head-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .messages {
      flex: 1;
      min-height: 0;
      overflow: auto;
      padding: 22px;
      scroll-behavior: smooth;
    }

    .empty {
      height: 100%;
      display: grid;
      place-items: center;
      color: var(--muted);
      text-align: center;
      padding: 20px;
    }

    .empty-card {
      max-width: 520px;
      background: rgba(255, 255, 255, 0.74);
      border: 1px solid var(--rule);
      border-radius: 24px;
      padding: 28px;
    }

    .empty-card h1 {
      margin: 0 0 10px;
      color: var(--ink);
      font-size: 28px;
    }

    .empty-card p {
      margin: 0;
      line-height: 1.8;
    }

    .msg {
      display: flex;
      margin-bottom: 18px;
    }

    .msg.user {
      justify-content: flex-end;
    }

    .msg.assistant {
      justify-content: flex-start;
    }

    .bubble-wrap {
      max-width: min(78%, 920px);
      display: grid;
      gap: 6px;
    }

    .bubble {
      padding: 13px 15px;
      border-radius: 18px;
      line-height: 1.72;
      font-size: var(--chat-font-size);
      word-break: break-word;
      white-space: pre-wrap;
      border: 1px solid transparent;
    }

    .msg.user .bubble {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #fff;
      border-bottom-right-radius: 6px;
    }

    .msg.assistant .bubble {
      background: #fff;
      color: var(--ink);
      border-color: var(--rule);
      border-bottom-left-radius: 6px;
    }

    .msg-tools {
      display: flex;
      gap: 6px;
      align-items: center;
      color: var(--muted);
      font-size: 12px;
    }

    .msg.user .msg-tools {
      justify-content: flex-end;
    }

    .copy-btn,
    .mini-tool-btn {
      height: 27px;
      padding: 0 9px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.8);
      color: var(--muted);
      border: 1px solid var(--rule);
      font-size: 12px;
      font-weight: 800;
    }

    .chat.wide .messages {
      padding-left: 14px;
      padding-right: 14px;
    }

    .chat.wide .msg,
    .chat.wide .msg.user,
    .chat.wide .msg.assistant {
      justify-content: stretch;
    }

    .chat.wide .bubble-wrap {
      width: 100%;
      max-width: 100%;
    }

    .chat.wide .bubble {
      width: 100%;
      border-radius: 16px;
    }

    .composer {
      padding: 14px 18px calc(14px + env(safe-area-inset-bottom));
      border-top: 1px solid var(--rule);
      background: rgba(255, 255, 255, 0.78);
    }

    .composer-box {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: end;
      max-width: 1180px;
      margin: 0 auto;
    }

    .input-box {
      min-height: 48px;
      max-height: calc(1.55em * 5 + 22px);
      line-height: 1.55;
      overflow-y: hidden;
      font-size: 16px;
      padding-top: 8px;
      padding-bottom: 8px;
    }

    .input-box.scrollable {
      overflow-y: auto;
    }

    .send-btn {
      height: 48px;
      min-width: 86px;
      padding: 0 18px;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #fff;
      font-weight: 900;
      box-shadow: 0 10px 20px rgba(59, 130, 246, 0.24);
    }

    .send-btn.stopping {
      background: linear-gradient(135deg, var(--danger), #b91c1c);
      box-shadow: 0 10px 20px rgba(239, 68, 68, 0.22);
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 28px;
      transform: translateX(-50%) translateY(20px);
      background: rgba(23, 32, 51, 0.94);
      color: #fff;
      padding: 10px 14px;
      border-radius: 12px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.18s, transform 0.18s;
      z-index: 30;
      font-size: 14px;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .status {
      min-height: 18px;
      font-size: 12px;
      color: var(--muted);
      margin-top: 8px;
      line-height: 1.4;
    }

    .status.error {
      color: var(--danger);
    }

    .status.ok {
      color: var(--success);
    }

    .mobile-menu {
      display: none;
    }

    .page-overlay {
      position: fixed;
      inset: 16px;
      z-index: 40;
      display: none;
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid var(--rule);
      border-radius: 24px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      overflow: hidden;
    }

    .page-overlay.open {
      display: flex;
      flex-direction: column;
    }

    .page-head {
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 18px;
      border-bottom: 1px solid var(--rule);
      gap: 12px;
    }

    .page-title {
      font-size: 18px;
      font-weight: 900;
    }

    .page-body {
      flex: 1;
      min-height: 0;
      overflow: auto;
      padding: 18px;
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 14px;
    }

    .manage-card {
      background: #fff;
      border: 1px solid var(--rule);
      border-radius: 18px;
      padding: 14px;
    }

    .manage-card.active {
      border-color: rgba(59, 130, 246, 0.62);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.10);
    }

    .manage-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
      margin-bottom: 10px;
    }

    .manage-name {
      font-weight: 900;
      word-break: break-word;
    }

    .manage-meta {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .manage-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 260px minmax(0, 1fr);
      gap: 12px;
      align-items: start;
    }

    .form-grid textarea {
      min-height: 112px;
    }

    .agent-selector-line {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
    }

    .agent-selector-line select {
      max-width: 360px;
    }

    .memory-input {
      min-height: 112px;
    }

    @media (max-width: 860px) {
      .app {
        grid-template-columns: 1fr;
        padding: 0;
        gap: 0;
      }

      .sidebar {
        position: fixed;
        z-index: 20;
        top: 0;
        left: 0;
        bottom: 0;
        width: min(86vw, 330px);
        border-radius: 0 24px 24px 0;
        transform: translateX(-104%);
        transition: transform 0.22s;
      }

      body.sidebar-open .sidebar {
        transform: translateX(0);
      }

      .chat {
        border-radius: 0;
        border: 0;
        height: 100vh;
      }

      .mobile-menu {
        display: grid;
      }

      .messages {
        padding: 16px 12px;
      }

      .bubble-wrap {
        max-width: 92%;
      }

      .chat-head {
        padding: 0 10px;
      }

      .head-actions {
        gap: 5px;
      }

      .icon-btn {
        width: 34px;
        height: 34px;
      }

      .composer {
        padding-left: 10px;
        padding-right: 10px;
      }

      .send-btn {
        min-width: 66px;
        padding: 0 12px;
      }

      .page-overlay {
        inset: 0;
        border-radius: 0;
        border: 0;
      }

      .page-body {
        padding: 12px;
      }

      .form-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-head">
        <div class="sidebar-top">
          <div class="brand">
            <div class="logo">AI</div>
            <div>AI 对话</div>
          </div>
          <button class="back-btn" id="sidebarBackBtn">返回</button>
        </div>
        <button class="new-session" id="newSessionBtn">新建会话</button>
      </div>

      <section class="panel">
        <p class="panel-title">平台与 Key</p>
        <div class="field">
          <label for="platformSelect">AI 平台</label>
          <select id="platformSelect">
            <option value="deepseek">DeepSeek</option>
            <option value="siliconflow">硅基流动</option>
            <option value="custom">自定义平台</option>
          </select>
        </div>
        <div class="field">
          <label for="baseUrl">平台 URL</label>
          <input id="baseUrl" autocomplete="off" spellcheck="false" placeholder="https://api.example.com/v1" />
        </div>
        <div class="field">
          <label for="apiKey">API Key</label>
          <input id="apiKey" type="password" autocomplete="off" spellcheck="false" placeholder="sk-..." />
        </div>
        <div class="row">
          <button class="btn" id="loadModelsBtn">读取模型</button>
          <button class="btn ghost" id="toggleKeyBtn">显示 Key</button>
        </div>
        <div class="status" id="modelStatus"></div>
      </section>

      <section class="panel">
        <p class="panel-title">模型选择</p>
        <div class="field">
          <label for="modelSelect">方式一：下拉选择</label>
          <select id="modelSelect">
            <option value="">请先读取模型</option>
          </select>
        </div>
        <div class="field">
          <label for="manualModel">方式二：手动输入模型名称</label>
          <input id="manualModel" autocomplete="off" spellcheck="false" placeholder="例如 deepseek-chat" />
        </div>
        <div class="field">
          <label for="contextLimit">聊天上下文记忆条数，留空不限制</label>
          <input id="contextLimit" type="number" min="1" step="1" inputmode="numeric" placeholder="不限制" />
        </div>
        <div class="field">
          <label for="maxTokens">输出 Token 限制，留空不限制</label>
          <input id="maxTokens" type="number" min="1" step="1" inputmode="numeric" placeholder="不限制" />
        </div>
        <div class="switch-line">
          <span>实时感知北京时间</span>
          <label class="switch">
            <input type="checkbox" id="timeAware" checked />
            <span></span>
          </label>
        </div>
        <div class="field" style="margin-top: 10px;">
          <label for="fontSize">对话字体大小：<span id="fontSizeText">17</span> 号</label>
          <input id="fontSize" type="range" min="13" max="24" value="17" />
        </div>
      </section>

      <section class="panel">
        <p class="panel-title">会话设置</p>
        <div class="field">
          <label for="sessionAgentSelect">当前会话智能体</label>
          <select id="sessionAgentSelect">
            <option value="">无智能体</option>
          </select>
        </div>
        <div class="row">
          <button class="btn" id="sidebarAgentManageBtn">智能体设置</button>
        </div>
      </section>

      <div class="sessions" id="sessions"></div>
    </aside>

    <main class="chat" id="chat">
      <header class="chat-head">
        <button class="icon-btn mobile-menu" id="mobileMenuBtn" title="打开设置">☰</button>
        <div class="title-area">
          <div class="chat-name" id="chatName" contenteditable="true" spellcheck="false"></div>
          <button class="icon-btn" id="fixInputBtn" title="修复输入框">↻</button>
        </div>
        <div class="head-actions">
          <button class="icon-btn" id="layoutBtn" title="切换展示模式">▤</button>
          <button class="icon-btn" id="agentManageBtn" title="智能体管理">◎</button>
          <button class="icon-btn" id="sessionManageBtn" title="会话列表">☷</button>
          <button class="icon-btn" id="memoryBtn" title="会话记忆">◇</button>
          <button class="icon-btn" id="clearBtn" title="清空本会话">⌫</button>
        </div>
      </header>

      <section class="messages" id="messages"></section>

      <footer class="composer">
        <div class="composer-box">
          <textarea id="messageInput" class="input-box" rows="1"></textarea>
          <button class="send-btn" id="sendBtn">发送</button>
        </div>
      </footer>
    </main>
  </div>

  <section class="page-overlay" id="sessionPage" aria-hidden="true">
    <div class="page-head">
      <button class="btn ghost" id="sessionPageBack">返回聊天</button>
      <div class="page-title">会话列表</div>
      <button class="btn primary" id="sessionPageNew">新建会话</button>
    </div>
    <div class="page-body" id="sessionPageBody"></div>
  </section>

  <section class="page-overlay" id="agentPage" aria-hidden="true">
    <div class="page-head">
      <button class="btn ghost" id="agentPageBack">返回聊天</button>
      <div class="page-title">智能体管理</div>
      <button class="btn" id="agentNewBtn">新建</button>
    </div>
    <div class="page-body">
      <div class="manage-card">
        <div class="form-grid">
          <div class="field">
            <label for="agentNameInput">智能体名称</label>
            <input id="agentNameInput" autocomplete="off" spellcheck="false" />
          </div>
          <div class="field">
            <label for="agentPromptInput">设定</label>
            <textarea id="agentPromptInput" spellcheck="false"></textarea>
          </div>
        </div>
        <div class="row" style="justify-content: flex-end; margin-top: 10px;">
          <button class="btn ghost" id="agentCancelEditBtn">清空</button>
          <button class="btn primary" id="agentSaveBtn">保存智能体</button>
        </div>
      </div>
      <div id="agentPageBody"></div>
    </div>
  </section>

  <section class="page-overlay" id="memoryPage" aria-hidden="true">
    <div class="page-head">
      <button class="btn ghost" id="memoryPageBack">返回聊天</button>
      <div class="page-title">会话记忆</div>
      <button class="btn primary" id="memoryAddBtn">新增记忆</button>
    </div>
    <div class="page-body">
      <div class="manage-card">
        <div class="field">
          <label for="memoryInput">输入当前会话专属记忆</label>
          <textarea id="memoryInput" class="memory-input" spellcheck="false"></textarea>
        </div>
      </div>
      <div id="memoryPageBody"></div>
    </div>
  </section>

  <div class="toast" id="toast"></div>

  <script>
    (() => {
      const DEFAULTS = {
        deepseek: { name: "DeepSeek", url: "https://api.deepseek.com/v1", model: "deepseek-chat" },
        siliconflow: { name: "硅基流动", url: "https://api.siliconflow.cn/v1", model: "deepseek-ai/DeepSeek-V3" },
        custom: { name: "自定义平台", url: "", model: "" }
      };

      const storeKey = "trae_ai_chat_html_v1";
      const els = {};
      [
        "platformSelect", "baseUrl", "apiKey", "toggleKeyBtn", "loadModelsBtn", "modelSelect", "manualModel",
        "modelStatus", "timeAware", "fontSize", "fontSizeText", "sessionAgentSelect", "sidebarAgentManageBtn",
        "contextLimit", "maxTokens", "sessions", "newSessionBtn", "sidebar", "sidebarBackBtn", "chat",
        "chatName", "fixInputBtn", "layoutBtn", "agentManageBtn", "sessionManageBtn", "memoryBtn", "clearBtn",
        "messages", "messageInput", "sendBtn", "toast", "mobileMenuBtn",
        "sessionPage", "sessionPageBack", "sessionPageNew", "sessionPageBody", "agentPage", "agentPageBack",
        "agentNewBtn", "agentNameInput", "agentPromptInput", "agentCancelEditBtn", "agentSaveBtn", "agentPageBody",
        "memoryPage", "memoryPageBack", "memoryAddBtn", "memoryInput", "memoryPageBody"
      ].forEach(id => { els[id] = document.getElementById(id); });

      let state = loadState();
      let aborter = null;
      let streamingSessionId = null;
      let editingAgentId = "";

      function uid(prefix = "s") {
        return `${prefix}_${Date.now().toString(36)}_${Math.random().toString(36).slice(2, 8)}`;
      }

      function defaultPlatformConfigs() {
        return Object.fromEntries(Object.entries(DEFAULTS).map(([key, value]) => [
          key,
          { baseUrl: value.url, apiKey: "", model: value.model, manualModel: "", models: value.model ? [value.model] : [] }
        ]));
      }

      function loadState() {
        const fallback = {
          config: { platform: "deepseek", timeAware: true, fontSize: 17, wideMode: false, contextLimit: "", maxTokens: "" },
          platformConfigs: defaultPlatformConfigs(),
          agents: [],
          sessions: [],
          activeId: ""
        };
        try {
          const parsed = JSON.parse(localStorage.getItem(storeKey));
          if (!parsed || typeof parsed !== "object") return fallback;
          const next = {
            ...fallback,
            ...parsed,
            config: { ...fallback.config, ...(parsed.config || {}) },
            platformConfigs: { ...fallback.platformConfigs, ...(parsed.platformConfigs || {}) },
            agents: Array.isArray(parsed.agents) ? parsed.agents : [],
            sessions: Array.isArray(parsed.sessions) ? parsed.sessions : []
          };
          migrateOldConfig(next, parsed);
          migrateLegacyAgents(next);
          next.sessions.forEach(s => {
            if (!Array.isArray(s.memories)) s.memories = [];
            if (!("agentId" in s)) s.agentId = "";
          });
          return next;
        } catch {
          return fallback;
        }
      }

      function migrateOldConfig(next, parsed) {
        const old = parsed.config || {};
        if (old.baseUrl || old.apiKey || old.model || old.manualModel) {
          const platform = old.platform || next.config.platform || "deepseek";
          next.platformConfigs[platform] = {
            ...(next.platformConfigs[platform] || {}),
            baseUrl: old.baseUrl || DEFAULTS[platform]?.url || "",
            apiKey: old.apiKey || "",
            model: old.model || DEFAULTS[platform]?.model || "",
            manualModel: old.manualModel || "",
            models: old.model ? [old.model] : []
          };
        }
        delete next.config.baseUrl;
        delete next.config.apiKey;
        delete next.config.model;
        delete next.config.manualModel;
      }

      function migrateLegacyAgents(next) {
        next.sessions.forEach(session => {
          if (session.agent && !session.agentId) {
            let agent = next.agents.find(item => item.prompt === session.agent);
            if (!agent) {
              agent = { id: uid("a"), name: `历史智能体-${(session.title || "会话").slice(0, 8)}`, prompt: session.agent, createdAt: Date.now(), updatedAt: Date.now() };
              next.agents.push(agent);
            }
            session.agentId = agent.id;
            delete session.agent;
          }
        });
      }

      function saveState() {
        localStorage.setItem(storeKey, JSON.stringify(state));
      }

      function activePlatformConfig() {
        const key = state.config.platform || "deepseek";
        if (!state.platformConfigs[key]) state.platformConfigs[key] = { baseUrl: DEFAULTS[key]?.url || "", apiKey: "", model: DEFAULTS[key]?.model || "", manualModel: "", models: [] };
        return state.platformConfigs[key];
      }

      function sanitizePositive(value) {
        const text = String(value || "").trim();
        if (!text) return "";
        const num = Number(text);
        return Number.isInteger(num) && num > 0 ? String(num) : "";
      }

      function nowLabel(ts = Date.now()) {
        return new Date(ts).toLocaleString("zh-CN", { month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit" });
      }

      function getBeijingTimeText() {
        const parts = new Intl.DateTimeFormat("zh-CN", {
          timeZone: "Asia/Shanghai", year: "numeric", month: "2-digit", day: "2-digit", weekday: "long",
          hour: "2-digit", minute: "2-digit", second: "2-digit", hour12: false
        }).formatToParts(new Date());
        const map = Object.fromEntries(parts.map(p => [p.type, p.value]));
        return `${map.year}年${map.month}月${map.day}日，${map.weekday}，${map.hour}:${map.minute}:${map.second}`;
      }

      function normalizeBaseUrl(url) {
        return (url || "").trim().replace(/\/+$/, "");
      }

      function makeEndpoint(kind) {
        const base = normalizeBaseUrl(activePlatformConfig().baseUrl);
        if (!base) return "";
        if (kind === "models") return base.endsWith("/models") ? base : `${base}/models`;
        if (base.endsWith("/chat/completions")) return base;
        return `${base}/chat/completions`;
      }

      function currentSession() {
        let session = state.sessions.find(s => s.id === state.activeId);
        if (!session) session = createSession("", false);
        if (!Array.isArray(session.memories)) session.memories = [];
        return session;
      }

      function getAgent(agentId) {
        return state.agents.find(agent => agent.id === agentId) || null;
      }

      function currentAgent() {
        return getAgent(currentSession().agentId);
      }

      function createSession(agentId = "", shouldRender = true) {
        const session = { id: uid("s"), title: "新会话", agentId, memories: [], messages: [], createdAt: Date.now(), updatedAt: Date.now() };
        state.sessions.unshift(session);
        state.activeId = session.id;
        saveState();
        if (shouldRender) renderAll();
        return session;
      }

      function deleteSession(id) {
        if (aborter && streamingSessionId === id) aborter.abort();
        state.sessions = state.sessions.filter(s => s.id !== id);
        if (state.activeId === id) state.activeId = state.sessions[0]?.id || "";
        if (!state.activeId) createSession("", false);
        saveState();
        renderAll();
        if (els.sessionPage.classList.contains("open")) renderSessionPage();
      }

      function toast(text) {
        els.toast.textContent = text;
        els.toast.classList.add("show");
        clearTimeout(toast._timer);
        toast._timer = setTimeout(() => els.toast.classList.remove("show"), 1800);
      }

      function setStatus(text, type = "") {
        els.modelStatus.textContent = text || "";
        els.modelStatus.className = "status" + (type ? ` ${type}` : "");
      }

      function autoResizeInput() {
        const input = els.messageInput;
        input.style.height = "48px";
        const lineHeight = parseFloat(getComputedStyle(input).lineHeight);
        const maxHeight = lineHeight * 5 + 16;
        const newHeight = Math.max(48, Math.min(input.scrollHeight, maxHeight));
        input.style.height = `${newHeight}px`;
        input.classList.toggle("scrollable", input.scrollHeight > maxHeight + 1);
      }

      function stripMarkdown(text) {
        let out = String(text || "");
        out = out.replace(/\r\n/g, "\n");
        out = out.replace(/```[\s\S]*?```/g, block => block.replace(/```[a-zA-Z0-9_-]*\n?/g, "").replace(/```/g, ""));
        out = out.replace(/`([^`]+)`/g, "$1");
        out = out.replace(/!\[([^\]]*)\]\([^)]+\)/g, "$1");
        out = out.replace(/\[([^\]]+)\]\([^)]+\)/g, "$1");
        out = out.replace(/^\s{0,3}#{1,6}\s*/gm, "");
        out = out.replace(/^\s{0,3}>\s?/gm, "");
        out = out.replace(/^\s*[-*_]{3,}\s*$/gm, "");
        out = out.replace(/\*\*([^*]+)\*\*/g, "$1");
        out = out.replace(/__([^_]+)__/g, "$1");
        out = out.replace(/\*([^*\n]+)\*/g, "$1");
        out = out.replace(/_([^_\n]+)_/g, "$1");
        out = out.replace(/~~([^~]+)~~/g, "$1");
        out = out.replace(/[◆●■▶►✓✔★☆]/g, "");
        out = out.replace(/[ \t]+\n/g, "\n");
        out = out.replace(/\n\s*\n+/g, "\n");
        return out.trim();
      }

      function paragraphText(text) {
        const clean = stripMarkdown(text);
        return clean
          .replace(/([。！？!?])([^\n])/g, "$1\n$2")
          .split("\n")
          .map(line => line.trim())
          .filter(Boolean)
          .join("\n");
      }

      function escapeHtml(text) {
        return String(text || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
      }

      function renderAll() {
        renderConfig();
        renderAgentSelect();
        renderSessions();
        renderChat();
      }

      function renderConfig() {
        const pc = activePlatformConfig();
        els.platformSelect.value = state.config.platform;
        els.baseUrl.value = pc.baseUrl || "";
        els.apiKey.value = pc.apiKey || "";
        els.manualModel.value = pc.manualModel || "";
        els.timeAware.checked = !!state.config.timeAware;
        els.fontSize.value = state.config.fontSize;
        els.fontSizeText.textContent = state.config.fontSize;
        els.contextLimit.value = state.config.contextLimit || "";
        els.maxTokens.value = state.config.maxTokens || "";
        document.documentElement.style.setProperty("--chat-font-size", `${state.config.fontSize}px`);
        els.chat.classList.toggle("wide", !!state.config.wideMode);
        els.layoutBtn.textContent = state.config.wideMode ? "▥" : "▤";
        setModelOptions(pc.models?.length ? pc.models.map(id => ({ id })) : (pc.model ? [{ id: pc.model }] : []), pc.model, false);
      }

      function renderAgentSelect() {
        fillAgentSelect(els.sessionAgentSelect, currentSession().agentId);
      }

      function renderSessions() {
        els.sessions.innerHTML = "";
        state.sessions.forEach(session => {
          const agent = getAgent(session.agentId);
          const item = document.createElement("button");
          item.className = "session-item" + (session.id === state.activeId ? " active" : "");
          item.type = "button";
          item.innerHTML = `
            <div>
              <div class="session-title">${escapeHtml(session.title || "新会话")}</div>
              <div class="session-meta">${session.messages.length} 条 · ${agent ? escapeHtml(agent.name) : "无智能体"} · ${session.memories?.length || 0} 记忆 · ${nowLabel(session.updatedAt)}</div>
            </div>
            <span class="session-delete" title="删除">×</span>
          `;
          item.addEventListener("click", e => {
            if (e.target.classList.contains("session-delete")) {
              e.stopPropagation();
              deleteSession(session.id);
              return;
            }
            switchSession(session.id);
            document.body.classList.remove("sidebar-open");
          });
          els.sessions.appendChild(item);
        });
      }

      function switchSession(id) {
        state.activeId = id;
        saveState();
        renderAll();
        closePages();
      }

      function renderChat() {
        const session = currentSession();
        const agent = currentAgent();
        els.chatName.textContent = session.title || "新会话";
        els.chatName.title = agent ? `当前智能体：${agent.name}` : "当前无智能体";
        els.messages.innerHTML = "";
        if (!session.messages.length) {
          const empty = document.createElement("div");
          empty.className = "empty";
          empty.innerHTML = `
            <div class="empty-card">
              <h1>开始新的 AI 对话</h1>
              <p>可在左侧选择智能体、设置上下文条数和 Token 限制，也可以上传文本文件让 AI 解读。</p>
            </div>
          `;
          els.messages.appendChild(empty);
          return;
        }
        session.messages.forEach((msg, index) => renderMessage(msg, index));
        scrollToBottom();
      }

      function clearEmptyState() {
        const empty = els.messages.querySelector(".empty");
        if (empty) empty.remove();
      }

      function messageDisplayText(msg) {
        if (msg.role === "assistant") return paragraphText(msg.content);
        const names = (msg.files || []).map(file => `附件：${file.name}`).join("\n");
        return [msg.userText || msg.content, names].filter(Boolean).join("\n\n");
      }

      function renderMessage(msg, index) {
        clearEmptyState();
        const node = document.createElement("article");
        node.className = `msg ${msg.role === "user" ? "user" : "assistant"}`;
        node.dataset.index = String(index);
        const tools = msg.role === "assistant"
          ? `<button class="copy-btn" type="button">复制</button><button class="mini-tool-btn" type="button" data-act="regen" title="重新生成">↻</button>`
          : `<button class="copy-btn" type="button">复制</button><button class="mini-tool-btn" type="button" data-act="edit" title="编辑">✎</button>`;
        node.innerHTML = `
          <div class="bubble-wrap">
            <div class="bubble">${escapeHtml(messageDisplayText(msg))}</div>
            <div class="msg-tools">
              ${tools}
              <span>${msg.role === "user" ? "你" : "AI"} · ${nowLabel(msg.time || Date.now())}</span>
            </div>
          </div>
        `;
        node.querySelector(".copy-btn").addEventListener("click", async () => {
          await navigator.clipboard.writeText(node.querySelector(".bubble")?.textContent || "");
          toast("已复制");
        });
        node.querySelector("[data-act]")?.addEventListener("click", () => {
          if (msg.role === "assistant") regenerateFrom(index);
          else editUserMessage(index);
        });
        els.messages.appendChild(node);
        scrollToBottom();
        return node;
      }

      function updateLastAssistant(text) {
        const session = state.sessions.find(s => s.id === streamingSessionId) || currentSession();
        const idx = session.messages.length - 1;
        const node = els.messages.querySelector(`.msg[data-index="${idx}"] .bubble`);
        if (node) node.textContent = paragraphText(text);
        else renderChat();
        scrollToBottom();
      }

      function scrollToBottom() {
        requestAnimationFrame(() => { els.messages.scrollTop = els.messages.scrollHeight; });
      }

      function setModelOptions(models, selected = "", replace = true) {
        const unique = Array.from(new Set((models || []).map(m => m.id || m.name || m).filter(Boolean))).sort();
        els.modelSelect.innerHTML = "";
        if (!unique.length) {
          els.modelSelect.innerHTML = `<option value="">请先读取模型</option>`;
          return;
        }
        unique.forEach(id => {
          const opt = document.createElement("option");
          opt.value = id;
          opt.textContent = id;
          els.modelSelect.appendChild(opt);
        });
        const value = selected || unique[0];
        els.modelSelect.value = unique.includes(value) ? value : unique[0];
        if (replace) {
          const pc = activePlatformConfig();
          pc.model = els.modelSelect.value;
          if (!pc.models.includes(pc.model)) pc.models.push(pc.model);
          saveState();
        }
      }

      async function loadModels() {
        const url = makeEndpoint("models");
        const pc = activePlatformConfig();
        const key = pc.apiKey.trim();
        if (!url || !key) {
          setStatus("请先填写当前平台 URL 和 Key。", "error");
          return;
        }
        setStatus("正在读取当前平台模型...");
        els.loadModelsBtn.disabled = true;
        try {
          const res = await fetch(url, { method: "GET", headers: { Authorization: `Bearer ${key}`, Accept: "application/json" } });
          if (!res.ok) throw new Error(`读取失败：HTTP ${res.status}`);
          const json = await res.json();
          const models = Array.isArray(json.data) ? json.data : Array.isArray(json.models) ? json.models : [];
          pc.models = Array.from(new Set(models.map(m => m.id || m.name || m).filter(Boolean)));
          pc.model = pc.models.includes(pc.model) ? pc.model : (pc.models[0] || pc.model || "");
          setModelOptions(pc.models.map(id => ({ id })), pc.model);
          setStatus(`当前平台已读取 ${pc.models.length} 个模型。`, "ok");
          saveState();
        } catch (err) {
          setStatus(`${err.message || err}。如浏览器提示 CORS，请改用支持浏览器跨域的代理或本地后端转发。`, "error");
        } finally {
          els.loadModelsBtn.disabled = false;
        }
      }

      function buildMessagesForApi(session) {
        const systemParts = [];
        const agent = getAgent(session.agentId);
        if (state.config.timeAware) systemParts.push(`当前北京时间：${getBeijingTimeText()}。回答涉及当前日期、星期、时间时，必须以此为准。`);
        if (agent?.prompt?.trim()) {
          systemParts.push(`当前必须扮演的智能体名称：${agent.name}`);
          systemParts.push(`当前智能体设定，必须严格遵守，不得忽略、不得弱化、不得跳出角色：\n${agent.prompt.trim()}`);
          systemParts.push("角色扮演要求：你必须始终以该智能体的身份、名字、语气、立场、关系和行为方式与用户对话；保持沉浸式体验，不要声明自己是 AI、模型、助手或系统；不要解释你在遵守设定；除非用户明确要求修改角色，否则不得改变角色设定。");
        }
        if (session.memories?.length) systemParts.push(`本会话专属记忆：\n${session.memories.map((m, i) => `${i + 1}. ${m.text}`).join("\n")}`);
        systemParts.push("输出必须为纯文本，自动去除 Markdown 标记和多余特殊符号；保留正文中自然出现的连字符 -；可以按段落换行，但禁止出现空行。");

        let history = session.messages.filter((m, i, arr) => !(i === arr.length - 1 && m.role === "assistant" && !m.content));
        const limit = Number(state.config.contextLimit || 0);
        if (Number.isInteger(limit) && limit > 0) history = history.slice(-limit);
        return [
          { role: "system", content: systemParts.join("\n\n") },
          ...history.filter(m => m.role === "user" || m.role === "assistant").map(m => ({ role: m.role, content: m.content }))
        ];
      }

      function buildRequestBody(session) {
        const pc = activePlatformConfig();
        const model = (pc.manualModel || pc.model || "").trim();
        const body = { model, messages: buildMessagesForApi(session), stream: true };
        const max = Number(state.config.maxTokens || 0);
        if (Number.isInteger(max) && max > 0) body.max_tokens = max;
        return body;
      }

      async function sendMessage() {
        if (aborter) {
          aborter.abort();
          return;
        }
        const text = els.messageInput.value.trim();
        if (!text) return;
        const pc = activePlatformConfig();
        const model = (pc.manualModel || pc.model || "").trim();
        const url = makeEndpoint("chat");
        const key = pc.apiKey.trim();
        if (!url || !key || !model) {
          toast("请先配置当前平台 URL、Key 和模型");
          return;
        }

        const session = currentSession();
        const userMsg = { role: "user", userText: text, content: text, time: Date.now() };
        const wasEmpty = session.messages.length === 0;
        session.messages.push(userMsg);
        if (session.title === "新会话") session.title = text.slice(0, 24).replace(/\s+/g, " ") || "新会话";
        session.updatedAt = Date.now();
        els.chatName.textContent = session.title;
        els.messageInput.value = "";
        autoResizeInput();
        saveState();
        if (wasEmpty) clearEmptyState();
        renderMessage(userMsg, session.messages.length - 1);

        const assistantMsg = { role: "assistant", content: "", time: Date.now() };
        session.messages.push(assistantMsg);
        renderMessage(assistantMsg, session.messages.length - 1);
        saveState();
        renderSessions();
        await performAssistantRequest(session.id);
      }

      async function performAssistantRequest(sessionId) {
        const session = state.sessions.find(s => s.id === sessionId);
        const pc = activePlatformConfig();
        const url = makeEndpoint("chat");
        const key = pc.apiKey.trim();
        if (!session) return;
        aborter = new AbortController();
        streamingSessionId = session.id;
        els.sendBtn.disabled = false;
        els.sendBtn.textContent = "停止";
        els.sendBtn.classList.add("stopping");
        try {
          const res = await fetch(url, {
            method: "POST",
            signal: aborter.signal,
            headers: { "Content-Type": "application/json", Authorization: `Bearer ${key}` },
            body: JSON.stringify(buildRequestBody(session))
          });
          if (!res.ok) {
            const errText = await res.text().catch(() => "");
            throw new Error(`请求失败：HTTP ${res.status}${errText ? "，" + errText.slice(0, 180) : ""}`);
          }
          if (!res.body) throw new Error("当前浏览器不支持流式读取。");
          await readStream(res.body, chunk => {
            const active = state.sessions.find(s => s.id === streamingSessionId);
            if (!active) return;
            const last = active.messages[active.messages.length - 1];
            last.content = paragraphText((last.content || "") + chunk);
            last.time = Date.now();
            active.updatedAt = Date.now();
            updateLastAssistant(last.content);
            saveState();
          });
        } catch (err) {
          const active = state.sessions.find(s => s.id === streamingSessionId);
          if (active) {
            const last = active.messages[active.messages.length - 1];
            if (!last.content) last.content = err.name === "AbortError" ? "已停止生成。" : `出错了：${err.message || err}`;
            else if (err.name === "AbortError") last.content += "\n\n已停止生成。";
            last.content = paragraphText(last.content);
            updateLastAssistant(last.content);
            saveState();
          }
        } finally {
          aborter = null;
          streamingSessionId = null;
          els.sendBtn.disabled = false;
          els.sendBtn.textContent = "发送";
          els.sendBtn.classList.remove("stopping");
          renderSessions();
          if (els.sessionPage.classList.contains("open")) renderSessionPage();
        }
      }

      async function readStream(body, onDelta) {
        const reader = body.getReader();
        const decoder = new TextDecoder("utf-8");
        let buffer = "";
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split("\n");
          buffer = lines.pop() || "";
          for (const line of lines) {
            const trimmed = line.trim();
            if (!trimmed || !trimmed.startsWith("data:")) continue;
            const data = trimmed.slice(5).trim();
            if (data === "[DONE]") return;
            try {
              const json = JSON.parse(data);
              const delta = json.choices?.[0]?.delta?.content ?? json.choices?.[0]?.message?.content ?? "";
              if (delta) onDelta(delta);
            } catch {}
          }
        }
      }

      function regenerateFrom(index) {
        const session = currentSession();
        if (aborter || !session.messages[index] || session.messages[index].role !== "assistant") return;
        session.messages = session.messages.slice(0, index);
        session.messages.push({ role: "assistant", content: "", time: Date.now() });
        session.updatedAt = Date.now();
        saveState();
        renderChat();
        renderSessions();
        performAssistantRequest(session.id);
      }

      function editUserMessage(index) {
        const session = currentSession();
        const msg = session.messages[index];
        if (!msg || msg.role !== "user" || aborter) return;
        els.messageInput.value = msg.userText || msg.content || "";
        session.messages = session.messages.slice(0, index);
        session.updatedAt = Date.now();
        saveState();
        renderChat();
        renderSessions();
        autoResizeInput();
        els.messageInput.focus();
      }

      function openPage(page) {
        closePages();
        page.classList.add("open");
        page.setAttribute("aria-hidden", "false");
      }

      function closePages() {
        [els.sessionPage, els.agentPage, els.memoryPage].forEach(page => {
          page.classList.remove("open");
          page.setAttribute("aria-hidden", "true");
        });
      }

      function fillAgentSelect(select, selected = "") {
        select.innerHTML = `<option value="">无智能体</option>`;
        state.agents.forEach(agent => {
          const opt = document.createElement("option");
          opt.value = agent.id;
          opt.textContent = agent.name;
          select.appendChild(opt);
        });
        select.value = selected || "";
      }

      function openSessionPage() {
        renderSessionPage();
        openPage(els.sessionPage);
      }

      function renderSessionPage() {
        els.sessionPageBody.innerHTML = "";
        state.sessions.forEach(session => {
          const agent = getAgent(session.agentId);
          const card = document.createElement("div");
          card.className = "manage-card" + (session.id === state.activeId ? " active" : "");
          card.innerHTML = `
            <div class="manage-top">
              <div>
                <div class="manage-name">${escapeHtml(session.title || "新会话")}</div>
                <div class="manage-meta">${session.messages.length} 条消息 · ${agent ? `智能体：${escapeHtml(agent.name)}` : "无智能体"} · ${session.memories?.length || 0} 条记忆 · ${nowLabel(session.updatedAt)}</div>
              </div>
              <div class="manage-actions">
                <button class="btn primary" data-act="open">进入</button>
                <button class="btn danger" data-act="delete">删除</button>
              </div>
            </div>
            <div class="field">
              <label>会话名称</label>
              <input data-role="title" value="${escapeHtml(session.title || "新会话")}" />
            </div>
            <div class="agent-selector-line">
              <label>绑定智能体</label>
              <select data-role="agent"></select>
            </div>
          `;
          const titleInput = card.querySelector('[data-role="title"]');
          const agentSelect = card.querySelector('[data-role="agent"]');
          fillAgentSelect(agentSelect, session.agentId);
          titleInput.addEventListener("input", () => {
            session.title = titleInput.value.trim() || "新会话";
            session.updatedAt = Date.now();
            saveState();
            renderSessions();
            if (session.id === state.activeId) els.chatName.textContent = session.title;
          });
          agentSelect.addEventListener("change", () => {
            session.agentId = agentSelect.value;
            session.updatedAt = Date.now();
            saveState();
            renderAgentSelect();
            renderSessions();
            renderSessionPage();
            if (session.id === state.activeId) renderChat();
          });
          card.addEventListener("click", e => {
            const act = e.target.dataset.act;
            if (act === "open") switchSession(session.id);
            if (act === "delete") deleteSession(session.id);
          });
          els.sessionPageBody.appendChild(card);
        });
      }

      function openAgentPage() {
        renderAgentPage();
        openPage(els.agentPage);
      }

      function resetAgentForm() {
        editingAgentId = "";
        els.agentNameInput.value = "";
        els.agentPromptInput.value = "";
        els.agentSaveBtn.textContent = "保存智能体";
      }

      function saveAgent() {
        const name = els.agentNameInput.value.trim();
        const prompt = els.agentPromptInput.value.trim();
        if (!name || !prompt) {
          toast("请填写智能体名称和设定");
          return;
        }
        if (editingAgentId) {
          const agent = getAgent(editingAgentId);
          if (agent) Object.assign(agent, { name, prompt, updatedAt: Date.now() });
        } else {
          state.agents.unshift({ id: uid("a"), name, prompt, createdAt: Date.now(), updatedAt: Date.now() });
        }
        saveState();
        resetAgentForm();
        renderAgentPage();
        renderAgentSelect();
        renderSessions();
        if (els.sessionPage.classList.contains("open")) renderSessionPage();
      }

      function renderAgentPage() {
        els.agentPageBody.innerHTML = "";
        if (!state.agents.length) {
          els.agentPageBody.innerHTML = `<div class="manage-card"><div class="manage-name">暂无智能体</div><div class="manage-meta">填写上方名称和设定后保存，即可让多个会话共用同一个智能体。</div></div>`;
          return;
        }
        state.agents.forEach(agent => {
          const usedCount = state.sessions.filter(s => s.agentId === agent.id).length;
          const card = document.createElement("div");
          card.className = "manage-card";
          card.innerHTML = `
            <div class="manage-top">
              <div>
                <div class="manage-name">${escapeHtml(agent.name)}</div>
                <div class="manage-meta">${usedCount} 个会话正在使用 · 更新于 ${nowLabel(agent.updatedAt || agent.createdAt)}</div>
              </div>
              <div class="manage-actions">
                <button class="btn primary" data-act="use">用于当前会话</button>
                <button class="btn" data-act="edit">编辑</button>
                <button class="btn danger" data-act="delete">删除</button>
              </div>
            </div>
            <div class="manage-meta">${escapeHtml(agent.prompt).slice(0, 220)}${agent.prompt.length > 220 ? "..." : ""}</div>
          `;
          card.addEventListener("click", e => {
            const act = e.target.dataset.act;
            if (!act) return;
            if (act === "use") {
              const session = currentSession();
              session.agentId = agent.id;
              session.updatedAt = Date.now();
              saveState();
              renderAgentSelect();
              renderSessions();
              renderChat();
              toast("已绑定到当前会话");
            }
            if (act === "edit") {
              editingAgentId = agent.id;
              els.agentNameInput.value = agent.name;
              els.agentPromptInput.value = agent.prompt;
              els.agentSaveBtn.textContent = "保存修改";
              els.agentNameInput.focus();
            }
            if (act === "delete") {
              state.sessions.forEach(session => { if (session.agentId === agent.id) session.agentId = ""; });
              state.agents = state.agents.filter(item => item.id !== agent.id);
              if (editingAgentId === agent.id) resetAgentForm();
              saveState();
              renderAgentPage();
              renderAgentSelect();
              renderSessions();
              renderChat();
              if (els.sessionPage.classList.contains("open")) renderSessionPage();
            }
          });
          els.agentPageBody.appendChild(card);
        });
      }

      function openMemoryPage() {
        renderMemoryPage();
        openPage(els.memoryPage);
      }

      function renderMemoryPage() {
        const session = currentSession();
        els.memoryPageBody.innerHTML = "";
        if (!session.memories.length) {
          els.memoryPageBody.innerHTML = `<div class="manage-card"><div class="manage-name">暂无记忆</div><div class="manage-meta">这里的记忆只属于当前会话，不会进入其他会话。</div></div>`;
          return;
        }
        session.memories.forEach((memory, index) => {
          const card = document.createElement("div");
          card.className = "manage-card";
          card.innerHTML = `
            <div class="manage-top">
              <div>
                <div class="manage-name">记忆 ${index + 1}</div>
                <div class="manage-meta">${nowLabel(memory.time)}</div>
              </div>
              <div class="manage-actions">
                <button class="btn danger" data-act="delete">删除</button>
              </div>
            </div>
            <div>${escapeHtml(memory.text)}</div>
          `;
          card.querySelector("[data-act='delete']").addEventListener("click", () => {
            session.memories.splice(index, 1);
            session.updatedAt = Date.now();
            saveState();
            renderMemoryPage();
            renderSessions();
          });
          els.memoryPageBody.appendChild(card);
        });
      }

      function addMemory() {
        const text = els.memoryInput.value.trim();
        if (!text) {
          toast("请输入记忆内容");
          return;
        }
        const session = currentSession();
        session.memories.unshift({ text, time: Date.now() });
        session.updatedAt = Date.now();
        els.memoryInput.value = "";
        saveState();
        renderMemoryPage();
        renderSessions();
        toast("已新增到当前会话记忆");
      }

      function bindEvents() {
        els.platformSelect.addEventListener("change", () => {
          state.config.platform = els.platformSelect.value;
          saveState();
          renderConfig();
          setStatus("");
        });
        els.baseUrl.addEventListener("input", () => { activePlatformConfig().baseUrl = els.baseUrl.value.trim(); saveState(); });
        els.apiKey.addEventListener("input", () => { activePlatformConfig().apiKey = els.apiKey.value.trim(); saveState(); });
        els.toggleKeyBtn.addEventListener("click", () => {
          const visible = els.apiKey.type === "text";
          els.apiKey.type = visible ? "password" : "text";
          els.toggleKeyBtn.textContent = visible ? "显示 Key" : "隐藏 Key";
        });
        els.loadModelsBtn.addEventListener("click", loadModels);
        els.modelSelect.addEventListener("change", () => {
          const pc = activePlatformConfig();
          pc.model = els.modelSelect.value;
          if (pc.model && !pc.models.includes(pc.model)) pc.models.push(pc.model);
          saveState();
        });
        els.manualModel.addEventListener("input", () => { activePlatformConfig().manualModel = els.manualModel.value.trim(); saveState(); });
        els.timeAware.addEventListener("change", () => { state.config.timeAware = els.timeAware.checked; saveState(); });
        els.fontSize.addEventListener("input", () => { state.config.fontSize = els.fontSize.value; saveState(); renderConfig(); });
        els.contextLimit.addEventListener("input", () => { state.config.contextLimit = sanitizePositive(els.contextLimit.value); if (els.contextLimit.value && !state.config.contextLimit) els.contextLimit.value = ""; saveState(); });
        els.maxTokens.addEventListener("input", () => { state.config.maxTokens = sanitizePositive(els.maxTokens.value); if (els.maxTokens.value && !state.config.maxTokens) els.maxTokens.value = ""; saveState(); });
        els.sessionAgentSelect.addEventListener("change", () => {
          const session = currentSession();
          session.agentId = els.sessionAgentSelect.value;
          session.updatedAt = Date.now();
          saveState();
          renderSessions();
          renderChat();
        });
        els.sidebarAgentManageBtn.addEventListener("click", openAgentPage);
        els.newSessionBtn.addEventListener("click", () => { createSession(); document.body.classList.remove("sidebar-open"); });
        els.sidebarBackBtn.addEventListener("click", () => document.body.classList.remove("sidebar-open"));
        els.chatName.addEventListener("input", () => {
          const session = currentSession();
          session.title = els.chatName.textContent.trim() || "新会话";
          session.updatedAt = Date.now();
          saveState();
          renderSessions();
          if (els.sessionPage.classList.contains("open")) renderSessionPage();
        });
        els.layoutBtn.addEventListener("click", () => { state.config.wideMode = !state.config.wideMode; saveState(); renderConfig(); });
        els.agentManageBtn.addEventListener("click", openAgentPage);
        els.sessionManageBtn.addEventListener("click", openSessionPage);
        els.memoryBtn.addEventListener("click", openMemoryPage);
        els.sessionPageBack.addEventListener("click", closePages);
        els.agentPageBack.addEventListener("click", closePages);
        els.memoryPageBack.addEventListener("click", closePages);
        els.memoryAddBtn.addEventListener("click", addMemory);
        els.sessionPageNew.addEventListener("click", () => { createSession("", false); renderAll(); renderSessionPage(); });
        els.agentNewBtn.addEventListener("click", () => { resetAgentForm(); els.agentNameInput.focus(); });
        els.agentCancelEditBtn.addEventListener("click", resetAgentForm);
        els.agentSaveBtn.addEventListener("click", saveAgent);
        els.fixInputBtn.addEventListener("click", () => {
          const input = els.messageInput;
          input.focus();
          const oldValue = input.value;
          input.value = "1";
          autoResizeInput();
          requestAnimationFrame(() => { input.value = oldValue; autoResizeInput(); input.focus(); });
          toast("输入框已重置");
        });
        els.clearBtn.addEventListener("click", () => {
          const session = currentSession();
          session.messages = [];
          session.updatedAt = Date.now();
          saveState();
          renderChat();
          renderSessions();
          if (els.sessionPage.classList.contains("open")) renderSessionPage();
        });
        els.sendBtn.addEventListener("click", sendMessage);
        els.messageInput.addEventListener("input", autoResizeInput);
        els.messageInput.addEventListener("keydown", e => { if (e.key === "Enter") e.stopPropagation(); });
        els.mobileMenuBtn.addEventListener("click", () => document.body.classList.add("sidebar-open"));
        document.addEventListener("click", e => {
          if (window.innerWidth > 860) return;
          const insideSidebar = els.sidebar.contains(e.target);
          const menu = els.mobileMenuBtn.contains(e.target);
          if (!insideSidebar && !menu) document.body.classList.remove("sidebar-open");
        });
        window.addEventListener("resize", autoResizeInput);
      }

      function init() {
        migrateLegacyAgents(state);
        state.sessions.forEach(s => { if (!Array.isArray(s.memories)) s.memories = []; });
        if (!state.sessions.length) createSession("", false);
        bindEvents();
        renderAll();
        autoResizeInput();
        saveState();
      }

      init();
    })();
  </script>
</body>
</html>
