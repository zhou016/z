      renderSessionSelect();
      updatePromptHeight();
      if (!currentMessages.length) addWelcomeMessage();
    }
    function initSessions() {
      let sessions = getSessions();
      if (!sessions.length) {
        const session = createSession('默认会话');
        sessions = [session];
        setSessions(sessions);
        localStorage.setItem(ACTIVE_SESSION_KEY, session.id);
      }
      const storedActive = localStorage.getItem(ACTIVE_SESSION_KEY);
      activeSessionId = sessions.some(session => session.id === storedActive) ? storedActive : sessions[0].id;
      loadSession(activeSessionId, false);
    }
    function addMessage(role, text, options = {}, persist = true, time = formatTime()) {
      const message = document.createElement('article');
      message.className = `message ${role}`;
      const name = role === 'user' ? '你' : 'AI编程助手';
      const codeHtml = options.code ? createCodeBlockHtml(options.code, options.lang || 'html') : '';
      message.innerHTML = `<div class="message-head"><span>${name}</span><span>${escapeHtml(time)}</span></div><div class="message-body">${escapeHtml(text)}</div>${codeHtml}`;
      messagesEl.appendChild(message);
      scrollMessagesToBottom();
      if (persist) {
        currentMessages.push({ role, text, code: options.code || '', lang: options.lang || 'html', time });
        saveActiveSession();
      }
    }
    function createStreamingAIMessage() {
      const time = formatTime();
      const message = document.createElement('article');
      message.className = 'message ai';
      message.innerHTML = `<div class="message-head"><span>AI编程助手</span><span>${escapeHtml(time)}</span></div><div class="message-body"></div>`;
      messagesEl.appendChild(message);
      const body = message.querySelector('.message-body');
      let rendered = '';
      let queue = '';
      let timer = null;
      function flush() {
        if (!queue) {
          timer = null;
          return;
        }
        rendered += queue.slice(0, 3);
        queue = queue.slice(3);
        body.textContent = rendered;
        scrollMessagesToBottom();
        timer = setTimeout(flush, 18);
      }
      return {
        append(text) {
          queue += text || '';
          if (!timer) flush();
        },
        finish(text, options = {}) {
          queue = '';
          if (timer) clearTimeout(timer);
          rendered = text || rendered;
          const codeHtml = options.code ? createCodeBlockHtml(options.code, options.lang || 'html') : '';
          body.textContent = rendered;
          message.insertAdjacentHTML('beforeend', codeHtml);
          currentMessages.push({ role: 'ai', text: rendered, code: options.code || '', lang: options.lang || 'html', time });
          saveActiveSession();
          scrollMessagesToBottom();
        }
      };
    }
    function getConfig(platformKey = platform.value) {
      const raw = localStorage.getItem(STORAGE_PREFIX + platformKey);
      return raw ? JSON.parse(raw) : { ...platformDefaults[platformKey] };
    }
    function saveConfig() {
      const value = { label: platformDefaults[platform.value].label, baseUrl: baseUrl.value.trim(), modelName: modelName.value.trim(), apiKey: apiKey.value.trim() };
      localStorage.setItem(STORAGE_PREFIX + platform.value, JSON.stringify(value));
      configStatus.textContent = `${value.label} 配置已保存，其他平台配置不会被覆盖。`;
      showToast('配置保存成功');
      renderActivePlatform();
    }
    function loadConfig() {
      const cfg = getConfig();
      baseUrl.value = cfg.baseUrl || '';
      modelName.value = cfg.modelName || '';
      apiKey.value = cfg.apiKey || '';
      configStatus.textContent = `${platformDefaults[platform.value].label} 配置已加载。`;
      renderActivePlatform();
    }
    function renderActivePlatform() {
      const cfg = getConfig();
      activePlatform.textContent = `当前平台：${platformDefaults[platform.value].label}${cfg.modelName ? ' · ' + cfg.modelName : ''}`;
    }
    async function copyText(text) {
      try { await navigator.clipboard.writeText(text); }
      catch (error) {
        const textarea = document.createElement('textarea');
        textarea.value = text; textarea.style.position = 'fixed'; textarea.style.opacity = '0';
        document.body.appendChild(textarea); textarea.select(); document.execCommand('copy'); textarea.remove();
      }
      showToast('复制成功');
    }
    function getLastCodeBlockText() {
      const blocks = [...document.querySelectorAll('.code-block pre code')];
      return blocks.length ? blocks[blocks.length - 1].textContent : '';
    }
    function normalizeBaseUrl(url) {
      const clean = String(url || '').trim().replace(/\/+$/, '');
      if (!clean) return '';
      return clean.endsWith('/chat/completions') ? clean : `${clean}/chat/completions`;
    }
    function extractHtmlCode(text) {
      const content = String(text || '').trim();
      const fenced = content.match(/```(?:html|HTML)?\s*([\s\S]*?)```/);
      if (fenced) return fenced[1].trim();
      const fullDoc = content.match(/<!DOCTYPE html[\s\S]*<\/html>/i) || content.match(/<html[\s\S]*<\/html>/i);
      if (fullDoc) return fullDoc[0].trim();
      return content;
    }
    function ensureCompleteHtml(code, title = 'AI生成页面') {
      const html = String(code || '').trim();
      if (/<!DOCTYPE html/i.test(html) || /<html[\s>]/i.test(html)) return html;
      return `<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>${escapeHtml(title)}</title>
</head>
<body>
${html}
</body>
</html>`;
    }
    function inspectHtml(code) {
      const html = String(code || '');
      const checks = [];
      if (!/<!DOCTYPE html/i.test(html)) checks.push('缺少 DOCTYPE');
      if (!/<html[^>]*lang=/i.test(html)) checks.push('建议设置 html lang');
      if (!/<meta[^>]+name=["']viewport["']/i.test(html)) checks.push('缺少移动端 viewport');
      if (!/<title>[\s\S]*?<\/title>/i.test(html)) checks.push('缺少 title');
      if (/<button(?![^>]*\stype=)/i.test(html)) checks.push('button 建议显式声明 type');
      if (/<img(?![^>]*\salt=)/i.test(html)) checks.push('img 建议提供 alt');
      return checks;
    }
    function summarizeUploadedHtml() {
      if (!uploadedHtml) return '当前没有上传 HTML 文件。';
      const tags = [...uploadedHtml.matchAll(/<([a-zA-Z][\w:-]*)\b/g)].map(match => match[1].toLowerCase());
      const uniqueTags = [...new Set(tags)].slice(0, 36).join(', ');
      const styleCount = (uploadedHtml.match(/<style\b/gi) || []).length;
      const scriptCount = (uploadedHtml.match(/<script\b/gi) || []).length;
      return `已上传 HTML：${uploadedHtml.length} 字符；标签概览：${uniqueTags || '无'}；style 数：${styleCount}；script 数：${scriptCount}。`;
    }
    function buildKernelUserPrompt(userText) {
      const uploadedContext = uploadedHtml ? uploadedHtml.slice(0, 18000) : '';
      const lastCode = getLastCodeBlockText().slice(0, 12000);
      const sessionMemory = currentMessages.slice(-12).map(message => {
        const codeNote = message.code ? `\n[代码摘要] ${message.code.slice(0, 1600)}` : '';
        return `${message.role === 'user' ? '用户' : 'AI'}：${message.text}${codeNote}`;
      }).join('\n\n');
      return `用户需求：
${userText}

上下文分析：
${summarizeUploadedHtml()}

当前会话永久上下文记忆（仅限当前会话，禁止混用其他会话）：
${sessionMemory || '当前会话暂无历史记忆。'}

${uploadedContext ? `用户上传的 HTML 源码如下，请优先基于它进行最小必要修改：\n${uploadedContext}` : ''}

${!uploadedContext && lastCode ? `当前聊天中最后一个代码块如下，可作为参考：\n${lastCode}` : ''}

请输出高质量 HTML 编程结果。若用户要求生成页面，请返回完整单文件 HTML。请自动调用内核工具链：需求拆解、HTML 结构规划、CSS 响应式设计、JS 交互实现、可访问性检查、安全检查、性能检查、代码完整性检查。`;
    }
    function readOpenAIContent(data) {
      return data?.choices?.[0]?.delta?.content
        || data?.choices?.[0]?.message?.content
        || data?.choices?.[0]?.text
        || data?.output_text
        || '';
    }
    async function callOpenAICompatibleAPI(cfg, userText, onToken) {
      const endpoint = normalizeBaseUrl(cfg.baseUrl);
      if (!endpoint || !cfg.modelName || !cfg.apiKey) {
        throw new Error('API 地址、子模型名称或 API Key 未完整配置');
      }
      const payload = {
        model: cfg.modelName,
        temperature: 0.18,
        stream: true,
        messages: [
          { role: 'system', content: HTML_KERNEL_SYSTEM_PROMPT },
          { role: 'user', content: buildKernelUserPrompt(userText) }
        ]
      };
      activeRequestController = new AbortController();
      const request = () => fetch(endpoint, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${cfg.apiKey}`
        },
        body: JSON.stringify(payload),
        signal: activeRequestController.signal
      });
      let response = await request();
      if (!response.ok) {
        const streamDetail = await response.text().catch(() => '');
        payload.stream = false;
        response = await request();
        if (!response.ok) {
          const detail = await response.text().catch(() => streamDetail);
          throw new Error(`API 请求失败：${response.status}${detail ? `，${detail.slice(0, 180)}` : ''}`);
        }
      }
      const contentType = response.headers.get('content-type') || '';
      if (!response.body || !contentType.includes('text/event-stream')) {
        const data = await response.json();
        const text = readOpenAIContent(data);
        if (onToken) onToken(text);
        return text;
      }
      const reader = response.body.getReader();
      const decoder = new TextDecoder('utf-8');
      let buffer = '';
      let fullText = '';
      while (true) {
        const { value, done } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split(/\r?\n/);
        buffer = lines.pop() || '';
        for (const line of lines) {
          const trimmed = line.trim();
          if (!trimmed.startsWith('data:')) continue;
          const dataText = trimmed.slice(5).trim();
          if (!dataText || dataText === '[DONE]') continue;
          try {
            const data = JSON.parse(dataText);
            const token = readOpenAIContent(data);
            if (token) {
              fullText += token;
              if (onToken) onToken(token);
            }
          } catch (error) {
            fullText += dataText;
            if (onToken) onToken(dataText);
          }
        }
      }
      return fullText;
    }
    function downloadHtml(code) {
      if (!code.trim()) { showToast('没有可导出的代码块'); return; }
      const blob = new Blob([code], { type: 'text/html;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = `ai-generated-${Date.now()}.html`;
      document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
      showToast('已导出HTML文件');
    }
    function buildDemoHtml(userPrompt) {
      return `<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI生成页面</title>
  <style>
    body {
      margin: 0; min-height: 100vh; display: grid; place-items: center;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #eef6ff, #ffffff); color: #132238;
    }
    .card {
      width: min(720px, calc(100vw - 32px)); padding: 40px; border-radius: 28px;
      background: white; box-shadow: 0 24px 70px rgba(37, 99, 235, 0.16); border: 1px solid #dbe7f5;
    }
    h1 { margin: 0 0 12px; color: #2563eb; }
    p { line-height: 1.8; }
  </style>
</head>
<body>
  <section class="card">
    <h1>根据你的需求生成的 HTML</h1>
    <p>${escapeHtml(userPrompt)}</p>
    <p>这里是演示生成结果。接入真实 API 后，可将模型返回的 HTML 代码显示在此代码块中。</p>
  </section>
</body>
</html>`;
    }
    async function callAI(userText, onToken) {
      const cfg = { platform: platform.value, ...getConfig() };
      try {
        const raw = await callOpenAICompatibleAPI(cfg, userText, onToken);
        const code = ensureCompleteHtml(extractHtmlCode(raw), userText.slice(0, 24) || 'AI生成页面');
        const issues = inspectHtml(code);
        return {
          text: `已使用 ${platformDefaults[cfg.platform].label} 的 HTML 编程内核生成结果。${summarizeUploadedHtml()}${issues.length ? `\n\n内核检查提示：${issues.join('；')}。` : '\n\n内核检查：基础 HTML 结构完整。'}`,
          code
        };
      } catch (error) {
        if (error.name === 'AbortError' || stopRequested) throw error;
        if (cfg.baseUrl && cfg.modelName && cfg.apiKey) {
          throw new Error(`${platformDefaults[cfg.platform].label} 接入失败：${error.message || error}`);
        }
      }
      const code = ensureCompleteHtml(buildDemoHtml(userText), userText.slice(0, 24) || 'AI生成页面');
      const issues = inspectHtml(code);
      return {
        text: `已启用本地 HTML 编程内核生成代码草稿。${summarizeUploadedHtml()}\n\n内核能力：需求解析、HTML 完整性补全、代码块提取、上传源码上下文融合、基础结构检查${issues.length ? `、检查提示：${issues.join('；')}` : '。'}`,
        code
      };
    }
    async function handleSend() {
      if (isGenerating) {
        stopRequested = true;
        if (activeRequestController) activeRequestController.abort();
        sendBtn.textContent = '发送';
        showToast('已停止生成');
        return;
      }
      const text = promptInput.value.trim();
      if (!text) { showToast('请输入内容'); return; }
      addMessage('user', text);
      promptInput.value = '';
      updatePromptHeight();
      isGenerating = true;
      stopRequested = false;
      sendBtn.textContent = '停止';
      const streamingMessage = createStreamingAIMessage();
      try {
        const result = await callAI(text, token => streamingMessage.append(token));
        if (stopRequested) return;
        streamingMessage.finish(result.text, { code: result.code, lang: 'html' });
      } catch (error) {
        if (!stopRequested) streamingMessage.finish(`生成失败：${error.message || error}`);
      } finally {
        isGenerating = false;
        stopRequested = false;
        activeRequestController = null;
        sendBtn.textContent = '发送';
      }
    }
    function emergencySaveAndReload() {
      if (activeRequestController) activeRequestController.abort();
      stopRequested = true;
      saveActiveSession();
      localStorage.setItem('ai-coding-assistant:emergency-restore', String(Date.now()));
      showToast('已紧急保存，正在刷新');
      setTimeout(() => location.reload(), 120);
    }
    function handleSendButtonClick() {
      const now = Date.now();
      sendClickTimes = [...sendClickTimes.filter(time => now - time < 900), now];
      if (sendClickTimes.length >= 3) {
        sendClickTimes = [];
        emergencySaveAndReload();
        return;
      }
      handleSend();
    }
    document.addEventListener('click', (event) => {
      if (event.target.classList.contains('copy-btn')) {
        const code = event.target.closest('.code-block').querySelector('code').textContent;
        copyText(code);
      }
    });
    sendBtn.addEventListener('click', handleSendButtonClick);
    function toggleTopActions() {
      const open = !topActions.classList.contains('open');
      topActions.classList.toggle('open', open);
      topControls.classList.toggle('open', open);
      titleToggle.setAttribute('aria-expanded', String(open));
    }
    titleToggle.addEventListener('click', toggleTopActions);
    titleToggle.addEventListener('keydown', (event) => {
      if (event.key === 'Enter' || event.key === ' ') {
        event.preventDefault();
        toggleTopActions();
      }
    });
    sessionManageBtn.addEventListener('click', (event) => {
      event.stopPropagation();
      const open = !sessionMenu.classList.contains('open');
      sessionMenu.classList.toggle('open', open);
      sessionManageBtn.setAttribute('aria-expanded', String(open));
      renderSessionSelect();
    });
    sessionSelect.addEventListener('change', () => loadSession(sessionSelect.value));
    newSessionBtn.addEventListener('click', (event) => {
      event.stopPropagation();
      saveActiveSession();
      const sessions = getSessions();
      const session = createSession(`新会话 ${sessions.length + 1}`);
      sessions.push(session);
      setSessions(sessions);
      loadSession(session.id, false);
      showToast('已新建会话');
    });
    deleteSessionBtn.addEventListener('click', (event) => {
      event.stopPropagation();
      let sessions = getSessions();
      if (sessions.length <= 1) {
        showToast('至少保留一个会话');
        return;
      }
      sessions = sessions.filter(session => session.id !== activeSessionId);
      setSessions(sessions);
      loadSession(sessions[0].id, false);
      showToast('会话已删除');
    });
    configToggleBtn.addEventListener('click', () => {
      const open = !configPanel.classList.contains('open');
      configPanel.classList.toggle('open', open);
      configToggleBtn.setAttribute('aria-expanded', String(open));
    });
    promptInput.addEventListener('input', () => {
      updatePromptHeight();
      saveActiveSession();
    });
    promptInput.addEventListener('focus', scrollMessagesToBottom);
    promptInput.addEventListener('click', scrollMessagesToBottom);
    bubbleFontSize.addEventListener('input', (event) => updateBubbleFontSize(event.target.value));
    exportBtn.addEventListener('click', () => downloadHtml(getLastCodeBlockText()));
    saveConfigBtn.addEventListener('click', saveConfig);
    platform.addEventListener('change', loadConfig);
    clearChatBtn.addEventListener('click', () => {
      messagesEl.innerHTML = '';
      uploadedHtml = '';
      currentMessages = [];
      promptInput.value = '';
      fileHint.textContent = '选择 HTML 文件后，会读取内容并加入聊天上下文。';
      fileHint.hidden = true;
      addWelcomeMessage();
      showToast('对话已清空');
    });
    htmlFile.addEventListener('change', async (event) => {
      const file = event.target.files[0];
      if (!file) return;
      uploadedHtml = await file.text();
      fileHint.textContent = `已读取：${file.name}，${uploadedHtml.length} 个字符。`;
      fileHint.hidden = false;
      saveActiveSession();
      addMessage('user', `上传HTML文件：${file.name}`);
      addMessage('ai', '文件内容已读取，可继续提问，例如“帮我优化这个页面”或“提取最后一个代码块并导出”。', { code: uploadedHtml, lang: 'html' });
      showToast('HTML文件读取成功');
    });
    function addWelcomeMessage() {
      addMessage('ai', '你好，我是 AI编程助手。你可以输入编程需求、上传 HTML 文件、复制任意代码块，或点击顶部按钮导出当前最后一个 HTML 代码块。', {
        code: `<!-- 示例代码块：可点击右下角复制，或点击顶部“导出当前代码” -->
<main class="hello">
  <h1>AI编程助手已就绪</h1>
  <p>请输入你的 HTML / CSS / JavaScript 需求。</p>
</main>`,
        lang: 'html'
      });
    }
    loadConfig();
    updateBubbleFontSize(17);
    updatePromptHeight();
    initSessions();
    if (localStorage.getItem('ai-coding-assistant:emergency-restore')) {
      localStorage.removeItem('ai-coding-assistant:emergency-restore');
      showToast('已恢复紧急保存内容');
    }
    initDevicePasswordGate();
  </script>
</body>
</html>
