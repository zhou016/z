<!-- Generated by Trae Work -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🧋 小幸运奶茶铺</title>
  <style>
    :root {
      --cream: #FFF5E6;
      --pink: #FFD6E7;
      --pink-deep: #FF8FBD;
      --orange: #FFB86B;
      --brown: #7A4B2B;
      --ink: #57331E;
      --muted: #9B725B;
      --white: #FFFFFF;
      --shadow: rgba(122, 75, 43, 0.18);
      --good: #5FCB8F;
      --bad: #FF6B6B;
      --gold: #FFC94A;
      --sky: #BDEFFF;
    }

    * {
      box-sizing: border-box;
      user-select: none;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "Comic Sans MS", "Arial Rounded MT Bold", "Microsoft YaHei", "PingFang SC", sans-serif;
      background:
        radial-gradient(circle at 12% 12%, rgba(255, 214, 231, 0.85) 0 9%, transparent 10%),
        radial-gradient(circle at 88% 18%, rgba(255, 184, 107, 0.5) 0 8%, transparent 9%),
        linear-gradient(135deg, var(--cream), #FFE7F0 58%, #FFF0CF);
      overflow-x: hidden;
    }

    .game {
      width: min(1180px, calc(100vw - 28px));
      margin: 0 auto;
      padding: 18px 0 24px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      border: 3px solid rgba(255, 143, 189, 0.4);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.78);
      box-shadow: 0 8px 22px var(--shadow);
      font-weight: 900;
      font-size: clamp(18px, 2.2vw, 28px);
    }

    .status {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .pill {
      min-width: 120px;
      padding: 10px 14px;
      border: 2px solid rgba(122, 75, 43, 0.12);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.82);
      box-shadow: 0 7px 18px var(--shadow);
      font-size: 17px;
      font-weight: 900;
      text-align: center;
    }

    .save-tip {
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(95, 203, 143, 0.18);
      color: #2F855A;
      border: 2px solid rgba(95, 203, 143, 0.24);
      font-weight: 900;
      font-size: 14px;
      opacity: 0.92;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 280px;
      gap: 16px;
      align-items: stretch;
    }

    .scene {
      position: relative;
      min-height: 520px;
      border: 5px solid rgba(122, 75, 43, 0.12);
      border-radius: 34px;
      overflow: hidden;
      box-shadow: 0 18px 48px var(--shadow);
      transition: background 0.6s ease, transform 0.4s ease;
    }

    .level-1 {
      background:
        radial-gradient(circle at 15% 12%, rgba(255,255,255,0.7) 0 9%, transparent 10%),
        linear-gradient(#BDEFFF 0 52%, #FFE9B6 52% 100%);
    }

    .level-2 {
      background:
        radial-gradient(circle at 80% 14%, rgba(255,255,255,0.8) 0 8%, transparent 9%),
        linear-gradient(#AEDCFF 0 45%, #FFDBB9 45% 100%);
    }

    .level-3 {
      background:
        radial-gradient(circle at 50% 14%, rgba(255,255,255,0.75) 0 7%, transparent 8%),
        linear-gradient(#FFD6E7 0 43%, #FFF1BE 43% 100%);
    }

    .level-4 {
      background:
        radial-gradient(circle at 20% 14%, rgba(255,255,255,0.85) 0 8%, transparent 9%),
        radial-gradient(circle at 83% 16%, rgba(255,255,255,0.7) 0 6%, transparent 7%),
        linear-gradient(#D7C5FF 0 42%, #FFE6A8 42% 100%);
    }

    .decor {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .sun {
      position: absolute;
      top: 36px;
      right: 48px;
      width: 76px;
      height: 76px;
      border-radius: 50%;
      background: var(--gold);
      box-shadow: 0 0 0 14px rgba(255, 201, 74, 0.22);
      animation: bob 3s ease-in-out infinite;
    }

    .cloud {
      position: absolute;
      width: 90px;
      height: 34px;
      border-radius: 999px;
      background: rgba(255,255,255,0.85);
      top: 70px;
      left: 70px;
    }

    .cloud::before,
    .cloud::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      background: inherit;
    }

    .cloud::before {
      width: 42px;
      height: 42px;
      left: 14px;
      top: -18px;
    }

    .cloud::after {
      width: 50px;
      height: 50px;
      right: 8px;
      top: -24px;
    }

    .shop-wrap {
      position: absolute;
      left: 50%;
      bottom: 58px;
      width: min(500px, 76%);
      height: 330px;
      transform: translateX(-50%);
    }

    .shop {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: end center;
    }

    .building {
      position: relative;
      width: 100%;
      height: 250px;
      border: 5px solid rgba(122, 75, 43, 0.18);
      border-radius: 28px 28px 18px 18px;
      background: linear-gradient(180deg, rgba(255,255,255,0.92), #FFE2BD);
      box-shadow: 0 18px 0 rgba(122, 75, 43, 0.08);
      transition: all 0.5s ease;
    }

    .level-1 .building {
      width: 78%;
      height: 190px;
      border-radius: 26px 26px 18px 18px;
      background: linear-gradient(#FFE1EE, #FFCBA5);
    }

    .level-2 .building {
      background: linear-gradient(#FFF8E9, #FFD2E1);
    }

    .level-3 .building {
      background: linear-gradient(#FFFFFF, #FFCFE5);
      box-shadow: 0 18px 0 rgba(255, 143, 189, 0.18), 0 0 34px rgba(255, 255, 255, 0.8);
    }

    .level-4 .building {
      height: 285px;
      background: linear-gradient(#FFFDF8, #FFE3AA);
      border-color: rgba(255, 201, 74, 0.58);
      box-shadow: 0 18px 0 rgba(122, 75, 43, 0.08), 0 0 40px rgba(255, 201, 74, 0.38);
    }

    .awning {
      position: absolute;
      left: 50%;
      top: -28px;
      width: 108%;
      height: 60px;
      transform: translateX(-50%);
      border-radius: 26px 26px 14px 14px;
      background: repeating-linear-gradient(
        90deg,
        var(--pink-deep) 0 42px,
        #FFF 42px 84px
      );
      border: 5px solid rgba(122, 75, 43, 0.14);
    }

    .sign {
      position: absolute;
      top: 48px;
      left: 50%;
      transform: translateX(-50%);
      min-width: 190px;
      padding: 10px 18px;
      border-radius: 999px;
      text-align: center;
      font-size: 22px;
      font-weight: 900;
      color: var(--brown);
      background: #FFF7D5;
      border: 3px dashed rgba(255, 143, 189, 0.6);
      box-shadow: 0 8px 14px rgba(122,75,43,0.1);
    }

    .window {
      position: absolute;
      top: 118px;
      left: 12%;
      width: 28%;
      height: 72px;
      border: 5px solid rgba(122,75,43,0.16);
      border-radius: 22px;
      background: linear-gradient(135deg, rgba(189,239,255,0.95), rgba(255,255,255,0.75));
    }

    .door {
      position: absolute;
      right: 13%;
      bottom: 0;
      width: 26%;
      height: 122px;
      border: 5px solid rgba(122,75,43,0.17);
      border-bottom: 0;
      border-radius: 22px 22px 0 0;
      background: linear-gradient(#F9A05F, #BF7547);
    }

    .door::after {
      content: "";
      position: absolute;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      top: 54px;
      right: 17px;
      background: var(--gold);
    }

    .cart-wheels {
      display: none;
      position: absolute;
      left: 15%;
      bottom: -26px;
      width: 70%;
      justify-content: space-between;
    }

    .level-1 .cart-wheels {
      display: flex;
    }

    .wheel {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: #5E3B29;
      border: 8px solid #FFF;
      box-shadow: 0 4px 0 rgba(0,0,0,0.08);
    }

    .neon {
      display: none;
      position: absolute;
      left: 50%;
      top: 92px;
      transform: translateX(-50%);
      padding: 4px 12px;
      border-radius: 999px;
      color: #fff;
      background: var(--pink-deep);
      box-shadow: 0 0 16px var(--pink-deep);
      font-weight: 900;
    }

    .level-3 .neon,
    .level-4 .neon {
      display: block;
    }

    .flagship-stars {
      display: none;
      position: absolute;
      inset: 0;
    }

    .level-4 .flagship-stars {
      display: block;
    }

    .flagship-stars span {
      position: absolute;
      font-size: 28px;
      animation: twinkle 1.6s ease-in-out infinite;
    }

    .flagship-stars span:nth-child(1) { left: 8%; top: 28%; }
    .flagship-stars span:nth-child(2) { right: 10%; top: 38%; animation-delay: .3s; }
    .flagship-stars span:nth-child(3) { left: 44%; top: 18%; animation-delay: .6s; }

    .counter {
      position: absolute;
      left: 50%;
      bottom: 30px;
      transform: translateX(-50%);
      min-width: 310px;
      padding: 14px 18px;
      border-radius: 26px;
      background: rgba(255, 255, 255, 0.8);
      border: 3px solid rgba(122, 75, 43, 0.12);
      text-align: center;
      box-shadow: 0 10px 24px rgba(122,75,43,0.12);
      z-index: 3;
    }

    .made-drink {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 190px;
      min-height: 42px;
      padding: 8px 14px;
      border-radius: 999px;
      background: #FFF7D5;
      border: 2px dashed rgba(255, 143, 189, 0.7);
      font-weight: 900;
    }

    .timer {
      position: absolute;
      left: 50%;
      top: 98px;
      width: min(380px, 84%);
      transform: translateX(-50%);
      padding: 14px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.88);
      border: 3px solid rgba(255, 143, 189, 0.38);
      box-shadow: 0 12px 26px rgba(122,75,43,0.14);
      text-align: center;
      z-index: 5;
      display: none;
    }

    .timer.show {
      display: block;
      animation: pop 0.25s ease;
    }

    .bar {
      height: 16px;
      margin-top: 10px;
      border-radius: 999px;
      overflow: hidden;
      background: #FFE2EF;
      border: 2px solid rgba(122,75,43,0.1);
    }

    .bar-fill {
      height: 100%;
      width: 0%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--pink-deep), var(--orange));
      transition: width 0.1s linear;
    }

    .customers {
      min-height: 520px;
      border: 5px solid rgba(122, 75, 43, 0.12);
      border-radius: 34px;
      padding: 16px;
      background: rgba(255, 255, 255, 0.62);
      box-shadow: 0 18px 48px var(--shadow);
      overflow: hidden;
    }

    .queue-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 12px;
      font-weight: 900;
      font-size: 18px;
    }

    .customer-list {
      display: grid;
      gap: 14px;
    }

    .customer {
      position: relative;
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 112px;
      padding: 12px 8px;
      border-radius: 26px;
      background: rgba(255, 245, 230, 0.78);
      border: 3px solid rgba(255, 143, 189, 0.22);
      box-shadow: 0 8px 18px rgba(122,75,43,0.1);
      animation: walkIn 0.58s cubic-bezier(.22,1.3,.55,1) both;
    }

    .customer.leaving {
      animation: leaveRight 0.42s ease-in both;
    }

    .avatar {
      flex: 0 0 auto;
      display: grid;
      place-items: center;
      width: 58px;
      height: 58px;
      border-radius: 50%;
      background: #FFF;
      border: 3px solid rgba(122,75,43,0.12);
      font-size: 34px;
    }

    .bubble {
      position: relative;
      flex: 1;
      padding: 10px 11px;
      border-radius: 18px;
      background: #FFF;
      border: 2px solid rgba(122,75,43,0.12);
      font-size: 14px;
      font-weight: 900;
      line-height: 1.35;
    }

    .bubble::before {
      content: "";
      position: absolute;
      left: -9px;
      top: 24px;
      border-right: 10px solid #FFF;
      border-top: 8px solid transparent;
      border-bottom: 8px solid transparent;
    }

    .controls {
      margin-top: 16px;
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 12px;
      align-items: stretch;
    }

    button {
      min-height: 68px;
      padding: 10px 12px;
      border: 0;
      border-radius: 22px;
      color: var(--ink);
      background: linear-gradient(180deg, #FFFFFF, #FFE1EE);
      box-shadow: 0 8px 0 rgba(122, 75, 43, 0.16), 0 12px 24px rgba(122,75,43,0.12);
      font-family: inherit;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
      transform: translateY(0);
      transition: transform 0.12s ease, box-shadow 0.12s ease, filter 0.2s ease;
    }

    button:hover:not(:disabled) {
      transform: translateY(-3px);
      filter: brightness(1.03);
      box-shadow: 0 11px 0 rgba(122, 75, 43, 0.16), 0 16px 28px rgba(122,75,43,0.16);
    }

    button:active:not(:disabled) {
      transform: translateY(4px) scale(0.98);
      box-shadow: 0 3px 0 rgba(122, 75, 43, 0.18), 0 8px 16px rgba(122,75,43,0.12);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.48;
      filter: grayscale(0.3);
    }

    .make-btn {
      background: linear-gradient(180deg, #FFF, #FFD9E8);
    }

    .service-btn {
      background: linear-gradient(180deg, #FFF7D5, #FFC94A);
    }

    .upgrade-btn {
      background: linear-gradient(180deg, #F9F4FF, #D7C5FF);
    }

    .btn-sub {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
    }

    .progress-panel {
      margin-top: 12px;
      padding: 12px 16px;
      border-radius: 24px;
      background: rgba(255,255,255,0.72);
      border: 3px solid rgba(122,75,43,0.1);
      box-shadow: 0 8px 20px rgba(122,75,43,0.09);
    }

    .progress-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
      font-weight: 900;
      flex-wrap: wrap;
    }

    .progress {
      height: 22px;
      padding: 3px;
      border-radius: 999px;
      background: #FFE2EF;
      border: 2px solid rgba(122,75,43,0.1);
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--orange), var(--pink-deep), var(--gold));
      transition: width 0.35s ease;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 26px;
      z-index: 20;
      transform: translateX(-50%) translateY(18px);
      max-width: min(540px, calc(100vw - 32px));
      padding: 12px 18px;
      border-radius: 999px;
      background: rgba(255,255,255,0.94);
      border: 3px solid rgba(255,143,189,0.35);
      box-shadow: 0 14px 34px rgba(122,75,43,0.18);
      text-align: center;
      font-weight: 900;
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s ease, transform .25s ease;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .confetti-layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 30;
    }

    .confetti {
      position: absolute;
      top: -20px;
      width: 12px;
      height: 18px;
      border-radius: 4px;
      animation: confettiFall 1.65s linear forwards;
    }

    .float-score {
      position: absolute;
      z-index: 9;
      left: 50%;
      top: 160px;
      transform: translateX(-50%);
      padding: 9px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.88);
      border: 2px solid rgba(122,75,43,0.1);
      font-weight: 900;
      animation: scoreUp 1.05s ease forwards;
      pointer-events: none;
    }

    @keyframes bob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    @keyframes pop {
      from { transform: translateX(-50%) scale(0.88); opacity: 0; }
      to { transform: translateX(-50%) scale(1); opacity: 1; }
    }

    @keyframes twinkle {
      0%, 100% { transform: scale(1) rotate(0deg); opacity: .7; }
      50% { transform: scale(1.35) rotate(12deg); opacity: 1; }
    }

    @keyframes walkIn {
      from { transform: translateX(260px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    @keyframes leaveRight {
      from { transform: translateX(0); opacity: 1; }
      to { transform: translateX(260px) rotate(8deg); opacity: 0; }
    }

    @keyframes confettiFall {
      0% { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(108vh) rotate(720deg); opacity: 0; }
    }

    @keyframes scoreUp {
      0% { transform: translate(-50%, 12px); opacity: 0; }
      20% { opacity: 1; }
      100% { transform: translate(-50%, -46px); opacity: 0; }
    }

    @media (max-width: 900px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .customers {
        min-height: 260px;
      }

      .customer-list {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .customer {
        flex-direction: column;
        text-align: center;
      }

      .bubble::before {
        left: 50%;
        top: -10px;
        transform: translateX(-50%);
        border-right: 8px solid transparent;
        border-left: 8px solid transparent;
        border-bottom: 10px solid #FFF;
        border-top: 0;
      }

      .controls {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 620px) {
      .topbar {
        align-items: stretch;
        flex-direction: column;
      }

      .status {
        justify-content: stretch;
      }

      .pill,
      .save-tip {
        flex: 1;
      }

      .scene {
        min-height: 470px;
      }

      .shop-wrap {
        width: 88%;
      }

      .counter {
        min-width: 250px;
        max-width: calc(100% - 32px);
      }

      .customer-list {
        grid-template-columns: 1fr;
      }

      .controls {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="game">
    <section class="topbar" aria-label="游戏状态栏">
      <div class="brand">🧋 小幸运奶茶铺</div>
      <div class="status">
        <div class="pill" id="levelText">🌟 等级 1</div>
        <div class="pill" id="coinsText">💰 10</div>
        <div class="save-tip" id="saveTip">✅ 游戏已自动保存</div>
      </div>
    </section>

    <section class="layout">
      <section class="scene level-1" id="scene" aria-label="奶茶店场景">
        <div class="decor">
          <div class="sun"></div>
          <div class="cloud"></div>
          <div class="flagship-stars">
            <span>✨</span>
            <span>🌟</span>
            <span>💫</span>
          </div>
        </div>

        <div class="timer" id="timer">
          <strong id="timerText">正在制作...</strong>
          <div class="bar"><div class="bar-fill" id="timerFill"></div></div>
        </div>

        <div class="shop-wrap">
          <div class="shop">
            <div class="building">
              <div class="awning"></div>
              <div class="sign" id="shopSign">小推车奶茶</div>
              <div class="neon">今日人气爆棚</div>
              <div class="window"></div>
              <div class="door"></div>
              <div class="cart-wheels">
                <div class="wheel"></div>
                <div class="wheel"></div>
              </div>
            </div>
          </div>
        </div>

        <div class="counter">
          <div>出餐台</div>
          <div class="made-drink" id="madeDrink">还没有做好奶茶</div>
        </div>
      </section>

      <aside class="customers" aria-label="顾客排队区">
        <div class="queue-title">
          <span>顾客排队区</span>
          <span id="queueCount">0 / 3</span>
        </div>
        <div class="customer-list" id="customerList"></div>
      </aside>
    </section>

    <section class="controls" aria-label="经营按钮">
      <button class="make-btn" data-drink="original">🧋 制作原味珍珠奶茶 <span class="btn-sub" id="price-original">售价 5 金币</span></button>
      <button class="make-btn" data-drink="coconut">🥥 制作椰果奶茶 <span class="btn-sub" id="price-coconut">售价 8 金币</span></button>
      <button class="make-btn" data-drink="cheese">🧀 制作芝士奶盖 <span class="btn-sub" id="price-cheese">售价 12 金币</span></button>
      <button class="service-btn" id="serveBtn">🤝 服务顾客 <span class="btn-sub">按队首需求出餐</span></button>
      <button class="upgrade-btn" id="upgradeBtn">🎀 升级店铺 <span class="btn-sub" id="upgradeCost">需要 50 金币</span></button>
    </section>

    <section class="progress-panel" aria-label="升级进度">
      <div class="progress-row">
        <span id="progressText">距离升到 2 级还需要 40 金币</span>
        <span id="satisfactionText">满意度：0 ❤️</span>
      </div>
      <div class="progress"><div class="progress-fill" id="progressFill"></div></div>
    </section>
  </main>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <div class="confetti-layer" id="confettiLayer"></div>

  <script>
    const STORAGE_KEY = "little-lucky-milk-tea-shop-save-v1";

    const drinks = {
      original: { name: "原味珍珠奶茶", icon: "🧋", basePrice: 5, unlockLevel: 1 },
      coconut: { name: "椰果奶茶", icon: "🥥", basePrice: 8, unlockLevel: 2 },
      cheese: { name: "芝士奶盖", icon: "🧀", basePrice: 12, unlockLevel: 3 }
    };

    const upgradeNeeds = {
      1: 50,
      2: 100,
      3: 200
    };

    const levelNames = {
      1: "小推车奶茶",
      2: "温馨小店面",
      3: "网红打卡店",
      4: "旗舰奶茶店"
    };

    const avatars = ["😊", "😋", "🥰", "🤩", "😺", "🐻", "🐰", "🦊"];

    let state = {
      coins: 10,
      level: 1,
      unlockedDrinks: ["original"],
      satisfaction: 0
    };

    let customers = [];
    let madeDrink = null;
    let isMaking = false;
    let customerTimer = null;
    let toastTimer = null;

    const scene = document.getElementById("scene");
    const levelText = document.getElementById("levelText");
    const coinsText = document.getElementById("coinsText");
    const saveTip = document.getElementById("saveTip");
    const madeDrinkEl = document.getElementById("madeDrink");
    const customerList = document.getElementById("customerList");
    const queueCount = document.getElementById("queueCount");
    const timer = document.getElementById("timer");
    const timerText = document.getElementById("timerText");
    const timerFill = document.getElementById("timerFill");
    const upgradeBtn = document.getElementById("upgradeBtn");
    const upgradeCost = document.getElementById("upgradeCost");
    const serveBtn = document.getElementById("serveBtn");
    const progressText = document.getElementById("progressText");
    const progressFill = document.getElementById("progressFill");
    const satisfactionText = document.getElementById("satisfactionText");
    const toast = document.getElementById("toast");
    const confettiLayer = document.getElementById("confettiLayer");
    const shopSign = document.getElementById("shopSign");
    const makeButtons = Array.from(document.querySelectorAll(".make-btn"));

    function loadGame() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return;
        const saved = JSON.parse(raw);
        state.coins = Number.isFinite(saved.coins) ? saved.coins : 10;
        state.level = [1, 2, 3, 4].includes(saved.level) ? saved.level : 1;
        state.unlockedDrinks = Array.isArray(saved.unlockedDrinks) && saved.unlockedDrinks.length
          ? saved.unlockedDrinks.filter(key => drinks[key])
          : getUnlockedByLevel(state.level);
        state.satisfaction = Number.isFinite(saved.satisfaction) ? saved.satisfaction : 0;
        ensureUnlockedByLevel();
      } catch (error) {
        console.warn("读取存档失败，已使用新游戏进度。", error);
      }
    }

    function saveGame() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        coins: state.coins,
        level: state.level,
        unlockedDrinks: state.unlockedDrinks,
        satisfaction: state.satisfaction
      }));
      saveTip.textContent = "✅ 游戏已自动保存";
      saveTip.style.transform = "scale(1.04)";
      clearTimeout(saveTip._timer);
      saveTip._timer = setTimeout(() => {
        saveTip.style.transform = "scale(1)";
      }, 220);
    }

    function getUnlockedByLevel(level) {
      return Object.keys(drinks).filter(key => drinks[key].unlockLevel <= level);
    }

    function ensureUnlockedByLevel() {
      const shouldUnlock = getUnlockedByLevel(state.level);
      shouldUnlock.forEach(key => {
        if (!state.unlockedDrinks.includes(key)) state.unlockedDrinks.push(key);
      });
    }

    function getPrice(drinkKey) {
      const growth = 1 + (state.level - 1) * 0.2;
      return Math.round(drinks[drinkKey].basePrice * growth);
    }

    function setCoins(value) {
      state.coins = Math.max(0, Math.floor(value));
      saveGame();
      render();
    }

    function setLevel(value) {
      state.level = Math.min(4, Math.max(1, value));
      ensureUnlockedByLevel();
      saveGame();
      render();
    }

    function render() {
      levelText.textContent = `🌟 等级 ${state.level}`;
      coinsText.textContent = `💰 ${state.coins}`;
      shopSign.textContent = levelNames[state.level];
      scene.className = `scene level-${state.level}`;
      queueCount.textContent = `${customers.length} / 3`;
      satisfactionText.textContent = `满意度：${state.satisfaction} ❤️`;

      Object.keys(drinks).forEach(key => {
        const priceEl = document.getElementById(`price-${key}`);
        const isUnlocked = state.unlockedDrinks.includes(key);
        priceEl.textContent = isUnlocked
          ? `售价 ${getPrice(key)} 金币`
          : `${drinks[key].unlockLevel} 级解锁`;
      });

      makeButtons.forEach(button => {
        const key = button.dataset.drink;
        const locked = !state.unlockedDrinks.includes(key);
        button.disabled = locked || isMaking || Boolean(madeDrink);
      });

      serveBtn.disabled = isMaking || customers.length === 0;

      const nextNeed = upgradeNeeds[state.level];
      if (nextNeed) {
        upgradeCost.textContent = `需要 ${nextNeed} 金币`;
        upgradeBtn.disabled = state.coins < nextNeed || isMaking;
        const needLeft = Math.max(0, nextNeed - state.coins);
        progressText.textContent = needLeft === 0
          ? `可以升级到 ${state.level + 1} 级啦！`
          : `距离升到 ${state.level + 1} 级还需要 ${needLeft} 金币`;
        progressFill.style.width = `${Math.min(100, (state.coins / nextNeed) * 100)}%`;
      } else {
        upgradeCost.textContent = "已经满级";
        upgradeBtn.disabled = true;
        progressText.textContent = "店铺已经是 4 级旗舰店啦，继续服务顾客赚金币吧！";
        progressFill.style.width = "100%";
      }

      madeDrinkEl.textContent = madeDrink
        ? `${drinks[madeDrink].icon} 已做好：${drinks[madeDrink].name}`
        : "还没有做好奶茶";

      renderCustomers();
    }

    function renderCustomers() {
      customerList.innerHTML = customers.map(customer => `
        <div class="customer" data-id="${customer.id}">
          <div class="avatar">${customer.avatar}</div>
          <div class="bubble">我想喝<br>${drinks[customer.want].icon} ${drinks[customer.want].name}</div>
        </div>
      `).join("");
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove("show"), 2200);
    }

    function floatScore(message, positive = true) {
      const el = document.createElement("div");
      el.className = "float-score";
      el.style.color = positive ? "var(--good)" : "var(--bad)";
      el.textContent = message;
      scene.appendChild(el);
      setTimeout(() => el.remove(), 1100);
    }

    function makeDrink(drinkKey) {
      if (isMaking) {
        showToast("奶茶正在制作中，请稍等 2 秒哦！");
        return;
      }
      if (madeDrink) {
        showToast("出餐台已有奶茶，先服务顾客再制作新的吧！");
        return;
      }
      if (!state.unlockedDrinks.includes(drinkKey)) {
        showToast(`${drinks[drinkKey].name} 还没有解锁，先升级店铺吧！`);
        return;
      }

      isMaking = true;
      timer.classList.add("show");
      timerFill.style.width = "0%";
      let remaining = 2.0;
      const startedAt = Date.now();
      timerText.textContent = `正在制作 ${drinks[drinkKey].icon} ${drinks[drinkKey].name}：2.0 秒`;
      render();

      const interval = setInterval(() => {
        const elapsed = (Date.now() - startedAt) / 1000;
        const progress = Math.min(100, (elapsed / 2) * 100);
        remaining = Math.max(0, 2 - elapsed);
        timerFill.style.width = `${progress}%`;
        timerText.textContent = `正在制作 ${drinks[drinkKey].icon} ${drinks[drinkKey].name}：${remaining.toFixed(1)} 秒`;

        if (elapsed >= 2) {
          clearInterval(interval);
          madeDrink = drinkKey;
          isMaking = false;
          timer.classList.remove("show");
          timerFill.style.width = "0%";
          showToast(`${drinks[drinkKey].name} 做好啦，快服务顾客吧！`);
          render();
        }
      }, 80);
    }

    function serveCustomer() {
      if (!customers.length) {
        showToast("现在还没有顾客排队哦。");
        return;
      }
      if (!madeDrink) {
        showToast("还没有奶茶，先点击制作按钮吧！");
        return;
      }

      const customer = customers[0];
      const matched = madeDrink === customer.want;
      const customerEl = customerList.querySelector(`[data-id="${customer.id}"]`);
      if (customerEl) customerEl.classList.add("leaving");

      setTimeout(() => {
        customers.shift();
        if (matched) {
          const income = getPrice(madeDrink);
          state.coins += income;
          state.satisfaction += 1;
          floatScore(`+${income} 金币  +1 满意度`, true);
          showToast(`顾客超满意！卖出 ${drinks[madeDrink].name}，获得 ${income} 金币。`);
        } else {
          state.coins = Math.max(0, state.coins - 3);
          floatScore("-3 金币，顾客生气离开", false);
          showToast(`做错啦！顾客想喝 ${drinks[customer.want].name}，扣 3 金币。`);
        }
        madeDrink = null;
        saveGame();
        render();
      }, 380);
    }

    function addCustomer() {
      if (customers.length >= 3) return;
      const pool = state.unlockedDrinks.length ? state.unlockedDrinks : ["original"];
      const want = pool[Math.floor(Math.random() * pool.length)];
      const avatar = avatars[Math.floor(Math.random() * avatars.length)];
      customers.push({
        id: `${Date.now()}-${Math.random().toString(16).slice(2)}`,
        want,
        avatar
      });
      render();
      showToast("新顾客来啦，看看 TA 想喝什么！");
    }

    function scheduleNextCustomer() {
      const delay = 10000 + Math.floor(Math.random() * 5001);
      customerTimer = setTimeout(() => {
        addCustomer();
        scheduleNextCustomer();
      }, delay);
    }

    function upgradeShop() {
      const need = upgradeNeeds[state.level];
      if (!need) {
        showToast("已经是最高级店铺啦！");
        return;
      }
      if (state.coins < need) {
        showToast(`金币还不够，升级需要 ${need} 金币。`);
        return;
      }
      state.coins -= need;
      setLevel(state.level + 1);
      celebrate();
      const unlockedNow = getUnlockedByLevel(state.level)
        .map(key => drinks[key].name)
        .join("、");
      showToast(`升级成功！现在是 ${levelNames[state.level]}，已解锁：${unlockedNow}`);
    }

    function celebrate() {
      scene.animate(
        [
          { transform: "scale(1)", filter: "brightness(1)" },
          { transform: "scale(1.018)", filter: "brightness(1.1)" },
          { transform: "scale(1)", filter: "brightness(1)" }
        ],
        { duration: 700, easing: "ease-out" }
      );

      const colors = ["#FF8FBD", "#FFC94A", "#5FCB8F", "#BDEFFF", "#D7C5FF", "#FFB86B"];
      for (let i = 0; i < 70; i++) {
        const piece = document.createElement("div");
        piece.className = "confetti";
        piece.style.left = `${Math.random() * 100}%`;
        piece.style.background = colors[Math.floor(Math.random() * colors.length)];
        piece.style.animationDelay = `${Math.random() * 0.35}s`;
        piece.style.transform = `rotate(${Math.random() * 180}deg)`;
        confettiLayer.appendChild(piece);
        setTimeout(() => piece.remove(), 2100);
      }
    }

    makeButtons.forEach(button => {
      button.addEventListener("click", () => makeDrink(button.dataset.drink));
    });

    serveBtn.addEventListener("click", serveCustomer);
    upgradeBtn.addEventListener("click", upgradeShop);

    loadGame();
    ensureUnlockedByLevel();
    saveGame();
    render();
    setTimeout(addCustomer, 900);
    scheduleNextCustomer();
  </script>
</body>
</html>
