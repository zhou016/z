    async function fetchModels(){var c=readApi();if(!c.base||!c.key)return apiStatus('请先填写 API Base URL 和 API Key','err');apiStatus('正在拉取模型...','');try{var r=await fetch(modelsUrl(c.base),{headers:{Authorization:'Bearer '+c.key}});if(!r.ok)throw new Error('HTTP '+r.status);var j=await r.json(),ms=(j.data||[]).map(function(x){return x.id}).filter(Boolean);$('modelList').innerHTML='';ms.forEach(function(m){var o=document.createElement('option');o.value=m;o.textContent=m;$('modelList').appendChild(o)});apiStatus('已拉取 '+ms.length+' 个模型','ok')}catch(e){apiStatus('拉取失败：'+e.message,'err')}}

    function pump(){if(typing)return;typing=true;(function step(){if(!queue||!range){typing=false;return}var ch=queue.slice(0,1);queue=queue.slice(1);out+=ch;insert({s:range.s,e:range.s+out.length-ch.length},out);setTimeout(step,8)})()}
    async function runAi(action,custom,scope){scope=scope||'selection';var r=scope==='full'?{s:0,e:editor.value.length,sel:true}:{s:editor.selectionStart,e:editor.selectionEnd,sel:editor.selectionStart!==editor.selectionEnd};var txt=editor.value.slice(r.s,r.e),full=editor.value,failed=false;if(scope!=='full'&&!r.sel)return toast('请先选中文字；全文操作请用左侧菜单');if(!txt.trim())return toast('没有可处理的文本');var c=loadApi(activePlatform());if(!c.base||!c.key||!c.model){$('platformSelect').value=activePlatform();fillApi($('platformSelect').value);openModal('apiModal');return apiStatus('请先填写 API 设置并保存。','err')}hideSelectionAi();hist(true);aborter=new AbortController();stopBtn.classList.remove('hidden');range={s:r.s,e:r.e};out='';queue='';insert(range,'');range.e=range.s;try{var res=await fetch(chatUrl(c.base),{method:'POST',headers:{'Content-Type':'application/json',Authorization:'Bearer '+c.key},signal:aborter.signal,body:JSON.stringify({model:c.model,stream:true,messages:[{role:'system',content:'你是中文写作助手。严格按用户要求输出正文，不要解释，不要输出 Markdown 包裹。'},{role:'user',content:promptOf(action,txt,custom,full,scope)}]})});if(!res.ok)throw new Error('HTTP '+res.status);if(!res.body)throw new Error('当前浏览器不支持流式读取');var rd=res.body.getReader(),dec=new TextDecoder('utf-8'),buf='';while(true){var x=await rd.read();if(x.done)break;buf+=dec.decode(x.value,{stream:true});var lines=buf.split('\n');buf=lines.pop()||'';lines.forEach(function(line){line=line.trim();if(!line.startsWith('data:'))return;var raw=line.slice(5).trim();if(raw==='[DONE]')return;try{var j=JSON.parse(raw),d=j.choices&&j.choices[0]&&j.choices[0].delta&&j.choices[0].delta.content;if(d){queue+=d;pump()}}catch(e){}})}toast('AI 生成完成')}catch(e){if(e.name==='AbortError')toast('已停止生成');else{failed=true;insert({s:r.s,e:r.s+out.length},txt);toast('AI 生成失败：'+e.message)}}finally{aborter=null;stopBtn.classList.add('hidden');if(!failed)recordAiFinal();save()}}
    async function runSlashContinue(){if(slashIndex<0||editor.value.charAt(slashIndex)!=='/')return hideSlashPopup();var before=editor.value.slice(0,slashIndex);if(!before.trim()){hideSlashPopup();return toast('斜杠前没有可续写内容')}var c=loadApi(activePlatform()),failed=false;if(!c.base||!c.key||!c.model){hideSlashPopup();$('platformSelect').value=activePlatform();fillApi($('platformSelect').value);openModal('apiModal');return apiStatus('请先填写 API 设置并保存。','err')}hideSlashPopup();hist(true);aborter=new AbortController();stopBtn.classList.remove('hidden');range={s:slashIndex,e:slashIndex+1};out='';queue='';insert(range,'');range.e=range.s;try{var res=await fetch(chatUrl(c.base),{method:'POST',headers:{'Content-Type':'application/json',Authorization:'Bearer '+c.key},signal:aborter.signal,body:JSON.stringify({model:c.model,stream:true,messages:[{role:'system',content:'你是中文续写助手。只输出续写正文，不要解释，不要重复前文。'},{role:'user',content:continuePrompt(before)}]})});if(!res.ok)throw new Error('HTTP '+res.status);if(!res.body)throw new Error('当前浏览器不支持流式读取');var rd=res.body.getReader(),dec=new TextDecoder('utf-8'),buf='';while(true){var x=await rd.read();if(x.done)break;buf+=dec.decode(x.value,{stream:true});var lines=buf.split('\n');buf=lines.pop()||'';lines.forEach(function(line){line=line.trim();if(!line.startsWith('data:'))return;var raw=line.slice(5).trim();if(raw==='[DONE]')return;try{var j=JSON.parse(raw),d=j.choices&&j.choices[0]&&j.choices[0].delta&&j.choices[0].delta.content;if(d){queue+=d;pump()}}catch(e){}})}toast('续写完成')}catch(e){if(e.name==='AbortError')toast('已停止生成');else{failed=true;insert({s:slashIndex,e:slashIndex+out.length},'/');toast('续写失败：'+e.message)}}finally{slashIndex=-1;aborter=null;stopBtn.classList.add('hidden');if(!failed)recordAiFinal();save()}}
    function recordAiFinal(){setTimeout(function(){if(queue||typing)return recordAiFinal();hist(true)},30)}

    $('menuBtn').onclick=openSide;$('closeSidebar').onclick=closeSide;$('sidebarBackdrop').onclick=closeSide;$('modalBackdrop').onclick=closeModals;document.querySelectorAll('[data-close-modal]').forEach(function(b){b.onclick=closeModals});

    $('clearSpecialBtn').onclick=function(){transform(function(t){return t.replace(/[＃#＊*﹡\-‐‑‒–—―－﹣]/g,'')});toast('已清除特殊符号')};$('clearLeadSpacesBtn').onclick=function(){transform(function(t){return t.replace(/^[ \t　]+/gm,'')});toast('已清除段首空格')};$('indentBtn').onclick=function(){transform(function(t){return t.split(/\n/).map(function(l){return l.trim()?'　　'+l.replace(/^[ \t　]+/,''):l}).join('\n')});toast('已首行缩进两格')};$('clearBlankBtn').onclick=function(){transform(function(t){return t.replace(/^\s*[\r\n]/gm,'')});toast('已清除空行')};
    $('clearAllBtn').onclick=function(){if(!confirm('确定清空当前文本吗？此操作可用撤销恢复。'))return;hist(true);setVal('',0,0)};$('repairBtn').onclick=function(){var v=editor.value,s=editor.selectionStart,e=editor.selectionEnd;editor.value='1';paint();requestAnimationFrame(function(){editor.value=v;editor.setSelectionRange(s,e);editor.focus();sync();toast('文本框已修复')})};
