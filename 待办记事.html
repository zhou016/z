<body>
  <main class="app">
    <section class="assistant-row glass">
      <div class="assistant-info">
        <div class="ai-badge">AI</div>
        <div>
          <h1>AI小助手</h1>
          <p id="assistantSuggestion">加油，今天任务不多，轻松搞定！</p>
        </div>
      </div>
      <div class="progress-box" aria-label="待办进度">
        <div class="progress-meta">
          <span id="progressText">已完成 0 / 总数 0</span>
          <span id="progressPercent">0%</span>
        </div>
        <div class="progress"><div class="progress-fill" id="progressFill"></div></div>
      </div>
    </section>

    <nav class="top-actions glass" aria-label="功能导航">
      <button class="nav-btn" id="folderPanelBtn" data-panel="folder" type="button" aria-label="文件夹" title="文件夹"><span class="icon">📁</span></button>
      <button class="nav-btn" id="summaryPanelBtn" data-panel="summary" type="button" aria-label="任务概述" title="任务概述"><span class="icon">📊</span></button>
      <span class="top-spacer"></span>
      <button class="nav-btn" id="forumPanelBtn" data-panel="forum" type="button" aria-label="论坛" title="论坛"><span class="icon">💬</span></button>
      <button class="nav-btn" id="aiPanelBtn" data-panel="ai" type="button" aria-label="AI配置" title="AI配置"><span class="icon">⚙️</span></button>
    </nav>

    <section class="main">
      <section class="context-panel glass" id="contextPanel"></section>

      <section class="todo-board glass">
        <div class="board-head">
          <div class="board-title">
            <h2>待办事项</h2>
            <span id="listSummary">全部文件夹：当前显示 0 项，共 0 项</span>
          </div>
          <div class="filters" role="tablist" aria-label="待办筛选">
            <button class="filter-btn active" data-filter="all" type="button">全部</button>
            <button class="filter-btn" data-filter="active" type="button">未完成</button>
            <button class="filter-btn" data-filter="completed" type="button">已完成</button>
          </div>
        </div>
        <div class="todo-list" id="todoList"></div>
      </section>
    </section>

    <section class="bottom-composer glass" aria-label="待办输入区">
      <select id="priorityInput" aria-label="选择优先级">
        <option value="high">高优先级</option>
        <option value="medium" selected>中优先级</option>
        <option value="low">低优先级</option>
      </select>
      <select id="folderInput" aria-label="选择保存文件夹"></select>
      <textarea id="todoInput" placeholder="输入待办内容，长文本可点击 AI 自动拆分。连续按三次“发送”会紧急保存并刷新页面。"></textarea>
      <button class="primary-btn" id="sendBtn" type="button">发送</button>
      <button class="secondary-btn" id="aiSplitBtn" type="button">AI</button>
    </section>
  </main>

  <section class="password-gate" id="passwordGate" aria-label="首次打开密码验证">
    <div class="password-card">
      <h2>需要密码</h2>
      <p>新设备首次打开需要输入密码，验证成功后本设备将自动记住。</p>
      <div class="password-row">
        <input id="passwordInput" type="password" placeholder="请输入密码" autocomplete="current-password" />
        <button class="primary-btn" id="passwordSubmitBtn" type="button">进入</button>
      </div>
      <div class="password-error" id="passwordError" aria-live="polite"></div>
    </div>
  </section>

  <div class="toast" id="toast"></div>

  <script>
    const TODO_KEY = "smartTodoNotebook.todos.v1";
    const CONFIG_KEY = "smartTodoNotebook.aiConfig.v1";
    const ACTIVE_PLATFORM_KEY = "smartTodoNotebook.activePlatform.v1";
    const FOLDER_KEY = "smartTodoNotebook.folders.v1";
    const ACTIVE_FOLDER_KEY = "smartTodoNotebook.activeFolder.v1";
    const EMERGENCY_STATE_KEY = "smartTodoNotebook.emergencyState.v1";
    const DEVICE_AUTH_KEY = "smartTodoNotebook.deviceAuth.v1";
    const FIRST_OPEN_PASSWORD = "456258";

    const defaultFolder = { id: "inbox", name: "默认文件夹", createdAt: 0 };
    const priorityWeight = { high: 1, medium: 2, low: 3 };
    const priorityLabel = { high: "高", medium: "中", low: "低" };
    const defaultConfigs = {
      deepseek: { apiBase: "https://api.deepseek.com/chat/completions", modelName: "deepseek-chat", apiKey: "" },
      siliconflow: { apiBase: "https://api.siliconflow.cn/v1/chat/completions", modelName: "Qwen/Qwen2.5-7B-Instruct", apiKey: "" },
      custom: { apiBase: "", modelName: "", apiKey: "" }
    };

    let folders = loadFolders();
    let activeFolderId = localStorage.getItem(ACTIVE_FOLDER_KEY) || "all";
    let todos = loadTodos();
    let aiConfigs = loadConfigs();

    function loadTodos() {
      try {
        const saved = JSON.parse(localStorage.getItem(TODO_KEY) || "[]");
        return Array.isArray(saved) ? saved.map(item => ({ ...item, folderId: item.folderId || defaultFolder.id })) : [];
      } catch {
        return [];
      }
    }

    function loadFolders() {
      try {
        const saved = JSON.parse(localStorage.getItem(FOLDER_KEY) || "[]");
        const valid = Array.isArray(saved) ? saved.filter(item => item && item.id && item.name) : [];
        return valid.some(item => item.id === defaultFolder.id) ? valid : [defaultFolder, ...valid];
      } catch {
        return [defaultFolder];
      }
    }

    function loadConfigs() {
      try {
        const saved = JSON.parse(localStorage.getItem(CONFIG_KEY) || "{}");
        return {
          deepseek: { ...defaultConfigs.deepseek, ...(saved.deepseek || {}) },
          siliconflow: { ...defaultConfigs.siliconflow, ...(saved.siliconflow || {}) },
          custom: { ...defaultConfigs.custom, ...(saved.custom || {}) }
        };
      } catch {
        return JSON.parse(JSON.stringify(defaultConfigs));
      }
    }

    function saveTodos() {
      localStorage.setItem(TODO_KEY, JSON.stringify(todos));
    }

    function saveFolders() {
      localStorage.setItem(FOLDER_KEY, JSON.stringify(folders));
      localStorage.setItem(ACTIVE_FOLDER_KEY, activeFolderId);
    }

    function saveConfigs() {
      localStorage.setItem(CONFIG_KEY, JSON.stringify(aiConfigs));
      localStorage.setItem(ACTIVE_PLATFORM_KEY, activePlatform);
    }

    function emergencySave() {
      saveTodos();
      saveFolders();
      saveConfigs();
      localStorage.setItem(EMERGENCY_STATE_KEY, JSON.stringify({
        draft: todoInput.value,
        priority: priorityInput.value,
        folder: folderInput.value,
        filter: currentFilter,
        panel: activePanel,
        forumPosts,
        savedAt: Date.now()
      }));
    }

    function restoreEmergencyState() {
      try {
        const state = JSON.parse(localStorage.getItem(EMERGENCY_STATE_KEY) || "{}");
        if (!state || !state.savedAt) return;
        if (state.draft) todoInput.value = state.draft;
        if (state.priority) priorityInput.value = state.priority;
        if (state.filter) currentFilter = state.filter;
        if (Array.isArray(state.forumPosts)) forumPosts = state.forumPosts;
        if (state.panel) activePanel = state.panel;
        localStorage.removeItem(EMERGENCY_STATE_KEY);
        showToast("已恢复刷新前的界面内容");
      } catch {}
    }

    function getFolderName(folderId) {
      if (folderId === "all") return "全部文件夹";
      return folders.find(folder => folder.id === folderId)?.name || defaultFolder.name;
    }

    function sortTodos(items) {
      return [...items].sort((a, b) => {
        const priorityDiff = priorityWeight[a.priority] - priorityWeight[b.priority];
        if (priorityDiff !== 0) return priorityDiff;
        return a.createdAt - b.createdAt;
      });
    }

    function getVisibleTodos() {
      const folderFiltered = activeFolderId === "all"
        ? todos
        : todos.filter(item => (item.folderId || defaultFolder.id) === activeFolderId);
      const sorted = sortTodos(folderFiltered);
      if (currentFilter === "active") return sorted.filter(item => !item.completed);
      if (currentFilter === "completed") return sorted.filter(item => item.completed);
      return sorted;
    }

    function addTodo(text, priority = priorityInput.value, folderId = folderInput.value || defaultFolder.id) {
      const cleanText = text.trim();
      if (!cleanText) return false;
      todos.push({
        id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now() + Math.random()),
        text: cleanText,
        priority,
        folderId,
        completed: false,
        createdAt: Date.now() + Math.random()
      });
      saveTodos();
      render();
      return true;
    }

    function toggleTodo(id) {
      todos = todos.map(item => item.id === id ? { ...item, completed: !item.completed } : item);
      saveTodos();
      render();
    }

    function deleteTodo(id) {
      todos = todos.filter(item => item.id !== id);
      saveTodos();
      render();
    }

      if (activeFolderId === "all" || activeFolderId === defaultFolder.id) return showToast("默认文件夹不能删除");
      const name = getFolderName(activeFolderId);
      const hasTodos = todos.some(item => (item.folderId || defaultFolder.id) === activeFolderId);

    async function splitWithAI(rawText) {
      const config = aiConfigs[activePlatform];
      if (!config.apiBase || !config.modelName || !config.apiKey) return localSplit(rawText);
      const response = await fetch(config.apiBase, {
        method: "POST",
        headers: { "Content-Type": "application/json", "Authorization": `Bearer ${config.apiKey}` },
        body: JSON.stringify({
          model: config.modelName,
          messages: [
            { role: "system", content: "你是待办拆分助手。请把用户输入拆分成清晰、可执行的待办事项，只返回 JSON 字符串数组，不要解释，不要 Markdown。" },
            { role: "user", content: rawText }
          ],
          temperature: 0.2
        })
      });
      if (!response.ok) throw new Error(await response.text());
      const data = await response.json();
      const content = data?.choices?.[0]?.message?.content || data?.choices?.[0]?.text || "";
      const parsed = parseTaskArray(content);
      return parsed.length ? parsed : localSplit(rawText);
    }

    function parseTaskArray(content) {
      const clean = content.trim().replace(/^```json/i, "").replace(/^```/, "").replace(/```$/, "").trim();
      try {
        const parsed = JSON.parse(clean);
        if (Array.isArray(parsed)) return parsed.map(item => String(item).trim()).filter(Boolean);
      } catch {
        const match = clean.match(/\[[\s\S]*\]/);
        if (match) {
          try {
            const parsed = JSON.parse(match[0]);
            if (Array.isArray(parsed)) return parsed.map(item => String(item).trim()).filter(Boolean);
          } catch {}
        }
      }
      return localSplit(clean);
    }

    function localSplit(rawText) {
      return rawText
        .split(/\n+|[。；;]|(?:，(?=\S{2,}))|(?:、(?=\S{2,}))/)
        .map(item => item.replace(/^[-*•\d.、\s]+/, "").trim())
        .filter(Boolean);
    }

        forumPosts = generateForumPosts();
        emergencySave();
        showToast("AI 生成失败，已使用本地规则生成 50 条");

        forumLoading = false;
        renderForumPanel();
      }

    async function generateForumPostsWithAI() {
      const config = aiConfigs[activePlatform];
      if (!config.apiBase || !config.modelName || !config.apiKey) throw new Error("未配置 AI API");
      const systemPrompt = [
        "你是高质量 AI 论坛模拟器，只能输出 JSON 数组，不要 Markdown，不要解释。",
        "必须一次生成 50 条论坛发言，每条代表 1 位不同领域专家。",
        "必须覆盖且只覆盖这些领域：管理学、心理学、婚姻学、人际关系学、职场。",
        "5 个领域尽量均衡分布，每个领域约 10 条。",
        "每条发言都要贴合对应专家的专业视角，体现领域特性，内容要有深度，不能空泛鸡汤。",
        "50 条发言的专家身份、标题、观点和表达角度必须各不相同，不得重复或近似重复。",
        "当用户刷新时，视为全新一轮论坛，必须重新生成 50 条，不沿用上一轮表达。",
        "返回格式严格为 JSON 数组，每个对象包含 category、title、body 三个字段。",
        "category 只能是：管理学、心理学、婚姻学、人际关系学、职场。",
        "title 格式建议为：专家身份｜发言主题。",
        "body 为中文，建议 90 到 160 字，包含专业判断、原因解释和可执行建议。"
      ].join("\n");
      const response = await fetch(config.apiBase, {
        method: "POST",
        headers: { "Content-Type": "application/json", "Authorization": `Bearer ${config.apiKey}` },
        body: JSON.stringify({
          model: config.modelName,
          messages: [
            { role: "system", content: systemPrompt },
            { role: "user", content: `请生成第 ${forumRefreshCount + 1} 轮全新的 50 位专家论坛发言。当前时间种子：${Date.now()}。` }
          ],
          temperature: 0.85
        })
      });
      if (!response.ok) throw new Error(await response.text());
      const data = await response.json();
      const content = data?.choices?.[0]?.message?.content || data?.choices?.[0]?.text || "";
      const parsed = parseForumPosts(content);
      if (parsed.length !== 50) throw new Error(`AI 返回数量不符合要求：${parsed.length}`);
      forumRefreshCount += 1;
      return parsed;
    }

    function parseForumPosts(content) {
      const clean = String(content || "").trim().replace(/^```json/i, "").replace(/^```/, "").replace(/```$/, "").trim();
      let raw = null;
      try {
        raw = JSON.parse(clean);
      } catch {
        const match = clean.match(/\[[\s\S]*\]/);
        if (match) {
          try {
            raw = JSON.parse(match[0]);
          } catch {}
        }
      }
      if (!Array.isArray(raw)) return [];
      const allowed = new Set(["管理学", "心理学", "婚姻学", "人际关系学", "职场"]);
      const seen = new Set();
      return raw
        .map(item => ({
          category: String(item?.category || "").trim(),
          title: String(item?.title || "").trim(),
          body: String(item?.body || "").trim()
        }))
        .filter(item => allowed.has(item.category) && item.title && item.body)

          seen.add(key);
          return true;
        })
        .slice(0, 50);
    }

    function formatTime(timestamp) {
      const date = new Date(timestamp);
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      const hour = String(date.getHours()).padStart(2, "0");
      const minute = String(date.getMinutes()).padStart(2, "0");
      return `${month}-${day} ${hour}:${minute}`;
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, char => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[char]));
    }

    function escapeAttr(value) {
      return escapeHtml(value).replace(/`/g, "&#96;");
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(() => toast.classList.remove("show"), 2400);
    }

    function initPasswordGate() {
      if (localStorage.getItem(DEVICE_AUTH_KEY) === "passed") {
        passwordGate.classList.remove("show");
        return;
      }
      passwordGate.classList.add("show");
      window.setTimeout(() => passwordInput.focus(), 80);
    }

    function verifyPassword() {
      if (passwordInput.value === FIRST_OPEN_PASSWORD) {
        localStorage.setItem(DEVICE_AUTH_KEY, "passed");
        passwordGate.classList.remove("show");
        passwordError.textContent = "";
        passwordInput.value = "";
        showToast("验证成功，欢迎使用");
      } else {
        passwordError.textContent = "密码错误，请重新输入";
        passwordInput.select();
      }
    }

    sendBtn.addEventListener("click", () => {
      const now = Date.now();
      sendClickCount = now - lastSendClickAt < 900 ? sendClickCount + 1 : 1;
      lastSendClickAt = now;
      if (sendClickCount >= 3) {
        emergencySave();
        showToast("已紧急保存，正在刷新页面");
        window.setTimeout(() => window.location.reload(), 300);
        return;
      }

      if (addTodo(todoInput.value, priorityInput.value, folderInput.value)) {
        todoInput.value = "";
        emergencySave();
        showToast("待办已发送");
      } else {
        showToast("请输入待办内容");
      }
    });

    aiSplitBtn.addEventListener("click", async () => {
      const rawText = todoInput.value.trim();
      if (!rawText) return showToast("请先输入需要拆分的内容");
      aiSplitBtn.disabled = true;
      aiSplitBtn.textContent = "处理中";
      try {
        const tasks = await splitWithAI(rawText);
        tasks.forEach(task => addTodo(task, priorityInput.value, folderInput.value));
        todoInput.value = "";
        emergencySave();
        showToast(`已拆分并添加 ${tasks.length} 项待办`);
      } catch (error) {
        const fallback = localSplit(rawText);
        fallback.forEach(task => addTodo(task, priorityInput.value, folderInput.value));
        todoInput.value = "";
        emergencySave();
        showToast(`AI 请求失败，已使用本地规则添加 ${fallback.length} 项`);
        console.warn("AI 拆分失败：", error);
      } finally {
        aiSplitBtn.disabled = false;
        aiSplitBtn.textContent = "AI";
      }
    });

    todoInput.addEventListener("keydown", event => {
      if ((event.metaKey || event.ctrlKey) && event.key === "Enter") sendBtn.click();
    });

    folderInput.addEventListener("change", () => {
      if (activeFolderId !== "all") {
        activeFolderId = folderInput.value;
        saveFolders();
        render();
      }
      emergencySave();
    });

    document.querySelectorAll(".filter-btn").forEach(button => {
      button.addEventListener("click", () => {
        currentFilter = button.dataset.filter;
        emergencySave();
        render();
      });
    });

        const panel = button.dataset.panel;
        activePanel = activePanel === panel ? "" : panel;
        emergencySave();
        renderPanel(activePanel);
        renderNav();
      });
    });

    passwordSubmitBtn.addEventListener("click", verifyPassword);
    passwordInput.addEventListener("keydown", event => {
      if (event.key === "Enter") verifyPassword();
    });

    window.addEventListener("beforeunload", emergencySave);

    initPasswordGate();
    restoreEmergencyState();
    render();
