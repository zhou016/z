  state.todos.forEach((t, i) => {
    html += `<div class="todo-item">
      <div class="todo-check${t.done ? ' done' : ''}" onclick="toggleTodo(${i})"></div>
      <span class="todo-text${t.done ? ' done' : ''}">${escHtml(t.text)}</span>
      <button style="background:none;border:none;color:var(--red);font-size:18px;cursor:pointer;padding:4px;" onclick="deleteTodo(${i})">×</button>
    </div>`;
  });
  html += '</div>';
  list.innerHTML = html;
}

function showAddTodo() {
  showModal(`
    <div class="modal-title">新建待办</div>
    <div class="input-group">
      <label>输入待办内容</label>
      <textarea id="todoInput" rows="4" placeholder="输入待办事项...&#10;提示：如果配置了AI，输入一串文字可以自动拆分成多条待办"></textarea>
    </div>
    <div style="display:flex;gap:12px;margin-top:8px;">
      <button class="btn btn-gray" style="flex:1;" onclick="closeModal()">取消</button>
      ${state.settings.key ? `<button class="btn btn-primary" style="flex:1;" onclick="aiSplitTodo()">AI拆分</button>` : ''}
      <button class="btn btn-green" style="flex:1;" onclick="addTodo()">添加</button>
    </div>
  `);
}

function addTodo() {
  const text = document.getElementById('todoInput').value.trim();
  if (!text) { showToast('请输入内容'); return; }
  state.todos.push({ text, done: false, createdAt: Date.now() });
  saveState();
  renderTodos();
  closeModal();
  showToast('已添加');
}

async function aiSplitTodo() {
  const text = document.getElementById('todoInput').value.trim();
  if (!text) { showToast('请输入内容'); return; }
  if (!state.settings.key) { showToast('请先配置AI'); return; }

  showToast('AI拆分中...');
  const result = await callAI(
    [{ role: 'user', content: text }],
    `你是一个待办事项助手。请将用户输入的文字拆分成多个独立的待办事项。每行一个待办，格式为：- 待办内容。不要添加其他解释。`
  );

  if (result) {
    const items = result.split('\n').map(l => l.replace(/^[-*]\s*/, '').trim()).filter(l => l);
    items.forEach(item => {
      state.todos.push({ text: item, done: false, createdAt: Date.now() });
    });
    saveState();
    renderTodos();
    closeModal();
    showToast(`已拆分为${items.length}条待办`);
  }
}

function toggleTodo(idx) {
  state.todos[idx].done = !state.todos[idx].done;
  saveState();
  renderTodos();
}

function deleteTodo(idx) {
  state.todos.splice(idx, 1);
  saveState();
  renderTodos();
}

// ========== Utilities ==========
function escHtml(str) {
  if (!str) return '';
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function autoResize(el) {
  el.style.height = 'auto';
  const lineHeight = parseFloat(getComputedStyle(el).lineHeight) || 21;
  const maxHeight = lineHeight * 5;
  const targetHeight = Math.min(el.scrollHeight, maxHeight);
  el.style.height = targetHeight + 'px';
  el.style.overflowY = el.scrollHeight > maxHeight ? 'auto' : 'hidden';
}

function applyChatFontSize() {
  const size = state.settings.fontSize || 17;
  document.documentElement.style.setProperty('--chat-font-size', size + 'px');
}

// Resize image to max 256x256 base64 (jpeg) to keep localStorage small
function resizeImageToBase64(file, maxSize, cb) {
  const reader = new FileReader();
  reader.onload = function(e) {
    const img = new Image();
    img.onload = function() {
      let { width, height } = img;
      if (width > height) { if (width > maxSize) { height = Math.round(height * maxSize / width); width = maxSize; } }
      else { if (height > maxSize) { width = Math.round(width * maxSize / height); height = maxSize; } }
      const canvas = document.createElement('canvas');
      canvas.width = width; canvas.height = height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, width, height);
      cb(canvas.toDataURL('image/jpeg', 0.85));
    };
    img.onerror = () => cb(null);
    img.src = e.target.result;
  };
  reader.onerror = () => cb(null);
  reader.readAsDataURL(file);
}

// ========== User Identity (Masks) ==========
function renderUserProfiles() {
  const list = document.getElementById('userProfileList');
  if (!list) return;
  if (state.userProfiles.length === 0) {
    list.innerHTML = `<div style="text-align:center;color:var(--text2);font-size:13px;padding:12px;">暂无面具，点击下方新增</div>`;
    return;
  }
  const editIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`;
  const delIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>`;
  let html = '';
  state.userProfiles.forEach((p, i) => {
    const active = state.currentUserProfileId === p.id;
    const av = p.avatar ? `<img class="avatar-img" src="${p.avatar}" alt="">` : '🙂';
    html += `<div class="uprofile-card${active ? ' active' : ''}" onclick="selectUserProfile(${p.id})">
      <div class="pa">${av}</div>
      <div class="pi">
        <div class="pn">${escHtml(p.name || '未命名')}</div>
        <div class="pd">${escHtml(p.identity || (p.desc || '无身份'))}</div>
      </div>
      <div class="pops" onclick="event.stopPropagation()">
        <button onclick="editUserProfile(${p.id})" title="编辑">${editIcon}</button>
        <button class="danger" onclick="deleteUserProfile(${p.id})" title="删除">${delIcon}</button>
      </div>
    </div>`;
  });
  list.innerHTML = html;
}

function selectUserProfile(id) {
  state.currentUserProfileId = id;
  saveState();
  renderUserProfiles();
  const p = state.userProfiles.find(x => x.id === id);
  if (p) showToast(`已切换为「${p.name}」`);
}

function getCurrentUserProfile() {
  if (state.currentUserProfileId === null) return null;
  return state.userProfiles.find(p => p.id === state.currentUserProfileId) || null;
}

let editingProfileId = null;

function addUserProfile() {
  editingProfileId = null;
  showProfileModal(null);
}

function editUserProfile(id) {
  const p = state.userProfiles.find(x => x.id === id);
  if (!p) return;
  editingProfileId = id;
  showProfileModal(p);
}

function deleteUserProfile(id) {
  const idx = state.userProfiles.findIndex(x => x.id === id);
  if (idx === -1) return;
  if (!confirm(`确定删除面具「${state.userProfiles[idx].name}」？`)) return;
  state.userProfiles.splice(idx, 1);
  if (state.currentUserProfileId === id) state.currentUserProfileId = state.userProfiles[0]?.id || null;
  saveState();
  renderUserProfiles();
  showToast('已删除');
}

function showProfileModal(existing) {
  const p = existing || { name: '', identity: '', desc: '', avatar: '' };
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay show';
  overlay.id = 'profileModal';
  overlay.innerHTML = `<div class="modal">
    <div class="modal-header"><span>${existing ? '编辑面具' : '新增面具'}</span><button class="close-btn" onclick="closeProfileModal()">×</button></div>
    <div class="modal-body">
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px;margin-bottom:14px;">
        <div class="avatar-upload" id="profileAvatarUpload" onclick="document.getElementById('profileAvatarInput').click()">
          ${p.avatar ? `<img src="${p.avatar}" alt="">` : '📷'}
        </div>
        <div style="font-size:12px;color:var(--text2);">点击上传头像</div>
        <input type="file" accept="image/*" id="profileAvatarInput" style="display:none;" onchange="onProfileAvatarPick(this)">
      </div>
      <div class="input-group"><label>名字</label><input id="profileNameInput" value="${escHtml(p.name)}" placeholder="例如：小明"></div>
      <div class="input-group"><label>身份</label><input id="profileIdentityInput" value="${escHtml(p.identity)}" placeholder="例如：大学生 / 程序员"></div>
      <div class="input-group"><label>身份说明（可选）</label><textarea id="profileDescInput" rows="2" placeholder="性格、背景等...">${escHtml(p.desc)}</textarea></div>
    </div>
    <div class="modal-footer"><button class="btn btn-gray" onclick="closeProfileModal()">取消</button><button class="btn" onclick="saveProfileModal()">保存</button></div>
  </div>`;
  document.body.appendChild(overlay);
}

let _profileAvatarData = '';

function onProfileAvatarPick(input) {
  const file = input.files[0];
  if (!file) return;
  _profileAvatarData = '';
  resizeImageToBase64(file, 256, (data) => {
    if (data) {
      _profileAvatarData = data;
      const el = document.getElementById('profileAvatarUpload');
      el.innerHTML = `<img src="${data}" alt="">`;
    } else {
      showToast('图片加载失败');
    }
  });
}

function saveProfileModal() {
  const name = document.getElementById('profileNameInput').value.trim() || '未命名';
  const identity = document.getElementById('profileIdentityInput').value.trim();
  const desc = document.getElementById('profileDescInput').value.trim();
  const existingEl = document.getElementById('profileAvatarUpload');
  const avatar = _profileAvatarData || (existingEl?.querySelector('img')?.src || '');

  if (editingProfileId !== null) {
    const p = state.userProfiles.find(x => x.id === editingProfileId);
    if (p) { p.name = name; p.identity = identity; p.desc = desc; p.avatar = avatar; }
  } else {
    const newP = { id: Date.now(), name, identity, desc, avatar };
    state.userProfiles.push(newP);
    if (state.currentUserProfileId === null) state.currentUserProfileId = newP.id;
  }
  _profileAvatarData = '';
  saveState();
  renderUserProfiles();
  closeProfileModal();
  showToast('已保存');
}

function closeProfileModal() {
  const m = document.getElementById('profileModal');
  if (m) m.remove();
  _profileAvatarData = '';
}

// ========== Init ==========
function init() {
  loadState();
  applyChatFontSize();
  applyStatusBar();
  updateStatusTime();
  setInterval(updateStatusTime, 10000);

  if (state.contacts.length === 0) {
    state.contacts = [
      { name: '小智', role: '一个聪明活泼的AI助手，说话幽默风趣，喜欢用网络用语，偶尔卖萌。对各种话题都有见解。', note: '默认AI角色', emoji: '🤖' },
      { name: '老王', role: '一个阅历丰富的大叔，喜欢聊人生哲理，说话稳重但偶尔冷幽默。是个退休的程序员。', note: '邻居大叔', emoji: '🧔' },
      { name: '小美', role: '一个热爱生活的年轻女生，喜欢分享美食和旅行，说话可爱，经常用颜文字和emoji。', note: '闺蜜', emoji: '👩' }
    ];
    saveState();
  }
}

init();
</script>
