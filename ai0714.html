  .session-tab {

  .message-group.ai .message-bubble { background: var(--bg-card); color: var(--text-main); border: 1px solid var(--divider-light); border-bottom-left-radius: 4px; border-left: 3px solid var(--divider-top); }

  .input-area {

  .default-badge {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 11px; color: var(--primary); font-weight: 600;
  }
  .default-badge::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--primary); }
  .test-status { font-size: 12px; padding: 8px 12px; border-radius: 8px; margin-top: 8px; display: none; }
  .test-status.show { display: block; }
  .test-status.success { background: #E8F5E9; color: var(--text-success); }
  .test-status.error { background: #FFEBEE; color: var(--text-danger); }
  .test-status.loading { background: var(--primary-light); color: var(--primary); }

  /* ===== 字体选择面板 ===== */
  .font-panel-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.35);
    display: flex; align-items: flex-end; justify-content: center;
    z-index: 300; opacity: 0; pointer-events: none; transition: opacity 0.25s ease;
  }
  .font-panel-overlay.show { opacity: 1; pointer-events: auto; }
  .font-panel {
    background: var(--bg-card); border-radius: 16px 16px 0 0;
    width: 100%; max-width: 480px; padding: 16px 0 24px;
    transform: translateY(100%); transition: transform 0.25s ease;
  }
  .font-panel-overlay.show .font-panel { transform: translateY(0); }
  .font-panel-title { text-align: center; font-size: 16px; font-weight: 600; color: var(--text-main); margin-bottom: 12px; padding: 0 16px; }
  .font-option {
    padding: 14px 24px; font-size: 15px; color: var(--text-main);
    cursor: pointer; text-align: center; transition: background 0.15s ease;
    min-height: 48px; display: flex; align-items: center; justify-content: center;
  }
  .font-option:active { background: var(--primary-light); }
  .font-option.selected { color: var(--primary); font-weight: 600; }
  .font-panel-divider { height: 1px; background: var(--divider-light); margin: 8px 16px; }
  .font-panel-cancel {
    padding: 14px 24px; font-size: 15px; color: var(--text-muted);
    cursor: pointer; text-align: center; min-height: 48px;
    display: flex; align-items: center; justify-content: center;
  }
  .font-panel-cancel:active { background: var(--primary-light); }

  /* ===== 确认对话框 ===== */
  .confirm-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.35);
    display: flex; align-items: center; justify-content: center;
    z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.2s ease;
  }
  .confirm-overlay.show { opacity: 1; pointer-events: auto; }
  .confirm-box {
    background: var(--bg-card); border-radius: 14px; width: 280px;
    padding: 24px; text-align: center; transform: scale(0.92); transition: transform 0.2s ease;
  }
  .confirm-overlay.show .confirm-box { transform: scale(1); }
  .confirm-box .title { font-size: 17px; font-weight: 600; color: var(--text-main); margin-bottom: 8px; }
  .confirm-box .desc { font-size: 14px; color: var(--text-muted); margin-bottom: 20px; line-height: 1.5; }
  .confirm-actions { display: flex; gap: 12px; }
  .confirm-actions button {
    flex: 1; padding: 10px 0; border-radius: 10px; border: none;
    font-size: 15px; cursor: pointer; transition: opacity 0.15s ease; min-height: 44px;
  }
  .confirm-actions .cancel { background: #F2F4F6; color: var(--text-main); }
  .confirm-actions .confirm { background: var(--primary); color: var(--text-white); }
  .confirm-actions button.danger { background: var(--text-danger); color: var(--text-white); }
  .confirm-actions button:active { opacity: 0.75; }

  .toast {
    position: fixed; bottom: 80px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: rgba(44,62,80,0.88); color: var(--text-white);
    padding: 10px 20px; border-radius: 20px; font-size: 13px;
    z-index: 2000; opacity: 0; pointer-events: none;
    transition: opacity 0.2s ease, transform 0.2s ease; white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ===== 消息操作按钮 ===== */
  .message-actions {
    display: flex;
    gap: 6px;
    margin-top: 4px;
    padding: 0 4px;
  }
  .msg-action-btn {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    padding: 4px 8px;
    border-radius: 8px;
    font-size: 12px;
    color: var(--text-muted);
    cursor: pointer;
    background: transparent;
    border: none;
    min-height: 28px;
    transition: all 0.15s ease;
  }
  .msg-action-btn:active { background: var(--divider-light); color: var(--text-main); }
  .msg-action-btn svg { width: 14px; height: 14px; fill: currentColor; }

  /* 顶栏修复输入框按钮 */
  .fix-input-btn {
    width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    border-radius: 12px;
    transition: background 0.2s ease;
    flex-shrink: 0;
  }
  .fix-input-btn:active { background: rgba(0,0,0,0.06); }
  .fix-input-btn svg { width: 20px; height: 20px; fill: var(--text-main); }

  /* 数字输入框 */
  .number-input {
    width: 80px;
    height: 36px;
    border: 1px solid var(--divider-top);
    border-radius: 8px;
    text-align: center;
    font-size: 15px;
    outline: none;
    color: var(--text-main);
    background: var(--bg-card);
    font-family: inherit;
  }
  .number-input:focus { border-color: var(--primary); }

  /* 角色卡片操作 */
  .role-card-actions {
    display: flex;
    gap: 8px;
    flex-shrink: 0;
    align-items: center;
  }
  .role-card-action-btn {
    width: 36px;
    height: 36px;
    min-width: 36px;
    border-radius: 50%;
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.15s ease;
    background: transparent;
  }
  .role-card-action-btn svg { width: 18px; height: 18px; fill: var(--text-muted); }
  .role-card-action-btn:active { background: var(--divider-light); }
  .role-card-action-btn.delete:active { background: #FFEBEE; }
  .role-card-action-btn.delete svg { fill: var(--text-danger); }

  /* 角色编辑弹窗 */
  .role-edit-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.35);
    display: flex; align-items: center; justify-content: center;
    z-index: 1000; opacity: 0; pointer-events: none;
    transition: opacity 0.2s ease;
  }
  .role-edit-overlay.show { opacity: 1; pointer-events: auto; }
  .role-edit-box {
    background: var(--bg-card); border-radius: 16px;
    width: 320px; max-width: 85vw; padding: 24px;
    transform: scale(0.92); transition: transform 0.2s ease;
  }
  .role-edit-overlay.show .role-edit-box { transform: scale(1); }
  .role-edit-box .re-title { font-size: 17px; font-weight: 600; color: var(--text-main); margin-bottom: 16px; }
  .role-edit-box .re-field { margin-bottom: 12px; }
  .role-edit-box .re-field label { display: block; font-size: 13px; color: var(--text-sub); margin-bottom: 6px; }
  .role-edit-box .re-field input, .role-edit-box .re-field textarea {
    width: 100%; padding: 10px 12px; border: 1px solid var(--divider-top);
    border-radius: 10px; font-size: 15px; outline: none;
    color: var(--text-main); background: var(--bg-card); font-family: inherit;
    transition: border-color 0.2s ease;
  }
  .role-edit-box .re-field input:focus, .role-edit-box .re-field textarea:focus { border-color: var(--primary); }
  .role-edit-box .re-field textarea { min-height: 60px; max-height: 147px; resize: none; overflow-y: auto; }
  .role-edit-box .re-actions { display: flex; gap: 12px; margin-top: 20px; }
  .role-edit-box .re-actions button {
    flex: 1; height: 42px; border-radius: 10px; border: none;
    font-size: 15px; cursor: pointer; transition: opacity 0.15s ease;
  }

  .role-edit-box .re-actions .re-confirm { background: var(--primary); color: var(--text-white); }
  .role-edit-box .re-actions button:active { opacity: 0.75; }
  .role-edit-box .re-actions .re-delete { background: var(--text-danger); color: var(--text-white); }
</style>
</head>

<script>
(function() {
  'use strict';

  // ===== 数据层 =====
  const roles = [

  let sessions = {}, currentRoleId = roles[0].id, currentSessionId = null, sessionCounters = {};
  let fontSize = 17, voiceEnabled = true;
  let activePlatform = 'deepseek';

  const voiceBtn = $('voiceBtn');
  const newSessionBtn = $('newSessionBtn');
  const inputArea = $('inputArea');
  const confirmOverlay = $('confirmOverlay');
  const confirmTitle = $('confirmTitle');
  const confirmDesc = $('confirmDesc');
  const confirmCancel = $('confirmCancel');
  const confirmOk = $('confirmOk');
  const roleList = $('roleList');
  const roleSearch = $('roleSearch');
  const copyMenu = $('copyMenu');
  const copyMenuBtn = $('copyMenuBtn');
  const fontPanelOverlay = $('fontPanelOverlay');
  const fontSizeItem = $('fontSizeItem');
  const fontSizeValue = $('fontSizeValue');
  const fontPanelCancel = $('fontPanelCancel');
  const themeToggle = null;
  const voiceToggle = null;
  const timeAwareToggle = $('timeAwareToggle');
  const contextLimitInput = $('contextLimitInput');
  const tokenLimitInput = $('tokenLimitInput');
  const fixInputBtn = $('fixInputBtn');
  const clearAllItem = $('clearAllItem');
  const toast = $('toast');
  const platformContent = $('platformContent');
  const platformTabs = $('platformTabs');

  let confirmCallback = null, copyTargetText = '';
  let streamingMsgEl = null, streamCursorEl = null, streamText = '', streamRawText = '';

  // ===== 工具函数 =====
  function formatTime() {
    const d = new Date();
    return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
  }
  function escapeHtml(str) { const d = document.createElement('div'); d.textContent = str; return d.innerHTML; }
  function showToast(text) { toast.textContent = text; toast.classList.add('show'); setTimeout(() => toast.classList.remove('show'), 1800); }

  // ===== Markdown 纯文本清理 =====
  // 流式安全版本：在累积文本上执行完整清理，而非仅清理单次 chunk
  function stripMarkdown(text) {
    let s = text;
    s = s.replace(/^#{1,6}\s+/gm, '');           // 标题 # ## ###
    s = s.replace(/\*\*(.+?)\*\*/g, '$1');        // **bold**
    s = s.replace(/\*(.+?)\*/g, '$1');            // *italic*
    s = s.replace(/__(.+?)__/g, '$1');            // __bold__
    s = s.replace(/_(.+?)_/g, '$1');              // _italic_
    s = s.replace(/~~(.+?)~~/g, '$1');            // ~~strike~~
    s = s.replace(/`{1,3}(.+?)`{1,3}/g, '$1');   // `code`
    s = s.replace(/\[([^\]]+)\]\([^)]+\)/g, '$1'); // [link](url)
    s = s.replace(/^!\[([^\]]*)\]\([^)]+\)/gm, ''); // ![image](url)
    s = s.replace(/^[-*+]\s+/gm, '');             // 列表前缀 - * +
    s = s.replace(/^\d+\.\s+/gm, '');             // 数字列表
    s = s.replace(/^---+$/gm, '');                 // 分割线 ---
    s = s.replace(/^===+$/gm, '');                 // ===
    s = s.replace(/^\>\s+/gm, '');                 // > blockquote
    s = s.replace(/^\s{0,3}```[\s\S]*?```/gm, ''); // 代码块
    return s;
  }

  // 流式专用：对累积全文执行清理，确保跨 chunk 的 Markdown 标记也能被正确去除
  function stripStreamText(fullText) {
    let s = fullText;
    // 标题
    s = s.replace(/^#{1,6}\s+/gm, '');
    // 加粗 ** (贪婪匹配以处理跨 chunk 情况)
    s = s.replace(/\*\*([^*]+)\*\*/g, '$1');
    // 斜体 * (排除已处理的加粗)
    s = s.replace(/\*([^*\n]+)\*/g, '$1');
    // 清理残留的孤立 *（不成对的情况）
    s = s.replace(/\*{2}/g, '');
    // 下划线加粗/斜体
    s = s.replace(/__([^_]+)__/g, '$1');
    s = s.replace(/_([^_\n]+)_/g, '$1');
    // 删除线
    s = s.replace(/~~([^~]+)~~/g, '$1');
    // 行内代码
    s = s.replace(/`{1,3}([^`]+)`{1,3}/g, '$1');
    // 链接和图片
    s = s.replace(/\[([^\]]+)\]\([^)]+\)/g, '$1');
    s = s.replace(/^!\[([^\]]*)\]\([^)]+\)/gm, '');
    // 列表前缀
    s = s.replace(/^[-*+]\s+/gm, '');
    s = s.replace(/^\d+\.\s+/gm, '');
    // 分割线
    s = s.replace(/^---+\s*$/gm, '');
    s = s.replace(/^===+\s*$/gm, '');
    // 引用
    s = s.replace(/^\>\s+/gm, '');
    // 代码块
    s = s.replace(/^\s{0,3}```[\s\S]*?```/gm, '');
    return s;
  }

  // ===== 本地存储 =====
  const STORAGE_KEY = 'ai_chat_data';
  function saveData() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        sessions, currentRoleId, currentSessionId, sessionCounters, fontSize, activePlatform,
        timeAwareEnabled, contextLimit, tokenLimit, roles
      }));
    } catch(e) { /* quota exceeded */ }
  }
  function loadData() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return false;
      const data = JSON.parse(raw);
      if (data.sessions) sessions = data.sessions;
      if (data.currentRoleId) currentRoleId = data.currentRoleId;
      if (data.currentSessionId) currentSessionId = data.currentSessionId;
      if (data.sessionCounters) sessionCounters = data.sessionCounters;
      if (data.fontSize) { fontSize = data.fontSize; document.documentElement.style.setProperty('--font-base', fontSize + 'px'); fontSizeValue.textContent = fontSize + 'px'; }
      if (data.activePlatform) activePlatform = data.activePlatform;
      if (data.timeAwareEnabled !== undefined) timeAwareEnabled = data.timeAwareEnabled;
      if (data.contextLimit !== undefined) contextLimit = data.contextLimit;
      if (data.tokenLimit !== undefined) tokenLimit = data.tokenLimit;
      if (data.roles && data.roles.length > 0) { roles.length = 0; data.roles.forEach(r => roles.push(r)); }
      return true;
    } catch(e) { return false; }
  }

  function loadPlatformConfig(key) {
    try { return JSON.parse(localStorage.getItem('ai_chat_platform_' + key)) || null; } catch(e) { return null; }
  }
  function savePlatformConfig(key, config) {
    localStorage.setItem('ai_chat_platform_' + key, JSON.stringify(config));
  }
  function getDefaultPlatform() { return localStorage.getItem('ai_chat_default_platform') || 'deepseek'; }

  // 初始化数据（优先从本地加载）
  let hasData = loadData();
  if (!hasData || !sessions[currentRoleId]) {
    roles.forEach(r => {
      sessionCounters[r.id] = (sessionCounters[r.id] || 0) + 1;
      const sid = 's_' + r.id + '_1';
      sessions[r.id] = [{
        id: sid, name: '会话' + sessionCounters[r.id],
        messages: [{ role: 'ai', text: '你好！我是' + r.name + '，有什么可以帮你的？', time: formatTime() }]
      }];
    });
    currentSessionId = sessions[currentRoleId][0].id;
  }

  let currentPage = 'chat';
  let parentPage = { role: 'chat', settings: 'chat', platform: 'settings' };

  // ===== 页面切换 =====
  function switchToPage(pageName) {
    currentPage = pageName;
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    $('page-' + pageName).classList.add('active');
    // 顶栏：对话页显示菜单按钮，子页面显示返回按钮
    if (pageName === 'chat') {
      topBarTitle.textContent = 'AI 对话';
      menuBtn.style.display = 'flex';
      $('topBackBtn').style.display = 'none';
      fixInputBtn.style.display = 'flex';
      $('topAddRoleBtn').style.display = 'none';
    } else {
      menuBtn.style.display = 'none';
      $('topBackBtn').style.display = 'flex';
      fixInputBtn.style.display = 'none';
      const isRolePage = pageName === 'role';
      $('topAddRoleBtn').style.display = isRolePage ? 'flex' : 'none';
      if (isRolePage) { topBarTitle.textContent = '角色与会话'; renderSessions(); renderRoleList(roleSearch.value.trim()); }
      else if (pageName === 'settings') topBarTitle.textContent = '设置';
      else if (pageName === 'platform') { topBarTitle.textContent = 'AI 平台接入'; renderPlatformConfig(); }
    }
  }

  // ===== 抽屉菜单 =====
  function openDrawer() { drawerOverlay.classList.add('show'); drawer.classList.add('show'); }
  function closeDrawer() { drawerOverlay.classList.remove('show'); drawer.classList.remove('show'); }
  menuBtn.addEventListener('click', openDrawer);
  drawerOverlay.addEventListener('click', closeDrawer);
  $('drawerRole').addEventListener('click', () => { closeDrawer(); setTimeout(() => switchToPage('role'), 250); });
  $('drawerSettings').addEventListener('click', () => { closeDrawer(); setTimeout(() => switchToPage('settings'), 250); });
  $('drawerClearAll').addEventListener('click', () => { closeDrawer(); showConfirm('清空所有数据', '确定要清空所有角色的所有会话吗？此操作不可恢复。', doClearAll, true); });
  $('platformItem').addEventListener('click', () => switchToPage('platform'));
  // 顶栏返回按钮：返回上一级页面
  $('topBackBtn').addEventListener('click', () => {
    switchToPage(parentPage[currentPage] || 'chat');
  });

  // ===== 角色切换 =====
  function switchRole(roleId) {
    if (roleId === currentRoleId) return;
    currentRoleId = roleId;
    renderSessions();
    renderRoleList(roleSearch.value.trim());
    const list = sessions[roleId];
    currentSessionId = list && list.length ? list[0].id : null;
    renderMessages();
    messageStream.classList.remove('show');
    requestAnimationFrame(() => requestAnimationFrame(() => messageStream.classList.add('show')));
    saveData();
  }

  // ===== 会话横条 =====
  function renderSessions() {
    sessionScroll.innerHTML = '';
    (sessions[currentRoleId] || []).forEach(sess => {
      const tab = document.createElement('div');
      tab.className = 'session-tab ' + (sess.id === currentSessionId ? 'active' : '');
      tab.innerHTML = '<span class="name">' + escapeHtml(sess.name) + '</span><span class="close">&times;</span>';
      tab.querySelector('.name').addEventListener('click', () => switchSession(sess.id));
      tab.querySelector('.close').addEventListener('click', (e) => { e.stopPropagation(); showConfirm('删除会话', '确定要删除「' + sess.name + '」吗？', () => deleteSession(sess.id)); });
      sessionScroll.appendChild(tab);
    });
    requestAnimationFrame(() => { const a = sessionScroll.querySelector('.session-tab.active'); if (a) a.scrollIntoView({behavior:'smooth',inline:'center'}); });
  }
  function switchSession(sessionId) {
    if (sessionId === currentSessionId) return;
    currentSessionId = sessionId;
    renderSessions(); renderMessages();
    messageStream.classList.remove('show');
    requestAnimationFrame(() => requestAnimationFrame(() => messageStream.classList.add('show')));
    saveData();
  }
  function deleteSession(sessionId) {
    const list = sessions[currentRoleId];
    const idx = list.findIndex(s => s.id === sessionId);
    if (idx === -1) return;
    list.splice(idx, 1);
    if (list.length === 0) {
      sessionCounters[currentRoleId]++;
      list.push({ id: 's_' + currentRoleId + '_' + Date.now(), name: '会话' + sessionCounters[currentRoleId], messages: [{ role: 'ai', text: '你好！有什么可以帮你的？', time: formatTime() }] });
      currentSessionId = list[0].id;
    } else { currentSessionId = list[0].id; }
    renderSessions(); renderMessages(); messageStream.classList.add('show');
    saveData();
  }
  newSessionBtn.addEventListener('click', () => {
    sessionCounters[currentRoleId]++;
    const s = { id: 's_' + currentRoleId + '_' + Date.now(), name: '会话' + sessionCounters[currentRoleId], messages: [{ role: 'ai', text: '你好！有什么可以帮你的？', time: formatTime() }] };
    sessions[currentRoleId].push(s);
    currentSessionId = s.id;
    renderSessions(); renderMessages(); messageStream.classList.add('show');
    saveData();
  });

  // 滑动
  let isDown = false, startX, sLeft;
  sessionScroll.addEventListener('mousedown', e => { isDown=true; startX=e.pageX-sessionScroll.offsetLeft; sLeft=sessionScroll.scrollLeft; });
  sessionScroll.addEventListener('mouseleave', () => isDown=false);
  sessionScroll.addEventListener('mouseup', () => isDown=false);
  sessionScroll.addEventListener('mousemove', e => { if(!isDown)return; e.preventDefault(); sessionScroll.scrollLeft=sLeft-(e.pageX-sessionScroll.offsetLeft-startX)*1.5; });
  sessionScroll.addEventListener('touchstart', e => { isDown=true; startX=e.touches[0].pageX-sessionScroll.offsetLeft; sLeft=sessionScroll.scrollLeft; },{passive:true});
  sessionScroll.addEventListener('touchend', () => isDown=false);
  sessionScroll.addEventListener('touchmove', e => { if(!isDown)return; sessionScroll.scrollLeft=sLeft-(e.touches[0].pageX-sessionScroll.offsetLeft-startX)*1.5; },{passive:true});

  // ===== 消息流 =====
  function renderMessages() {
    messageStream.innerHTML = '';
    streamingMsgEl = null; streamCursorEl = null; streamText = ''; streamRawText = '';
    const sess = findSession(currentRoleId, currentSessionId);
    if (!sess || !sess.messages.length) { messageStream.innerHTML = '<div class="message-placeholder">开始新对话吧</div>'; return; }
    sess.messages.forEach((msg, idx) => {
      const group = document.createElement('div');
      group.className = 'message-group ' + msg.role;
      const wrap = document.createElement('div');
      wrap.className = 'message-bubble-wrap';
      const bubble = document.createElement('div');
      bubble.className = 'message-bubble';
      bubble.dataset.index = idx;
      bubble.textContent = (msg.text || '').trim();
      wrap.appendChild(bubble);
      group.appendChild(wrap);

      // 消息操作按钮
      const actions = document.createElement('div');
      actions.className = 'message-actions';
      // 复制按钮（所有消息）
      const copyBtn = document.createElement('button');
      copyBtn.className = 'msg-action-btn';
      copyBtn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>复制';
      copyBtn.addEventListener('click', () => copyText(msg.text));
      actions.appendChild(copyBtn);
      // AI回复：重新生成按钮
      if (msg.role === 'ai') {
        const regenBtn = document.createElement('button');
        regenBtn.className = 'msg-action-btn';
        regenBtn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M17.65 6.35A7.958 7.958 0 0 0 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0 1 12 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>重新生成';
        regenBtn.addEventListener('click', () => regenerateMessage(idx));
        actions.appendChild(regenBtn);
      }
      // 用户消息：编辑按钮
      if (msg.role === 'user') {
        const editBtn = document.createElement('button');
        editBtn.className = 'msg-action-btn';
        editBtn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34a.9959.9959 0 0 0-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>编辑';
        editBtn.addEventListener('click', () => editMessage(idx));
        actions.appendChild(editBtn);
      }
      group.appendChild(actions);

      const time = document.createElement('div');
      time.className = 'message-time';
      time.textContent = msg.time || '';
      group.appendChild(time);
      messageStream.appendChild(group);
      addLongPress(bubble, msg.text);
    });
    scrollToBottom();
  }

  function copyText(text) {
    if (navigator.clipboard) {
      navigator.clipboard.writeText(text).then(() => showToast('已复制'));
    } else {
      showToast('已复制: ' + text.substring(0, 20));
    }
  }

  // 重新生成AI回复
  function regenerateMessage(aiIdx) {
    const sess = findSession(currentRoleId, currentSessionId);
    if (!sess) return;
    // 找到上一条用户消息
    let userIdx = -1;
    for (let i = aiIdx - 1; i >= 0; i--) {
      if (sess.messages[i].role === 'user') { userIdx = i; break; }
    }
    if (userIdx < 0) { showToast('找不到对应的用户消息'); return; }
    // 删除该AI回复及之后的所有消息
    sess.messages.splice(aiIdx);
    renderMessages();
    saveData();
    // 重新调用AI
    callAI(sess.messages[userIdx].text);
  }

  // 编辑用户消息
  function editMessage(userIdx) {
    const sess = findSession(currentRoleId, currentSessionId);
    if (!sess) return;
    const msg = sess.messages[userIdx];
    // 将内容填入输入框，删除该消息及之后的所有消息
    inputBox.value = msg.text;
    inputBox.style.height = 'auto';
    inputBox.style.height = Math.min(inputBox.scrollHeight, 120) + 'px';
    updateSendBtn();
    sess.messages.splice(userIdx);
    renderMessages();
    saveData();
    inputBox.focus();
    showToast('已载入编辑，修改后重新发送');
  }

  function addLongPress(el, text) {
    let timer = null;
    const start = (e) => { if(e.button&&e.button!==0)return; timer=setTimeout(()=>showCopyMenu(e,text),500); };
    const end = () => { if(timer)clearTimeout(timer);timer=null; };
    el.addEventListener('mousedown',start); el.addEventListener('mouseup',end); el.addEventListener('mouseleave',end);
    el.addEventListener('touchstart',e=>start(e.touches[0]),{passive:true}); el.addEventListener('touchend',end); el.addEventListener('touchcancel',end);
  }
  function showCopyMenu(e, text) {
    copyTargetText = text;
    const x = e.clientX||0, y = e.clientY||0;
    copyMenu.style.left = Math.max(8,Math.min(window.innerWidth-108,x-50))+'px';
    copyMenu.style.top = Math.max(8,y-50)+'px';
    copyMenu.classList.add('show');
  }
  function hideCopyMenu() { copyMenu.classList.remove('show'); }
  document.addEventListener('click', e => { if(!copyMenu.contains(e.target)) hideCopyMenu(); });
  copyMenuBtn.addEventListener('click', () => {
    if(copyTargetText) navigator.clipboard?navigator.clipboard.writeText(copyTargetText).then(()=>showToast('已复制')):showToast(copyTargetText);
    hideCopyMenu();
  });
  messageStream.addEventListener('dblclick', e => { if(e.clientY<messageStream.getBoundingClientRect().top+80) scrollToBottom(); });
  function findSession(roleId, sessionId) { const l=sessions[roleId]; return l?l.find(s=>s.id===sessionId)||null:null; }
  function scrollToBottom() { messageStream.scrollTop = messageStream.scrollHeight; }

  // ===== 正在输入指示器 =====
  function showTypingIndicator() { typingIndicator.classList.add('show'); }
  function hideTypingIndicator() { typingIndicator.classList.remove('show'); }

  // ===== 流式回复：增量DOM更新 =====
  function startStreamMessage() {
    const sess = findSession(currentRoleId, currentSessionId);
    if (!sess) return;
    // 创建消息DOM，气泡内显示“正在输入…”动画
    const group = document.createElement('div');
    group.className = 'message-group ai';
    const wrap = document.createElement('div');
    wrap.className = 'message-bubble-wrap';
    const bubble = document.createElement('div');
    bubble.className = 'message-bubble typing';
    bubble.innerHTML = '<div class="typing-content">正在输入<div class="dots"><span></span><span></span><span></span></div></div>';
    wrap.appendChild(bubble);
    group.appendChild(wrap);
    const time = document.createElement('div');
    time.className = 'message-time';
    time.textContent = formatTime();
    group.appendChild(time);
    messageStream.appendChild(group);

    // 保存引用
    streamingMsgEl = bubble;
    streamText = '';
    streamRawText = '';
    streamCursorEl = null;
    sess.messages.push({ role: 'ai', text: '', time: time.textContent });
    scrollToBottom();
  }

  // 增量追加文本
  function appendStreamChunk(rawChunk) {
    if (!rawChunk) return;
    streamRawText += rawChunk; // 保留原始累积文本
    // 对完整累积文本执行 Markdown 清理
    const cleaned = stripStreamText(streamRawText);
    if (!cleaned) return;
    streamText = cleaned.trim();
    // 增量更新：只更新文本节点
    if (streamingMsgEl) {
      // 首次收到内容时，清除“正在输入…”状态
      if (streamingMsgEl.classList.contains('typing')) {
        streamingMsgEl.classList.remove('typing');
        streamingMsgEl.textContent = streamText;
      } else {
        const textNode = streamingMsgEl.firstChild;
        if (textNode) {
          textNode.textContent = streamText;
        } else {
          streamingMsgEl.textContent = streamText;
        }
      }
    }
    scrollToBottom();
  }

  // 完成流式输出
  function finishStreamMessage() {
    if (streamCursorEl && streamingMsgEl && streamCursorEl.parentNode === streamingMsgEl) {
      streamingMsgEl.removeChild(streamCursorEl);
    }
    streamCursorEl = null;
    // 保存最终文本到数据（trim去除首尾空白）
    const sess = findSession(currentRoleId, currentSessionId);
    if (sess && sess.messages.length) {
      sess.messages[sess.messages.length - 1].text = streamText.trim();
    }
    // 若仍在 typing 状态（无实际内容），清除动画并保留空气泡
    if (streamingMsgEl && streamingMsgEl.classList.contains('typing')) {
      streamingMsgEl.classList.remove('typing');
      streamingMsgEl.textContent = streamText.trim();
    }
    streamingMsgEl = null;
    streamText = '';
    streamRawText = '';
    saveData();
  }

  // ===== 模拟AI流式回复 =====
  function simulateStreamReply(fullText) {
    startStreamMessage();
    const chars = fullText.split('');
    let i = 0;
    const speed = 20; // 每20ms输出一个字符
    function next() {
      if (i >= chars.length) { finishStreamMessage(); return; }
      appendStreamChunk(chars[i]);
      i++;
      setTimeout(next, speed);
    }
    // 模拟延迟后开始输出（气泡内已显示“正在输入…”动画）
    setTimeout(next, 600);
  }

  // ===== 发送消息 =====
  function updateSendBtn() { sendBtn.disabled = !inputBox.value.trim().length > 0; }
  inputBox.addEventListener('input', () => { inputBox.style.height='auto'; inputBox.style.height=Math.min(inputBox.scrollHeight,120)+'px'; updateSendBtn(); });
  sendBtn.addEventListener('click', sendMessage);
  inputBox.addEventListener('keydown', e => { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();} });

  function sendMessage() {
    const text = inputBox.value.trim();
    if (!text) return;
    const sess = findSession(currentRoleId, currentSessionId);
    if (!sess) return;
    sess.messages.push({ role: 'user', text: text, time: formatTime() });
    inputBox.value = ''; inputBox.style.height = 'auto'; updateSendBtn();
    renderMessages();
    saveData();

    // 调用AI回复
    callAI(text);
  }

  // ===== AI 调用 =====
  async function callAI(userText) {
    const defKey = getDefaultPlatform();
    const config = loadPlatformConfig(defKey);
    if (config && config.apiKey) {
      await callAPI(config, userText);
    } else {
      // 没有配置则模拟
      const now = new Date();
      const beijingTime = now.toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai', hour12: false });
      const timeHint = timeAwareEnabled ? '（当前北京时间：' + beijingTime + '）' : '';
      const replies = {
        assistant: '收到，让我来帮您分析一下这个问题。这是一个需要综合思考的话题，我会从多个角度为您提供建议和见解。' + timeHint,
        coder: '好的，这段代码可以这样优化。首先检查时间复杂度，然后重构关键路径上的逻辑，同时注意内存管理和异常处理。' + timeHint,
        writer: '明白了，这是一个很有创意的主题！让我帮您构思一个引人入胜的开头，然后逐步展开内容框架。' + timeHint
      };
      simulateStreamReply(replies[currentRoleId] || '收到，我来处理您的问题。' + timeHint);
    }
  }

  // 获取北京时间字符串
  function getBeijingTime() {
    try {
      return new Date().toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai', hour12: false });
    } catch(e) {
      const d = new Date();
      return d.getFullYear() + '/' + (d.getMonth()+1) + '/' + d.getDate() + ' ' + d.getHours() + ':' + d.getMinutes();
    }
  }

  async function callAPI(config, userText) {
    const sess = findSession(currentRoleId, currentSessionId);
    if (!sess) return;

    try {
      // 构建消息列表，应用上下文条数限制
      let msgSlice = sess.messages;
      if (contextLimit > 0) {
        msgSlice = msgSlice.slice(-contextLimit);
      }
      let messages = msgSlice.map(m => ({ role: m.role === 'user' ? 'user' : 'assistant', content: m.text })).filter(m => m.content);

      // 注入北京时间系统提示（高灵敏度，不受上下文影响）
      if (timeAwareEnabled) {
        const timePrompt = '【系统时间感知】当前北京时间：' + getBeijingTime() + '。请在回答中准确感知当前时间，不受对话上下文影响。';
        messages = [{ role: 'system', content: timePrompt }].concat(messages);
      }

      // 构建请求体
      const reqBody = { model: config.model, messages: messages, stream: true };
      if (tokenLimit > 0) reqBody.max_tokens = tokenLimit;

      startStreamMessage();

      const resp = await fetch(config.baseUrl + '/chat/completions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + config.apiKey },
        body: JSON.stringify(reqBody)
      });

      if (!resp.ok) {
        finishStreamMessage();
        appendStreamChunk('请求失败（HTTP ' + resp.status + '），请检查配置。');
        return;
      }

      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });

        const lines = buffer.split('\n');
        buffer = lines.pop() || '';

        for (const line of lines) {
          const trimmed = line.trim();
          if (!trimmed || !trimmed.startsWith('data:')) continue;
          const data = trimmed.slice(5).trim();
          if (data === '[DONE]') continue;
          try {
            const json = JSON.parse(data);
            const content = json.choices && json.choices[0] && json.choices[0].delta && json.choices[0].delta.content;
            if (content) appendStreamChunk(content);
          } catch(e) { /* skip parse errors */ }
        }
      }
      finishStreamMessage();
    } catch(e) {
      finishStreamMessage();
      appendStreamChunk('网络错误：' + e.message);
    }
  }

  // ===== 语音按钮 =====
  voiceBtn.addEventListener('click', () => { if(!voiceEnabled){showToast('语音输入已关闭');return;}showToast('语音输入功能演示'); });
  inputBox.addEventListener('focus', () => { setTimeout(()=>{inputArea.scrollIntoView({behavior:'smooth',block:'end'});scrollToBottom();},300); });

  // ===== 修复输入框按钮 =====
  fixInputBtn.addEventListener('click', () => {
    // 1. 重置输入框
    inputBox.value = '';
    inputBox.blur();
    // 2. 输入数字1
    inputBox.value = '1';
    updateSendBtn();
    // 3. 立即撤销（最快速度，同步执行）
    inputBox.value = '';
    updateSendBtn();
    // 强制重绘输入框
    inputBox.style.height = 'auto';
    showToast('输入框已修复');
  });

  // ===== AI实时感知北京时间开关 =====
  if (timeAwareToggle) {
    // 同步初始状态
    timeAwareToggle.classList.toggle('on', timeAwareEnabled);
    timeAwareToggle.addEventListener('click', () => {
      timeAwareEnabled = !timeAwareEnabled;
      timeAwareToggle.classList.toggle('on', timeAwareEnabled);
      saveData();
      showToast(timeAwareEnabled ? '北京时间感知已开启' : '北京时间感知已关闭');
    });
  }

  // ===== 上下文记忆条数 & Token限制 =====
  if (contextLimitInput) {
    contextLimitInput.value = contextLimit > 0 ? contextLimit : '';
    contextLimitInput.addEventListener('input', () => {
      const v = contextLimitInput.value.trim();
      if (v === '') { contextLimit = 0; }
      else { const n = parseInt(v); contextLimit = (n > 0) ? n : 0; }
      saveData();
    });
  }
  if (tokenLimitInput) {
    tokenLimitInput.value = tokenLimit > 0 ? tokenLimit : '';
    tokenLimitInput.addEventListener('input', () => {
      const v = tokenLimitInput.value.trim();
      if (v === '') { tokenLimit = 0; }
      else { const n = parseInt(v); tokenLimit = (n > 0) ? n : 0; }
      saveData();
    });
  }

  // ===== 确认对话框 =====
  function showConfirm(title, desc, cb, danger) {
    confirmTitle.textContent=title; confirmDesc.textContent=desc; confirmCallback=cb;
    confirmOk.className='confirm'+(danger?' danger':'');
    confirmOverlay.classList.add('show');
  }
  confirmCancel.addEventListener('click', () => confirmOverlay.classList.remove('show'));
  confirmOk.addEventListener('click', () => { confirmOverlay.classList.remove('show'); if(confirmCallback){confirmCallback();confirmCallback=null;} });

  // ===== 角色页 =====
  function renderRoleList(filter) {
    roleList.innerHTML = '';
    const list = filter ? roles.filter(r => r.name.includes(filter)||r.desc.includes(filter)) : roles;
    list.forEach(role => {
      const card = document.createElement('div'); card.className = 'role-card';
      const isActive = role.id === currentRoleId;
      card.innerHTML =
        '<div class="role-avatar">'+role.icon+'</div>' +
        '<div class="role-info"><span class="name">'+escapeHtml(role.name)+'</span><span class="desc">'+escapeHtml(role.desc)+'</span></div>' +
        '<div class="role-card-actions">' +
          '<div class="role-card-action-btn edit" data-id="'+role.id+'" title="编辑"><svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34a.9959.9959 0 0 0-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg></div>' +
          '<div class="role-card-action-btn delete" data-id="'+role.id+'" title="删除"><svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg></div>' +
          '<div class="toggle-switch '+(isActive?'on':'')+'" data-id="'+role.id+'"></div>' +
        '</div>';
      // 点击卡片空白区域切换角色（不含按钮区域）
      card.addEventListener('click', (e) => {
        if (e.target.closest('.role-card-action-btn') || e.target.closest('.toggle-switch')) return;
        switchRole(role.id);
      });
      roleList.appendChild(card);
    });
    // 绑定编辑/删除/开关事件
    roleList.querySelectorAll('.role-card-action-btn.edit').forEach(btn => {
      btn.addEventListener('click', (e) => { e.stopPropagation(); openRoleEditor(btn.dataset.id); });
    });
    roleList.querySelectorAll('.role-card-action-btn.delete').forEach(btn => {
      btn.addEventListener('click', (e) => { e.stopPropagation(); deleteRole(btn.dataset.id); });
    });
    roleList.querySelectorAll('.toggle-switch').forEach(sw => {
      sw.addEventListener('click', (e) => { e.stopPropagation(); switchRole(sw.dataset.id); });
    });
  }
  roleSearch.addEventListener('input', () => renderRoleList(roleSearch.value.trim()));

  // ===== 设置页 =====
  function bindToggle(el, cb) { el.addEventListener('click', () => { const on=el.classList.contains('on'); el.classList.toggle('on'); if(cb)cb(!on); }); }
  if (themeToggle) bindToggle(themeToggle, on => showToast(on?'日间模式已开启':'夜间模式暂不可用'));
  if (voiceToggle) bindToggle(voiceToggle, on => { voiceEnabled=on; showToast(on?'语音输入已开启':'语音输入已关闭'); });

  fontSizeItem.addEventListener('click', () => {
    document.querySelectorAll('.font-option').forEach(o=>o.classList.toggle('selected',parseInt(o.dataset.size)===fontSize));
    fontPanelOverlay.classList.add('show');
  });
  fontPanelCancel.addEventListener('click', () => fontPanelOverlay.classList.remove('show'));
  fontPanelOverlay.addEventListener('click', e => { if(e.target===fontPanelOverlay)fontPanelOverlay.classList.remove('show'); });
  document.querySelectorAll('.font-option').forEach(o => {
    o.addEventListener('click', () => {
      fontSize=parseInt(o.dataset.size); fontSizeValue.textContent=fontSize+'px';
      document.documentElement.style.setProperty('--font-base',fontSize+'px');
      fontPanelOverlay.classList.remove('show'); showToast('字体大小已设置为 '+fontSize+'px');
      saveData();
    });
  });

  clearAllItem.addEventListener('click', () => { showConfirm('清空所有数据','确定要清空所有角色的所有会话吗？此操作不可恢复。',doClearAll,true); });

  // ===== 新增角色 =====
  // ===== 角色编辑弹窗 =====
  const roleEditOverlay = $('roleEditOverlay');
  const reTitle = $('reTitle');
  const reName = $('reName');
  const reDesc = $('reDesc');
  const reCancel = $('reCancel');
  const reConfirm = $('reConfirm');
  const reActions = $('reActions');
  let editingRoleId = null;

  function openRoleEditor(roleId) {
    const role = roles.find(r => r.id === roleId);
    if (!role) return;
    editingRoleId = roleId;
    reTitle.textContent = '编辑角色';
    reName.value = role.name;
    reDesc.value = role.desc;
    reActions.innerHTML = '<button class="re-cancel" id="reCancel">取消</button><button class="re-confirm" id="reConfirm">保存</button>';
    roleEditOverlay.classList.add('show');
    bindRoleEditActions();
  }

  function openNewRoleEditor() {
    const roleIcons = ['&#129302;','&#128640;','&#128187;','&#9997;','&#127912;','&#128218;','&#129504;','&#127911;'];
    editingRoleId = null;
    reTitle.textContent = '新增角色';
    reName.value = '';
    reDesc.value = '';
    reActions.innerHTML = '<button class="re-cancel" id="reCancel">取消</button><button class="re-confirm" id="reConfirm">创建</button>';
    roleEditOverlay.classList.add('show');
    bindRoleEditActions();
  }

  function bindRoleEditActions() {
    $('reCancel').addEventListener('click', () => roleEditOverlay.classList.remove('show'));
    $('reConfirm').addEventListener('click', () => saveRoleEdit());
    // 角色设定文本域自适应高度（最多7行）
    reDesc.style.height = 'auto';
    reDesc.style.height = Math.min(reDesc.scrollHeight, 147) + 'px';
    reDesc.addEventListener('input', () => {
      reDesc.style.height = 'auto';
      reDesc.style.height = Math.min(reDesc.scrollHeight, 147) + 'px';
    });
  }

  function saveRoleEdit() {
    const name = reName.value.trim();
    const desc = reDesc.value.trim();
    if (!name) { showToast('请输入角色名称'); return; }

    if (editingRoleId) {
      // 编辑已有角色
      const role = roles.find(r => r.id === editingRoleId);
      if (role) {
        role.name = name;
        role.desc = desc || role.desc;
        showToast('角色已更新');
      }
    } else {
      // 新建角色
      const roleIcons = ['&#129302;','&#128640;','&#128187;','&#9997;','&#127912;','&#128218;','&#129504;','&#127911;'];
      const id = 'custom_' + Date.now();
      const newRole = {
        id: id,
        name: name,
        desc: desc || '自定义角色',
        icon: roleIcons[Math.floor(Math.random() * roleIcons.length)]
      };
      roles.push(newRole);
      sessionCounters[id] = 1;
      sessions[id] = [{
        id: 's_' + id + '_1',
        name: '会话1',
        messages: [{ role: 'ai', text: '你好！我是' + name + '，有什么可以帮你的？', time: formatTime() }]
      }];
      // 自动切换到新角色
      currentRoleId = id;
      currentSessionId = sessions[id][0].id;
      renderSessions();
      renderMessages();
      messageStream.classList.add('show');
      showToast('已创建角色「' + name + '」');
    }
    roleEditOverlay.classList.remove('show');
    renderRoleList(roleSearch.value.trim());
    saveData();
  }

  function deleteRole(roleId) {
    const role = roles.find(r => r.id === roleId);
    if (!role) return;
    if (roles.length <= 1) { showToast('至少保留一个角色'); return; }
    showConfirm('删除角色', '确定要删除角色「' + role.name + '」及其所有会话吗？', () => {
      // 删除角色
      const idx = roles.findIndex(r => r.id === roleId);
      roles.splice(idx, 1);
      delete sessions[roleId];
      delete sessionCounters[roleId];
      // 如果删除的是当前角色，切换到第一个
      if (currentRoleId === roleId) {
        currentRoleId = roles[0].id;
        currentSessionId = sessions[currentRoleId] ? sessions[currentRoleId][0].id : null;
        renderSessions();
        renderMessages();
      }
      renderRoleList(roleSearch.value.trim());
      saveData();
      showToast('角色已删除');
    }, true);
  }

  // 顶栏新增角色按钮
  $('topAddRoleBtn').addEventListener('click', openNewRoleEditor);

  function doClearAll() {
    sessions={}; sessionCounters={};
    roles.forEach(r=>{sessionCounters[r.id]=1;sessions[r.id]=[{id:'s_'+r.id+'_1',name:'会话1',messages:[{role:'ai',text:'你好！有什么可以帮你的？',time:formatTime()}]}];});
    currentRoleId=roles[0].id; currentSessionId=sessions[currentRoleId][0].id;
    renderSessions(); renderMessages(); renderRoleList(); showToast('所有会话已清空');
    saveData();
  }

  // ===== AI 平台配置页 =====
  platformTabs.addEventListener('click', e => {
    const tab = e.target.closest('.platform-tab');
    if (!tab) return;
    platformTabs.querySelectorAll('.platform-tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    activePlatform = tab.dataset.key;
    renderPlatformConfig();
  });

  // 模型列表缓存（每个平台独立保存）
  function saveModelListCache(key, models) {
    try { localStorage.setItem('ai_chat_models_' + key, JSON.stringify(models)); } catch(e) {}
  }
  function loadModelListCache(key) {
    try { const r = localStorage.getItem('ai_chat_models_' + key); return r ? JSON.parse(r) : null; } catch(e) { return null; }
  }

  // 构建模型下拉选项（优先从缓存加载）
  function buildModelOptions(selectedModel) {
    const cached = loadModelListCache(activePlatform);
    if (cached && cached.length) {
      let html = '';
      cached.forEach(m => { html += '<option value="' + escapeHtml(m) + '"' + (m === selectedModel ? ' selected' : '') + '>' + escapeHtml(m) + '</option>'; });
      return html;
    }
    return '<option value="">点击"拉取"获取模型列表</option>';
  }

  function renderPlatformConfig() {
    platformTabs.querySelectorAll('.platform-tab').forEach(t => t.classList.toggle('active', t.dataset.key === activePlatform));
    const preset = platformPresets[activePlatform];
    const config = loadPlatformConfig(activePlatform) || {};
    const isDefault = getDefaultPlatform() === activePlatform;
    const modelMode = config.modelMode || 'manual';

    platformContent.innerHTML =
      '<div class="config-section">' +
        '<div class="config-section-title">API 配置</div>' +
        '<div class="config-field"><label>API Base URL</label><input type="text" id="cfgBaseUrl" placeholder="https://api.example.com/v1" value="' + escapeHtml(config.baseUrl || preset.baseUrl) + '">' +
        '<div class="field-hint">' + (activePlatform !== 'custom' ? '已预填 ' + preset.name + ' 官方地址，可自行修改' : '请输入自定义API地址') + '</div></div>' +
        '<div class="config-field"><label>API Key</label><input type="password" id="cfgApiKey" placeholder="sk-..." value="' + escapeHtml(config.apiKey || '') + '">' +
        '<div class="field-hint">密钥仅保存在本地浏览器，不会上传</div></div>' +
      '</div>' +

      '<div class="config-section">' +
        '<div class="config-section-title">模型选择</div>' +
        '<div class="config-field"><label>选择方式</label>' +
          '<div class="radio-group">' +
            '<label class="radio-option"><input type="radio" name="modelMode" value="list"' + (modelMode==='list'?' checked':'') + '> 从平台拉取</label>' +
            '<label class="radio-option"><input type="radio" name="modelMode" value="manual"' + (modelMode!=='list'?' checked':'') + '> 手动输入</label>' +
          '</div>' +
        '</div>' +
        '<div class="config-field" id="modelListWrap" style="display:' + (modelMode==='list'?'block':'none') + '">' +
          '<label>选择模型</label>' +
          '<div class="config-row">' +
            '<div class="config-field"><select id="cfgModelSelect">' + buildModelOptions(config.model) + '</select></div>' +
            '<button class="btn-outline" id="btnFetchModels" style="flex:none;width:auto;padding:0 14px;min-width:60px;">拉取</button>' +
          '</div>' +
        '</div>' +
        '<div class="config-field" id="modelManualWrap" style="display:' + (modelMode!=='list'?'block':'none') + '">' +
          '<label>模型名称</label><input type="text" id="cfgModelManual" placeholder="deepseek-chat" value="' + escapeHtml(config.model || '') + '">' +
        '</div>' +
      '</div>' +

      '<div class="config-section">' +
        '<div class="btn-row">' +
          '<button class="btn-outline" id="btnSavePlatform">保存配置</button>' +
          '<button class="btn-outline" id="btnSetDefault"' + (isDefault?' disabled style="opacity:0.5"':'') + '>' + (isDefault?'<span class="default-badge" style="margin-right:4px"></span>':'') + '设为默认</button>' +
          '<button class="btn-primary" id="btnTestConn">测试连接</button>' +
        '</div>' +
        '<div class="test-status" id="testStatus"></div>' +
      '</div>';

    // 绑定事件
    bindPlatformEvents(config, modelMode);
  }

  function bindPlatformEvents(config, modelMode) {
    const baseUrlEl = $('cfgBaseUrl'), apiKeyEl = $('cfgApiKey');
    const modelSelect = $('cfgModelSelect'), modelManual = $('cfgModelManual');
    const testStatus = $('testStatus');

    document.querySelectorAll('input[name="modelMode"]').forEach(r => {
      r.addEventListener('change', () => {
        const mode = r.value;
        $('modelListWrap').style.display = mode==='list'?'block':'none';
        $('modelManualWrap').style.display = mode!=='list'?'block':'none';
      });
    });

    $('btnSavePlatform').addEventListener('click', () => {
      const mode = document.querySelector('input[name="modelMode"]:checked').value;
      const cfg = {
        baseUrl: baseUrlEl.value.trim(),
        apiKey: apiKeyEl.value.trim(),
        modelMode: mode,
        model: mode === 'manual' ? modelManual.value.trim() : (modelSelect.value || '')
      };
      savePlatformConfig(activePlatform, cfg);
      testStatus.className = 'test-status show success';
      testStatus.textContent = '配置已保存';
      setTimeout(() => testStatus.className = 'test-status', 2500);
      updatePlatformSublabel();
    });

    $('btnSetDefault').addEventListener('click', function() {
      localStorage.setItem('ai_chat_default_platform', activePlatform);
      this.disabled = true;
      this.innerHTML = '<span class="default-badge" style="margin-right:4px"></span>设为默认';
      this.style.opacity = '0.5';
      showToast(platformPresets[activePlatform].name + ' 已设为默认平台');
    });

    $('btnTestConn').addEventListener('click', async () => {
      const baseUrl = baseUrlEl.value.trim();
      const apiKey = apiKeyEl.value.trim();
      if (!baseUrl || !apiKey) { testStatus.className='test-status show error'; testStatus.textContent='请填写 API Base URL 和 API Key'; return; }

      testStatus.className = 'test-status show loading';
      testStatus.textContent = '正在测试连接…';
      try {
        const resp = await fetch(baseUrl + '/models', {
          method: 'GET',
          headers: { 'Authorization': 'Bearer ' + apiKey }
        });
        if (resp.ok) {
          const data = await resp.json();
          const count = data.data ? data.data.length : 0;
          testStatus.className = 'test-status show success';
          testStatus.textContent = '连接成功，共 ' + count + ' 个模型可用';
          // 填充模型列表
          if (data.data && data.data.length) {
            const modelIds = data.data.map(m => m.id);
            saveModelListCache(activePlatform, modelIds);
            modelSelect.innerHTML = '';
            modelIds.forEach(mid => {
              const opt = document.createElement('option');
              opt.value = mid; opt.textContent = mid;
              if (mid === config.model) opt.selected = true;
              modelSelect.appendChild(opt);
            });
          }
        } else {
          testStatus.className = 'test-status show error';
          testStatus.textContent = '连接失败（HTTP ' + resp.status + '）';
        }
      } catch(e) {
        testStatus.className = 'test-status show error';
        testStatus.textContent = '连接失败：' + e.message;
      }
    });

    $('btnFetchModels').addEventListener('click', async () => {
      const baseUrl = baseUrlEl.value.trim();
      const apiKey = apiKeyEl.value.trim();
      if (!baseUrl || !apiKey) { showToast('请先填写 API 配置'); return; }
      modelSelect.innerHTML = '<option value="">加载中...</option>';
      try {
        const resp = await fetch(baseUrl + '/models', { headers: { 'Authorization': 'Bearer ' + apiKey } });
        if (!resp.ok) { modelSelect.innerHTML='<option value="">加载失败</option>'; showToast('拉取失败 HTTP '+resp.status); return; }
        const data = await resp.json();
        const modelIds = data.data ? data.data.map(m => m.id) : [];
        if (modelIds.length) saveModelListCache(activePlatform, modelIds);
        modelSelect.innerHTML = '';
        modelIds.forEach(mid => {
          const o = document.createElement('option');
          o.value = mid; o.textContent = mid;
          if (mid === config.model) o.selected = true;
          modelSelect.appendChild(o);
        });
        showToast('已拉取 ' + modelIds.length + ' 个模型');
      } catch(e) { modelSelect.innerHTML='<option value="">网络错误</option>'; showToast('拉取失败'); }
    });
  }

  function updatePlatformSublabel() {
    const def = getDefaultPlatform();
    const cfg = loadPlatformConfig(def);
    let label = '配置 DeepSeek、硅基流动或自定义';
    if (cfg && cfg.apiKey) {
      const preset = platformPresets[def];
      label = preset.name + (cfg.model ? ' / ' + cfg.model : '') + ' · 已配置';
    }
    $('platformSublabel').textContent = label;
  }

  // ===== 全局左边缘滑动 =====
  let edgeStartX = null;
  document.addEventListener('touchstart', e => { if(e.touches[0].clientX<20)edgeStartX=e.touches[0].clientX; }, {passive:true});
  document.addEventListener('touchmove', e => {
    if(edgeStartX!==null&&e.touches[0].clientX-edgeStartX>60) {
      edgeStartX=null;
      const activePage=document.querySelector('.page.active');
      if(activePage&&activePage.id!=='page-chat') switchToPage('chat');
      else { fontPanelOverlay.classList.remove('show'); confirmOverlay.classList.remove('show'); hideCopyMenu(); }
    }
  }, {passive:true});
  document.addEventListener('touchend', () => edgeStartX=null, {passive:true});

  // ===== 初始化 =====
  renderSessions(); renderMessages(); renderRoleList(); updateSendBtn(); updatePlatformSublabel();
})();
</script>
</body>
</html>
