<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>J9</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #fafafa;
    --surface: #ffffff;
    --border: #e8e8e8;
    --text: #1a1a1a;
    --text-secondary: #888;
    --primary: #4a6fa5;
    --primary-light: #e8eef6;
    --accent: #e8573a;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
    --radius: 8px;
  }
  html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; background: var(--bg); color: var(--text); }
  body { display: flex; flex-direction: column; }

  /* ===== Top Bar ===== */
  .topbar {
    height: 44px; min-height: 44px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 12px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    z-index: 100;
  }
  .topbar-left, .topbar-right { display: flex; align-items: center; gap: 4px; }
  .topbar-spacer { flex: 1; }
  .btn-icon {
    width: 34px; height: 34px;
    display: flex; align-items: center; justify-content: center;
    border: none; background: transparent;
    border-radius: 6px; cursor: pointer;
    color: var(--text-secondary);
    transition: all .15s;
    position: relative;
  }
  .btn-icon:hover { background: var(--primary-light); color: var(--primary); }
  .btn-icon svg { width: 20px; height: 20px; }
  .btn-icon .badge {
    position: absolute; top: 2px; right: 2px;
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent);
  }

  /* ===== Editor ===== */
  .editor-wrap { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .note-title-input {
    width: 100%; padding: 16px 20px 4px;
    border: none; outline: none;
    font-size: 22px; font-weight: 700;
    background: transparent; color: var(--text);
    font-family: inherit;
  }
  .note-title-input::placeholder { color: #ccc; }
  .note-editor {
    flex: 1; width: 100%; padding: 8px 20px 20px;
    border: none; outline: none; resize: none;
    font-size: 18px; line-height: 1.8;
    background: transparent; color: var(--text);
    font-family: inherit;
  }
  .note-editor::placeholder { color: #ccc; }
  .status-bar {
    height: 28px; min-height: 28px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 16px; font-size: 11px; color: var(--text-secondary);
    background: var(--surface); border-top: 1px solid var(--border);
  }

  /* ===== Panels ===== */
  .panel-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.25); z-index: 200;
    animation: fadeIn .15s;
  }
  .panel-overlay.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

  /* Notes List Panel */
  .notes-panel {
    display: none; position: fixed; top: 0; left: 0; bottom: 0;
    width: 300px; max-width: 85vw;
    background: var(--surface); z-index: 210;
    box-shadow: var(--shadow);
    flex-direction: column;
    animation: slideInLeft .2s ease;
  }
  .notes-panel.active { display: flex; }
  @keyframes slideInLeft { from { transform: translateX(-100%); } to { transform: translateX(0); } }
  .notes-panel-header {
    padding: 14px 16px; display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }
  .notes-panel-header h3 { font-size: 16px; font-weight: 600; }
  .notes-list { flex: 1; overflow-y: auto; padding: 8px; }
  .note-item {
    padding: 12px; border-radius: var(--radius); cursor: pointer;
    margin-bottom: 4px; transition: background .15s;
  }
  .note-item:hover { background: var(--primary-light); }
  .note-item.active { background: var(--primary-light); }
  .note-item-title { font-size: 14px; font-weight: 600; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .note-item-preview { font-size: 12px; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .note-item-date { font-size: 11px; color: #bbb; margin-top: 4px; }
  .note-item-actions { display: flex; gap: 4px; margin-top: 6px; }
  .note-item-actions button {
    font-size: 11px; padding: 2px 8px; border: 1px solid var(--border);
    background: var(--surface); border-radius: 4px; cursor: pointer; color: var(--text-secondary);
  }
  .note-item-actions button:hover { border-color: var(--accent); color: var(--accent); }

  /* AI Chat Panel */
  .ai-panel {
    display: none; position: fixed; top: 0; right: 0; bottom: 0;
    width: 520px; max-width: 100vw;
    background: var(--surface); z-index: 210;
    box-shadow: var(--shadow);
    flex-direction: column;
    animation: slideIn .2s ease;
  }
  .ai-panel.active { display: flex; }
  .ai-panel-header {
    padding: 14px 16px; display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }
  .ai-panel-header h3 { font-size: 16px; font-weight: 600; }
  .ai-session-bar {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 12px; border-bottom: 1px solid var(--border);
    background: #fbfbfb;
  }
  .ai-session-list {
    flex: 1; display: flex; gap: 6px; overflow-x: auto; padding-bottom: 2px;
  }
  .ai-session-item {
    display: flex; align-items: center; gap: 4px; max-width: 150px;
    border: 1px solid var(--border); background: var(--surface);
    border-radius: 999px; padding: 5px 8px; cursor: pointer;
    color: var(--text-secondary); font-size: 12px; white-space: nowrap;
  }
  .ai-session-item.active { background: var(--primary-light); color: var(--primary); border-color: var(--primary); }
  .ai-session-title { overflow: hidden; text-overflow: ellipsis; }
  .ai-session-del {
    border: none; background: transparent; color: inherit; cursor: pointer;
    font-size: 14px; line-height: 1; padding: 0 2px;
  }
  .btn-mini {
    padding: 5px 10px; border: 1px solid var(--border); border-radius: 999px;
    background: var(--surface); color: var(--text); font-size: 12px; cursor: pointer;
    white-space: nowrap;
  }
  .btn-mini:hover { border-color: var(--primary); color: var(--primary); }
  .ai-messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
  .ai-msg { max-width: 88%; padding: 10px 14px; border-radius: 12px; font-size: 18px; line-height: 1.6; word-break: break-word; position: relative; }
  .ai-msg.user { align-self: flex-end; background: var(--primary); color: #fff; border-bottom-right-radius: 4px; }
  .ai-msg.assistant { align-self: flex-start; background: var(--primary-light); color: var(--text); border-bottom-left-radius: 4px; }
  .ai-msg-copy {
    position: absolute; bottom: 4px; right: 4px;
    width: 26px; height: 26px; border: none; border-radius: 4px;
    background: rgba(0,0,0,0.08); color: var(--text-secondary); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity .15s, background .15s;
    padding: 0;
  }
  .ai-msg:hover .ai-msg-copy { opacity: 1; }
  .ai-msg-copy:hover { background: rgba(0,0,0,0.15); color: var(--text); }
  .ai-msg.user .ai-msg-copy { background: rgba(255,255,255,0.15); color: rgba(255,255,255,0.6); }
  .ai-msg.user .ai-msg-copy:hover { background: rgba(255,255,255,0.25); color: #fff; }
  .ai-msg-copy svg { width: 14px; height: 14px; }
  .ai-msg pre { background: #f0f0f0; padding: 8px; border-radius: 6px; overflow-x: auto; margin: 4px 0; font-size: 13px; }
  .ai-msg code { font-family: "SF Mono", "Fira Code", monospace; font-size: 13px; }
  .ai-msg p { margin: 4px 0; }
  .ai-msg ul, .ai-msg ol { padding-left: 20px; margin: 4px 0; }
  .ai-input-area {
    padding: 12px 16px; border-top: 1px solid var(--border);
    display: flex; align-items: flex-end;
  }
  .ai-input-area textarea {
    width: 100%; border: 1px solid var(--border); border-radius: var(--radius);
    padding: 10px 12px; font-size: 14px; font-family: inherit;
    resize: none; outline: none; max-height: 120px; min-height: 40px;
    line-height: 1.5;
  }
  .ai-input-area textarea:focus { border-color: var(--primary); }
  .ai-typing { font-size: 12px; color: var(--text-secondary); padding: 4px 16px; font-style: italic; }

  /* Settings Modal */
  .settings-modal {
    display: none; position: fixed; inset: 0;
    z-index: 300; align-items: center; justify-content: center;
  }
  .settings-modal.active { display: flex; }
  .settings-modal .panel-overlay { position: absolute; }
  .settings-content {
    position: relative; width: 440px; max-width: 92vw;
    background: var(--surface); border-radius: 12px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.15);
    animation: modalIn .2s ease;
    max-height: 85vh; overflow-y: auto;
  }
  @keyframes modalIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
  .settings-header {
    padding: 18px 20px; display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }
  .settings-header h3 { font-size: 16px; font-weight: 600; }
  .settings-body { padding: 20px; display: flex; flex-direction: column; gap: 16px; }
  .form-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: var(--text-secondary); }
  .form-group input, .form-group select {
    width: 100%; padding: 10px 12px; border: 1px solid var(--border);
    border-radius: var(--radius); font-size: 14px; font-family: inherit;
    outline: none; transition: border-color .15s;
  }
  .form-group input:focus, .form-group select:focus { border-color: var(--primary); }
  .form-group .hint { font-size: 11px; color: #bbb; margin-top: 4px; }
  .settings-footer { padding: 16px 20px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; }
  .btn-primary {
    padding: 8px 20px; border: none; border-radius: var(--radius);
    background: var(--primary); color: #fff; font-size: 14px; cursor: pointer;
    transition: background .15s;
  }
  .btn-primary:hover { background: #3a5a8a; }
  .btn-secondary {
    padding: 8px 20px; border: 1px solid var(--border); border-radius: var(--radius);
    background: var(--surface); color: var(--text); font-size: 14px; cursor: pointer;
  }

  /* ===== Fullscreen Pages ===== */
  .fullscreen-page {
    display: none; position: fixed; inset: 0; z-index: 260;
    background: var(--bg); flex-direction: column;
    animation: fadeIn .15s ease;
  }
  .fullscreen-page.active { display: flex; }
  .fullscreen-header {
    height: 52px; min-height: 52px; padding: 0 12px;
    display: flex; align-items: center; justify-content: space-between;
    background: var(--surface); border-bottom: 1px solid var(--border);
  }
  .fullscreen-title-wrap { display: flex; align-items: center; gap: 6px; }
  .fullscreen-header h2 { font-size: 17px; font-weight: 700; }
  #btnFixTodoInput { display: none; }
  #btnFixTodoInput.active { display: flex; }
  .fullscreen-body { flex: 1; overflow-y: auto; padding: 12px; }
  .section-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px; margin-bottom: 12px;
    box-shadow: 0 1px 6px rgba(0,0,0,0.03);
  }
  .mode-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 14px; }
  .mode-card {
    border: 1px solid var(--border); background: var(--surface); border-radius: 12px;
    padding: 14px 10px; cursor: pointer; text-align: left; font-family: inherit;
  }
  .mode-card.active, .mode-card:hover { border-color: var(--primary); background: var(--primary-light); color: var(--primary); }
  .mode-card strong { display: block; font-size: 14px; margin-bottom: 4px; }
  .mode-card span { display: block; font-size: 12px; color: var(--text-secondary); line-height: 1.4; }
  .new-mode-section { display: none; }
  .new-mode-section.active { display: block; }
  .field-row { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
  .field-row label { font-size: 13px; font-weight: 600; color: var(--text-secondary); }
  .field-row input, .field-row textarea, .todo-card input, .todo-card textarea, .todo-card select {
    width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: var(--radius);
    font-size: 14px; font-family: inherit; outline: none; background: var(--surface);
  }
  .field-row textarea { min-height: 110px; resize: vertical; line-height: 1.6; }
  #manualTodoTitle {
    min-height: 42px; max-height: 138px; resize: none; overflow-y: hidden;
    line-height: 1.6;
  }
  .form-actions { display: flex; gap: 8px; justify-content: flex-end; flex-wrap: wrap; }
  .todo-toolbar { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
  .todo-stats { color: var(--text-secondary); font-size: 13px; }
  .todo-list-full { display: flex; flex-direction: column; gap: 4px; }
  .todo-card {
    display: grid; grid-template-columns: 20px 1fr; gap: 6px; align-items: start;
    background: var(--surface); border: 1px solid var(--border); border-radius: 9px; padding: 5px 8px;
  }
  .todo-card.done { opacity: .65; }
  .todo-card.done .todo-title-input { text-decoration: line-through; }
  .todo-check { width: 16px; height: 16px; margin-top: 4px; accent-color: var(--primary); }
  .todo-content { min-width: 0; display: flex; flex-direction: column; gap: 0; }
  .todo-main-row { display: flex; align-items: flex-start; gap: 6px; min-height: 24px; }
  .todo-title-input {
    border: none !important; background: transparent !important; padding: 0 !important;
    border-radius: 0 !important; box-shadow: none !important;
  }
  .todo-title-input {
    flex: 1 1 auto; width: 0 !important; min-width: 0; box-sizing: border-box;
    font-size: 17px !important; line-height: 1.2; font-weight: 600;
    min-height: 22px !important; height: auto; overflow: hidden !important; resize: none;
    white-space: pre-wrap; overflow-wrap: anywhere;
  }
  .todo-delete {
    flex: 0 0 auto; color: var(--accent); border-color: transparent;
    padding: 2px 6px; font-size: 12px; line-height: 1.2; opacity: .75;
  }
  .todo-delete:hover { opacity: 1; background: #fff3ef; }
  @media (max-width: 600px) {
    .mode-grid { grid-template-columns: 1fr; }
    .todo-card { grid-template-columns: 20px 1fr; }
    .todo-meta { grid-template-columns: 1fr; }
  }

  /* Toast */
  .toast {
    position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%);
    padding: 8px 20px; background: #333; color: #fff; border-radius: 20px;
    font-size: 13px; z-index: 999; opacity: 0; transition: opacity .3s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #ddd; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #bbb; }

  /* Responsive */
  @media (max-width: 600px) {
    .ai-panel { width: 100vw; }
    .notes-panel { width: 85vw; }
    .note-title-input { font-size: 18px; padding: 12px 16px 4px; }
    .note-editor { padding: 8px 16px 16px; font-size: 18px; }
    .settings-content { max-width: 95vw; }
  }
</style>
</head>
<body>

<!-- Top Bar -->
<div class="topbar">
  <div class="topbar-left">
    <button class="btn-icon" id="btnNew" title="新建">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
    </button>
    <button class="btn-icon" id="btnRefresh" title="刷新">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
    </button>
    <button class="btn-icon" id="btnNotes" title="笔记列表">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h16M4 10h16M4 14h10M4 18h7"/></svg>
    </button>
    <button class="btn-icon" id="btnUndo" title="撤销">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg>
    </button>
    <button class="btn-icon" id="btnRedo" title="重做">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.13-9.36L23 10"/></svg>
    </button>
  </div>
  <div class="topbar-spacer"></div>
  <div class="topbar-right">
    <button class="btn-icon" id="btnTodos" title="待办">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
    </button>
    <button class="btn-icon" id="btnAI" title="AI 助手">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a4 4 0 014 4v2a4 4 0 01-8 0V6a4 4 0 014-4z"/><path d="M16 14H8a4 4 0 00-4 4v2h16v-2a4 4 0 00-4-4z"/><circle cx="12" cy="6" r="1" fill="currentColor"/></svg>
      <span class="badge" id="aiBadge" style="display:none"></span>
    </button>
    <button class="btn-icon" id="btnSettings" title="设置">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
    </button>
  </div>
</div>

<!-- Editor -->
<div class="editor-wrap">
  <input class="note-title-input" id="noteTitle" placeholder="笔记标题..." maxlength="100">
  <textarea class="note-editor" id="noteContent" placeholder="开始记录..."></textarea>
  <div class="status-bar">
    <span id="charCount">0 字</span>
    <span id="saveStatus">已保存</span>
  </div>
</div>

<!-- Notes Panel -->
<div class="panel-overlay" id="notesOverlay"></div>
<div class="notes-panel" id="notesPanel">
  <div class="notes-panel-header">
    <h3>我的笔记</h3>
    <button class="btn-icon" id="closeNotes">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
    </button>
  </div>
  <div class="notes-list" id="notesList"></div>
</div>

<!-- Todos Fullscreen Page -->
<div class="fullscreen-page" id="todosPage">
  <div class="fullscreen-header">
    <h2>待办</h2>
    <div style="display:flex;gap:6px;">
      <button class="btn-primary" id="btnTodoFromPage">新建待办</button>
      <button class="btn-icon" id="closeTodos" title="关闭">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>
  </div>
  <div class="fullscreen-body">
    <div class="todo-toolbar">
      <div class="todo-stats" id="todoStats">0 个待办</div>
      <button class="btn-secondary" id="btnClearDoneTodos">清除已完成</button>
    </div>
    <div class="todo-list-full" id="todosList"></div>
  </div>
</div>

<!-- New Item Fullscreen Page -->
<div class="fullscreen-page" id="newPage">
  <div class="fullscreen-header">
    <div class="fullscreen-title-wrap">
      <h2>新建</h2>
      <button class="btn-icon" id="btnFixTodoInput" title="修复输入框">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a4 4 0 00-5.4 5.4L3 18v3h3l6.3-6.3a4 4 0 005.4-5.4l-2.4 2.4-3-3 2.4-2.4z"/></svg>
      </button>
    </div>
    <button class="btn-icon" id="closeNewPage" title="关闭">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
    </button>
  </div>
  <div class="fullscreen-body">
    <div class="mode-grid">
      <button class="mode-card active" data-mode="note">
        <strong>新建笔记</strong>
        <span>创建一篇空白笔记</span>
      </button>
      <button class="mode-card" data-mode="todoManual">
        <strong>手动输入待办</strong>
        <span>只填写待办标题</span>
      </button>
      <button class="mode-card" data-mode="todoAI">
        <strong>AI 生成待办</strong>
        <span>让大模型分析内容并拆成待办</span>
      </button>
    </div>

    <div class="section-card new-mode-section active" id="mode-note">
      <div class="field-row">
        <label>笔记标题</label>
        <input id="newNoteTitle" placeholder="留空则使用当前时间">
      </div>
      <div class="field-row">
        <label>笔记内容</label>
        <textarea id="newNoteContent" placeholder="可选"></textarea>
      </div>
      <div class="form-actions">
        <button class="btn-primary" id="btnCreateNoteFromPage">创建笔记</button>
      </div>
    </div>

    <div class="section-card new-mode-section" id="mode-todoManual">
      <div class="field-row">
        <label>待办标题</label>
        <textarea id="manualTodoTitle" rows="1" placeholder="输入待办内容"></textarea>
      </div>
      <div class="form-actions">
        <button class="btn-primary" id="btnCreateTodoManual">创建待办</button>
      </div>
    </div>

    <div class="section-card new-mode-section" id="mode-todoAI">
      <div class="field-row">
        <label>交给 AI 分析的内容</label>
        <textarea id="aiTodoSource" placeholder="粘贴会议记录、聊天记录、想法或任务描述，AI 会拆解为待办"></textarea>
      </div>
      <div class="form-actions">
        <button class="btn-primary" id="btnGenerateTodosAI">AI 智能分析生成待办</button>
      </div>
      <div id="aiTodoPreview" style="margin-top:12px;color:var(--text-secondary);font-size:13px;"></div>
    </div>
  </div>
</div>

<!-- AI Panel -->
<div class="panel-overlay" id="aiOverlay"></div>
<div class="ai-panel" id="aiPanel">
  <div class="ai-panel-header">
    <h3>AI 助手</h3>
    <div style="display:flex;gap:4px;">
      <button class="btn-icon" id="btnClearChat" title="清空对话">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
      </button>
      <button class="btn-icon" id="closeAI">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>
  </div>
  <div class="ai-session-bar">
    <button class="btn-mini" id="btnNewChat">新会话</button>
    <div class="ai-session-list" id="aiSessionList"></div>
  </div>
  <div class="ai-messages" id="aiMessages"></div>
  <div class="ai-typing" id="aiTyping" style="display:none">AI 正在思考...</div>
  <div class="ai-input-area">
    <textarea id="aiInput" placeholder="输入问题，也可说：修改当前笔记 / 创建笔记 / 生成待办..." rows="1"></textarea>
  </div>
</div>

<!-- Settings Modal -->
<div class="settings-modal" id="settingsModal">
  <div class="panel-overlay" id="settingsOverlay"></div>
  <div class="settings-content">
    <div class="settings-header">
      <h3>设置</h3>
      <button class="btn-icon" id="closeSettings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="settings-body">
      <div style="font-size:13px;font-weight:600;color:var(--primary);margin-bottom:4px;">AI 模型配置</div>
      <div class="form-group">
        <label>API 地址</label>
        <input type="url" id="cfgUrl" placeholder="https://api.openai.com/v1/chat/completions">
        <div class="hint">支持 OpenAI 兼容接口（如 DeepSeek、通义千问等）</div>
      </div>
      <div class="form-group">
        <label>API Key</label>
        <input type="password" id="cfgKey" placeholder="sk-...">
      </div>
      <div class="form-group">
        <label>模型名称</label>
        <input type="text" id="cfgModel" placeholder="gpt-3.5-turbo">
      </div>
      <div class="form-group">
        <label>系统提示词（可选）</label>
        <textarea id="cfgSystemPrompt" rows="3" style="width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:var(--radius);font-size:14px;font-family:inherit;outline:none;resize:vertical;" placeholder="你是一个智能助手..."></textarea>
      </div>
      <div class="form-group">
        <label>AI 上下文字符预算</label>
        <input type="number" id="cfgContextBudget" min="0" step="1000" placeholder="留空代表不限制预算">
        <div class="hint">输入任意数字作为字符预算；留空表示不限制。内容很多时，AI 会先在本地智能检索最相关的笔记和待办。</div>
      </div>
      <div style="font-size:13px;font-weight:600;color:var(--primary);margin-top:8px;">编辑器设置</div>
      <div class="form-group">
        <label>字号：<span id="fontSizeLabel">18</span>px</label>
        <input type="range" id="cfgFontSize" min="14" max="24" value="18" style="width:100%;padding:0;border:none;cursor:pointer;accent-color:var(--primary);">
        <div class="hint">调节记事本正文字号（14px - 24px）</div>
      </div>
      <div style="font-size:13px;font-weight:600;color:var(--primary);margin-top:8px;">数据管理</div>
      <div style="display:flex;gap:8px;margin-top:4px;">
        <button class="btn-primary" id="btnCopyAll" style="flex:1;font-size:13px;padding:10px 0;">复制所有笔记</button>
        <button class="btn-primary" id="btnExportAll" style="flex:1;font-size:13px;padding:10px 0;background:var(--accent);">导出所有笔记 (txt)</button>
      </div>
    </div>
    <div class="settings-footer">
      <button class="btn-secondary" id="btnCancelSettings">取消</button>
      <button class="btn-primary" id="btnSaveSettings">保存</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
(function() {
  'use strict';

  // ===== Storage Keys =====
  const KEYS = {
    notes: 'smartpad_notes',
    todos: 'smartpad_todos',
    activeId: 'smartpad_active_id',
    settings: 'smartpad_settings',
    chatHistory: 'smartpad_chat_history',
    chatSessions: 'smartpad_chat_sessions',
    activeChatId: 'smartpad_active_chat_id'
  };

  // ===== State =====
  let notes = [];
  let todos = [];
  let activeNoteId = null;
  let autoSaveTimer = null;
  let chatHistory = [];
  let chatSessions = [];
  let activeChatId = null;
  let isStreaming = false;

  // ===== DOM =====
  const $ = id => document.getElementById(id);
  const noteTitle = $('noteTitle');
  const noteContent = $('noteContent');
  const charCount = $('charCount');
  const saveStatus = $('saveStatus');
  const notesList = $('notesList');
  const todosList = $('todosList');
  const aiSessionList = $('aiSessionList');
  const aiMessages = $('aiMessages');
  const aiInput = $('aiInput');
  const aiTyping = $('aiTyping');
  const toast = $('toast');

  // ===== Toast =====
  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
  }

  // ===== Notes CRUD =====
  function loadNotes() {
    try { notes = JSON.parse(localStorage.getItem(KEYS.notes)) || []; } catch { notes = []; }
    activeNoteId = localStorage.getItem(KEYS.activeId);
    if (!notes.find(n => n.id === activeNoteId)) activeNoteId = notes.length ? notes[0].id : null;
  }

  function saveNotes() {
    localStorage.setItem(KEYS.notes, JSON.stringify(notes));
    localStorage.setItem(KEYS.activeId, activeNoteId);
  }

  function getBeijingTimeStr() {
    const now = new Date();
    const bj = new Date(now.toLocaleString('en-US', { timeZone: 'Asia/Shanghai' }));
    const pad = n => String(n).padStart(2, '0');
    return `${bj.getFullYear()}-${pad(bj.getMonth()+1)}-${pad(bj.getDate())} ${pad(bj.getHours())}:${pad(bj.getMinutes())}:${pad(bj.getSeconds())}`;
  }

  function createNote(customTitle, customContent, silent) {
    if (typeof customTitle !== 'string') customTitle = '';
    if (typeof customContent !== 'string') customContent = '';
    const note = {
      id: 'n_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8),
      title: customTitle.trim() || getBeijingTimeStr(),
      content: customContent || '',
      createdAt: Date.now(),
      updatedAt: Date.now()
    };
    notes.unshift(note);
    activeNoteId = note.id;
    saveNotes();
    renderNote();
    renderNotesList();
    noteContent.focus();
    if (!silent) showToast('已创建新笔记');
    return note;
  }

  function deleteNote(id) {
    notes = notes.filter(n => n.id !== id);
    if (activeNoteId === id) {
      activeNoteId = notes.length ? notes[0].id : null;
    }
    saveNotes();
    renderNote();
    renderNotesList();
    showToast('已删除');
  }

  function getActiveNote() {
    return notes.find(n => n.id === activeNoteId) || null;
  }

  function renderNote() {
    const note = getActiveNote();
    if (note) {
      noteTitle.value = note.title;
      noteContent.value = note.content;
      updateCharCount();
    } else {
      noteTitle.value = '';
      noteContent.value = '';
      updateCharCount();
    }
  }

  function updateCharCount() {
    const len = noteContent.value.length;
    charCount.textContent = len + ' 字';
  }

  function autoSave() {
    const note = getActiveNote();
    if (!note) return;
    note.title = noteTitle.value;
    note.content = noteContent.value;
    note.updatedAt = Date.now();
    saveNotes();
    renderNotesList();
    saveStatus.textContent = '已保存';
  }

  function scheduleAutoSave() {
    saveStatus.textContent = '编辑中...';
    clearTimeout(autoSaveTimer);
    autoSaveTimer = setTimeout(autoSave, 800);
  }

  function renderNotesList() {
    const sorted = [...notes].sort((a, b) => b.updatedAt - a.updatedAt);
    notesList.innerHTML = sorted.map(n => {
      const preview = n.content.slice(0, 60).replace(/\n/g, ' ') || '空笔记';
      const date = new Date(n.updatedAt).toLocaleString('zh-CN', { month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit' });
      const isActive = n.id === activeNoteId;
      return `<div class="note-item ${isActive ? 'active' : ''}" data-id="${n.id}">
        <div class="note-item-title">${escapeHtml(n.title || '无标题')}</div>
        <div class="note-item-preview">${escapeHtml(preview)}</div>
        <div class="note-item-date">${date}</div>
        <div class="note-item-actions">
          <button onclick="event.stopPropagation();window._deleteNote('${n.id}')">删除</button>
        </div>
      </div>`;
    }).join('');

    notesList.querySelectorAll('.note-item').forEach(el => {
      el.addEventListener('click', () => {
        autoSave();
        activeNoteId = el.dataset.id;
        saveNotes();
        renderNote();
        renderNotesList();
        closePanel('notes');
      });
    });
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function escapeAttr(str) {
    return escapeHtml(String(str || '')).replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  window._deleteNote = deleteNote;

  // ===== Todos CRUD =====
  function loadTodos() {
    try { todos = JSON.parse(localStorage.getItem(KEYS.todos)) || []; } catch { todos = []; }
  }

  function saveTodos() {
    localStorage.setItem(KEYS.todos, JSON.stringify(todos));
  }

  function createTodo(title, detail, priority, dueText) {
    const todo = {
      id: 't_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8),
      title: (title || '').trim() || '未命名待办',
      detail: (detail || '').trim(),
      priority: priority || '普通',
      dueText: dueText || '',
      done: false,
      createdAt: Date.now(),
      updatedAt: Date.now()
    };
    todos.unshift(todo);
    saveTodos();
    renderTodosList();
    return todo;
  }

  function updateTodo(id, patch) {
    const todo = todos.find(t => t.id === id);
    if (!todo) return;
    Object.assign(todo, patch, { updatedAt: Date.now() });
    saveTodos();
    renderTodosStats();
  }

  function deleteTodo(id) {
    todos = todos.filter(t => t.id !== id);
    saveTodos();
    renderTodosList();
    showToast('已删除待办');
  }

  function renderTodosStats() {
    const total = todos.length;
    const done = todos.filter(t => t.done).length;
    $('todoStats').textContent = total ? `${total} 个待办，${done} 个已完成` : '暂无待办';
  }

  function renderTodosList() {
    renderTodosStats();
    if (!todos.length) {
      todosList.innerHTML = '<div class="section-card" style="color:var(--text-secondary);text-align:center;">暂无待办，点击“新建待办”添加。</div>';
      return;
    }
    const sorted = [...todos].sort((a, b) => Number(a.done) - Number(b.done) || b.updatedAt - a.updatedAt);
    todosList.innerHTML = sorted.map(t => {
      const displayText = [
        t.title || '',
        (t.detail || '').trim(),
        (t.dueText || '').trim() ? `时间：${t.dueText}` : '',
        t.priority && t.priority !== '普通' ? `优先级：${t.priority}` : ''
      ].filter(Boolean).join('\n');
      return `
      <div class="todo-card ${t.done ? 'done' : ''}" data-id="${escapeAttr(t.id)}">
        <input class="todo-check" type="checkbox" ${t.done ? 'checked' : ''} title="完成状态">
        <div class="todo-content">
          <div class="todo-main-row">
            <textarea class="todo-title-input" rows="1" placeholder="待办内容">${escapeHtml(displayText)}</textarea>
            <button class="btn-secondary todo-delete">删除</button>
          </div>
        </div>
      </div>`;
    }).join('');

    todosList.querySelectorAll('.todo-card').forEach(card => {
      const id = card.dataset.id;
      card.querySelector('.todo-check').addEventListener('change', e => {
        updateTodo(id, { done: e.target.checked });
        card.classList.toggle('done', e.target.checked);
      });
      const titleInput = card.querySelector('.todo-title-input');
      requestAnimationFrame(() => autoGrowTodoText(titleInput));
      titleInput.addEventListener('input', e => {
        autoGrowTodoText(e.target);
        updateTodo(id, { title: e.target.value, detail: '', dueText: '', priority: '普通' });
      });
      card.querySelector('.todo-delete').addEventListener('click', () => deleteTodo(id));
    });
    requestAnimationFrame(autoGrowAllTodoText);
  }

  // ===== Panels =====
  function openPanel(name) {
    if (name === 'notes') {
      $('notesOverlay').classList.add('active');
      $('notesPanel').classList.add('active');
    } else if (name === 'ai') {
      $('aiOverlay').classList.add('active');
      $('aiPanel').classList.add('active');
      renderChatSessions();
      renderChatHistory();
      aiInput.focus();
    } else if (name === 'settings') {
      $('settingsModal').classList.add('active');
      loadSettings();
    } else if (name === 'todos') {
      renderTodosList();
      $('todosPage').classList.add('active');
    } else if (name === 'new') {
      $('newPage').classList.add('active');
      setNewMode('note');
    }
  }

  function closePanel(name) {
    if (name === 'notes') {
      $('notesOverlay').classList.remove('active');
      $('notesPanel').classList.remove('active');
    } else if (name === 'ai') {
      $('aiOverlay').classList.remove('active');
      $('aiPanel').classList.remove('active');
    } else if (name === 'settings') {
      $('settingsModal').classList.remove('active');
    } else if (name === 'todos') {
      $('todosPage').classList.remove('active');
    } else if (name === 'new') {
      $('newPage').classList.remove('active');
    }
  }

  function setNewMode(mode) {
    document.querySelectorAll('.mode-card').forEach(btn => btn.classList.toggle('active', btn.dataset.mode === mode));
    document.querySelectorAll('.new-mode-section').forEach(section => section.classList.remove('active'));
    const section = $('mode-' + mode);
    if (section) section.classList.add('active');
    $('btnFixTodoInput').classList.toggle('active', mode === 'todoManual');
  }

  // ===== Settings =====
  function loadSettings() {
    try {
      const s = JSON.parse(localStorage.getItem(KEYS.settings)) || {};
      $('cfgUrl').value = s.url || '';
      $('cfgKey').value = s.key || '';
      $('cfgModel').value = s.model || '';
      $('cfgSystemPrompt').value = s.systemPrompt || '';
      $('cfgContextBudget').value = s.contextBudget == null ? '' : s.contextBudget;
      const fontSize = s.fontSize || 18;
      $('cfgFontSize').value = fontSize;
      $('fontSizeLabel').textContent = fontSize;
    } catch {}
  }

  function saveSettings() {
    const s = {
      url: $('cfgUrl').value.trim(),
      key: $('cfgKey').value.trim(),
      model: $('cfgModel').value.trim(),
      systemPrompt: $('cfgSystemPrompt').value.trim(),
      contextBudget: $('cfgContextBudget').value.trim() === '' ? null : Math.max(0, parseInt($('cfgContextBudget').value, 10) || 0),
      fontSize: parseInt($('cfgFontSize').value, 10)
    };
    localStorage.setItem(KEYS.settings, JSON.stringify(s));
    applyFontSize(s.fontSize);
    closePanel('settings');
    showToast('设置已保存');
  }

  function applyFontSize(size) {
    noteContent.style.fontSize = size + 'px';
  }

  function getSettings() {
    try { return JSON.parse(localStorage.getItem(KEYS.settings)) || {}; } catch { return {}; }
  }

  // ===== AI Chat =====
  function loadChatHistory() {
    try { chatSessions = JSON.parse(localStorage.getItem(KEYS.chatSessions)) || []; } catch { chatSessions = []; }
    activeChatId = localStorage.getItem(KEYS.activeChatId);
    if (!chatSessions.length) {
      try { chatHistory = JSON.parse(localStorage.getItem(KEYS.chatHistory)) || []; } catch { chatHistory = []; }
      chatSessions = [{
        id: 'c_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8),
        title: chatHistory.length ? '历史会话' : '新会话',
        messages: chatHistory,
        createdAt: Date.now(),
        updatedAt: Date.now()
      }];
      activeChatId = chatSessions[0].id;
      saveChatHistory();
    }
    if (!chatSessions.find(s => s.id === activeChatId)) activeChatId = chatSessions[0]?.id || null;
  }

  function saveChatHistory() {
    localStorage.setItem(KEYS.chatSessions, JSON.stringify(chatSessions));
    localStorage.setItem(KEYS.activeChatId, activeChatId || '');
    chatHistory = getActiveMessages();
    localStorage.setItem(KEYS.chatHistory, JSON.stringify(chatHistory));
  }

  function getActiveSession() {
    if (!chatSessions.length) createChatSession();
    return chatSessions.find(s => s.id === activeChatId) || chatSessions[0] || null;
  }

  function getActiveMessages() {
    const session = getActiveSession();
    return session?.messages || [];
  }

  function createChatSession(title) {
    const session = {
      id: 'c_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8),
      title: title || '新会话',
      messages: [],
      createdAt: Date.now(),
      updatedAt: Date.now()
    };
    chatSessions.unshift(session);
    activeChatId = session.id;
    saveChatHistory();
    renderChatSessions();
    renderChatHistory();
    return session;
  }

  function updateActiveSessionTitle(text) {
    const session = getActiveSession();
    if (!session || session.messages.length > 1 || session.title !== '新会话') return;
    session.title = String(text || '新会话').replace(/\s+/g, ' ').slice(0, 18) || '新会话';
  }

  function deleteChatSession(id) {
    if (chatSessions.length <= 1) {
      const session = getActiveSession();
      if (session) {
        session.messages = [];
        session.title = '新会话';
        session.updatedAt = Date.now();
      }
    } else {
      chatSessions = chatSessions.filter(s => s.id !== id);
      if (activeChatId === id) activeChatId = chatSessions[0]?.id || null;
    }
    saveChatHistory();
    renderChatSessions();
    renderChatHistory();
    showToast('会话已删除');
  }

  function renderChatSessions() {
    if (!aiSessionList) return;
    aiSessionList.innerHTML = chatSessions.map(s => `
      <div class="ai-session-item ${s.id === activeChatId ? 'active' : ''}" data-id="${escapeAttr(s.id)}" title="${escapeAttr(s.title || '新会话')}">
        <span class="ai-session-title">${escapeHtml(s.title || '新会话')}</span>
        <button class="ai-session-del" title="删除会话">×</button>
      </div>`).join('');
    aiSessionList.querySelectorAll('.ai-session-item').forEach(item => {
      item.addEventListener('click', () => {
        activeChatId = item.dataset.id;
        saveChatHistory();
        renderChatSessions();
        renderChatHistory();
      });
      item.querySelector('.ai-session-del').addEventListener('click', e => {
        e.stopPropagation();
        deleteChatSession(item.dataset.id);
      });
    });
  }

  const COPY_ICON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>';

  function addCopyBtn(msgEl, text) {
    const btn = document.createElement('button');
    btn.className = 'ai-msg-copy';
    btn.title = '复制';
    btn.innerHTML = COPY_ICON;
    btn.addEventListener('click', e => {
      e.stopPropagation();
      navigator.clipboard.writeText(text).then(() => showToast('已复制')).catch(() => {
        const ta = document.createElement('textarea');
        ta.value = text; document.body.appendChild(ta);
        ta.select(); document.execCommand('copy');
        document.body.removeChild(ta);
        showToast('已复制');
      });
    });
    msgEl.appendChild(btn);
  }

  function renderChatHistory() {
    chatHistory = getActiveMessages();
    aiMessages.innerHTML = chatHistory.map(m =>
      `<div class="ai-msg ${m.role}">${formatMessage(m.content, m.role)}</div>`
    ).join('');
    aiMessages.querySelectorAll('.ai-msg').forEach(el => {
      const idx = Array.from(aiMessages.querySelectorAll('.ai-msg')).indexOf(el);
      if (chatHistory[idx]) {
        const msg = chatHistory[idx];
        addCopyBtn(el, getMessageDisplayText(msg.content, msg.role));
      }
    });
    aiMessages.scrollTop = aiMessages.scrollHeight;
  }

  function summarizeUserContext() {
    const recentNotes = [...notes].sort((a, b) => b.updatedAt - a.updatedAt).slice(0, 12);
    const activeTodos = todos.filter(t => !t.done).slice(0, 30);
    const doneTodos = todos.filter(t => t.done).slice(0, 10);
    const noteTitles = recentNotes.map(n => n.title || '无标题').join('、') || '暂无';
    const importantTodos = activeTodos.filter(t => t.priority === '重要' || t.priority === '紧急').map(t => t.title).join('、') || '暂无';
    return [
      `用户共有 ${notes.length} 篇笔记、${todos.length} 个待办，其中未完成待办 ${activeTodos.length} 个。`,
      `近期笔记标题：${noteTitles}`,
      `重要/紧急待办：${importantTodos}`,
      `学习规则：把笔记和待办视为用户长期记忆，主动识别用户的目标、偏好、项目、时间安排、表达风格和未完成事项；回答时优先贴合用户当前记事本与待办，不要机械复述全部资料。`,
      `隐私规则：这些资料只用于当前回答，不要声称已上传到外部长期记忆。`
    ].join('\n');
  }

  function getKeywords(query) {
    const stop = new Set(['的','了','和','是','我','你','他','她','它','在','要','把','给','请','帮','如何','怎么','什么','一个','一下','以及','或者','如果','因为','所以','the','and','for','with','this','that','what','how']);
    return Array.from(new Set(String(query || '')
      .toLowerCase()
      .match(/[\u4e00-\u9fa5]{2,}|[a-z0-9_+-]{2,}/g) || []))
      .filter(w => !stop.has(w))
      .slice(0, 30);
  }

  function scoreText(text, keywords, updatedAt, extraScore) {
    const lower = String(text || '').toLowerCase();
    let score = extraScore || 0;
    keywords.forEach(k => {
      const escaped = k.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      const count = (lower.match(new RegExp(escaped, 'g')) || []).length;
      score += count * (k.length >= 4 ? 4 : 2);
    });
    if (updatedAt) score += Math.max(0, 7 - (Date.now() - updatedAt) / 86400000 / 7);
    return score;
  }

  function makeSnippet(text, keywords, maxLen) {
    const source = String(text || '').replace(/\s+/g, ' ').trim();
    if (source.length <= maxLen) return source;
    const lower = source.toLowerCase();
    let pos = -1;
    for (const k of keywords) {
      pos = lower.indexOf(k.toLowerCase());
      if (pos >= 0) break;
    }
    if (pos < 0) return source.slice(0, maxLen) + '...';
    const start = Math.max(0, pos - Math.floor(maxLen / 3));
    return (start > 0 ? '...' : '') + source.slice(start, start + maxLen) + (start + maxLen < source.length ? '...' : '');
  }

  function fitToBudget(sections, budget) {
    let used = 0;
    const result = [];
    for (const section of sections) {
      if (!section) continue;
      const left = budget - used;
      if (left <= 0) break;
      const text = section.length > left ? section.slice(0, Math.max(0, left - 20)) + '\n...（已按预算截断）' : section;
      result.push(text);
      used += text.length;
    }
    return result.join('\n\n');
  }

  function buildOptimizedMemoryContext(query, settings) {
    const rawBudget = Number(settings.contextBudget);
    const unlimited = !(Number.isFinite(rawBudget) && rawBudget > 0);
    const budget = unlimited ? Infinity : rawBudget;
    const keywords = getKeywords(query);
    const activeNote = getActiveNote();
    const noteBudget = unlimited ? Infinity : Math.floor(budget * 0.62);
    const todoBudget = unlimited ? Infinity : Math.floor(budget * 0.22);
    const profileBudget = unlimited ? Infinity : budget - noteBudget - todoBudget;

    const rankedNotes = notes.map(n => {
      let extra = n.id === activeNoteId ? 80 : 0;
      const text = `${n.title || ''}\n${n.content || ''}`;
      return { note: n, score: scoreText(text, keywords, n.updatedAt, extra) };
    }).sort((a, b) => b.score - a.score || b.note.updatedAt - a.note.updatedAt);

    const noteSections = rankedNotes.slice(0, unlimited ? rankedNotes.length : 10).map(({ note, score }, index) => {
      const date = new Date(note.updatedAt).toLocaleString('zh-CN');
      const tag = note.id === activeNoteId ? '当前正在编辑' : `相关度 ${Math.round(score)}`;
      const maxLen = unlimited ? Infinity : Math.max(500, Math.floor(noteBudget / 8));
      return `【笔记 ${index + 1}｜${tag}】${note.title || '无标题'}\n更新时间：${date}\n片段：${makeSnippet(note.content || '（空）', keywords, maxLen)}`;
    });

    const rankedTodos = todos.map(t => {
      let extra = t.done ? -5 : 20;
      if (t.priority === '紧急') extra += 30;
      if (t.priority === '重要') extra += 18;
      return { todo: t, score: scoreText(`${t.title || ''}\n${t.detail || ''}\n${t.dueText || ''}`, keywords, t.updatedAt, extra) };
    }).sort((a, b) => b.score - a.score || Number(a.todo.done) - Number(b.todo.done) || b.todo.updatedAt - a.todo.updatedAt);

    const todoSections = rankedTodos.slice(0, unlimited ? rankedTodos.length : 18).map(({ todo }) => {
      const status = todo.done ? '已完成' : '未完成';
      return `【${status}｜${todo.priority || '普通'}】${todo.title || '未命名待办'}\n时间：${todo.dueText || '未设置'}\n说明：${makeSnippet(todo.detail || '无', keywords, unlimited ? Infinity : 220)}`;
    });

    const profile = fitToBudget([summarizeUserContext()], profileBudget);
    const notesPart = fitToBudget(noteSections, noteBudget);
    const todosPart = fitToBudget(todoSections, todoBudget);
    const retrievalInfo = `本次采用本地智能检索${unlimited ? '，当前设置为不限制上下文预算' : '，不会把全部内容一次性发给 AI'}。\n检索关键词：${keywords.join('、') || '无明确关键词，优先当前笔记、近期内容和未完成待办'}\n笔记总数：${notes.length}，本次召回：${noteSections.length}；待办总数：${todos.length}，本次召回：${todoSections.length}；上下文预算：${unlimited ? '不限制' : budget + ' 字符'}。`;

    return `【上下文优化说明】\n${retrievalInfo}

【用户画像与近期重点】
${profile || '暂无'}

【本次最相关笔记片段】
${notesPart || '（未召回相关笔记）'}

【本次最相关待办】
${todosPart || '（未召回相关待办）'}`;
  }

  function buildAISystemPrompt(settings, query) {
    const base = settings.systemPrompt || '你是一个智能助手。';
    return `${base}

你需要像了解用户的私人助理一样回答问题。回答时综合四类信息：
1. 大模型自身知识、推理能力与资料储备；
2. 用户当前记事本内容；
3. 用户待办内容与完成状态；
4. 互联网最新资料：如果当前模型/API具备联网检索、浏览或搜索能力，你必须主动用于需要时效性的问题；如果当前接口不支持联网，不要伪造最新信息，要明确说明“当前接口未提供实时联网检索”，再基于已有知识和本地内容回答。

回答规则：
- 优先结合用户笔记和待办，给出更懂用户处境的回答。
- 如果本地内容与通用知识冲突，说明你依据的是哪一类信息。
- 涉及日期、价格、政策、新闻、版本、比赛、股票等时效问题时，优先使用联网能力；无法联网时要提示限制。
- 不要把用户笔记和待办整段泄露式复述，除非用户明确要求。
- 用户要求“修改当前笔记、创建笔记、生成待办”时，可以按已有工具逻辑执行或提示可执行。
- 如果本次召回的片段不足以回答，要主动说明需要更具体关键词、标题、时间范围，或让用户打开相关笔记后再问；不要假装已经读取全部完整内容。
- 当用户要求“查找、总结、回顾、基于我的记录分析”时，优先依据本次召回片段，并指出这是智能检索结果。

${buildOptimizedMemoryContext(query || '', settings)}`;
  }

  function stripMarkdown(text) {
    const protectedRanges = [];
    const protectRange = match => {
      const key = `\uE000${protectedRanges.length}\uE001`;
      protectedRanges.push(match);
      return key;
    };

    const restoreRanges = str => protectedRanges.reduce(
      (result, value, index) => result.replaceAll(`\uE000${index}\uE001`, value),
      str
    );

    const plain = String(text || '')
      .replace(/\r\n?/g, '\n')
      .replace(/([\p{L}\p{N}])\s*-\s*([\p{L}\p{N}])/gu, protectRange)
      .replace(/```[\w-]*\n?([\s\S]*?)```/g, '$1')
      .replace(/`([^`]+)`/g, '$1')
      .replace(/!\[([^\]]*)\]\([^)]+\)/g, '$1')
      .replace(/\[([^\]]+)\]\([^)]+\)/g, '$1')
      .replace(/^\s{0,3}#{1,6}\s+/gm, '')
      .replace(/^\s{0,3}>\s?/gm, '')
      .replace(/^\s*[-*_]{3,}\s*$/gm, '')
      .replace(/^\s*([-*+]|\d+[.)])\s+/gm, '')
      .replace(/(\*\*|__)(.*?)\1/g, '$2')
      .replace(/(\*|_)(.*?)\1/g, '$2')
      .replace(/~~(.*?)~~/g, '$1')
      .replace(/^\s*\|?(.*?)\|?\s*$/gm, (line, content) => {
        if (!line.includes('|')) return line;
        if (/^:?-{3,}:?(\s*\|\s*:?-{3,}:?)*$/.test(content.trim())) return '';
        return content.split('|').map(s => s.trim()).filter(Boolean).join('  ');
      })
      .split('\n')
      .map(line => line.trim())
      .join('\n')
      .replace(/\n{3,}/g, '\n\n')
      .trim();

    return restoreRanges(plain);
  }

  function getMessageDisplayText(text, role) {
    return role === 'assistant' ? stripMarkdown(text) : String(text || '');
  }

  function formatMessage(text, role) {
    let html = escapeHtml(getMessageDisplayText(text, role));
    html = html.replace(/\n/g, '<br>');
    return html;
  }

  function appendMessage(role, content) {
    const session = getActiveSession();
    chatHistory = session.messages;
    chatHistory.push({ role, content, ts: Date.now() });

    saveChatHistory();
    renderChatSessions();
    const div = document.createElement('div');
    div.className = 'ai-msg ' + role;
    div.innerHTML = formatMessage(content, role);
    addCopyBtn(div, getMessageDisplayText(content, role));
    aiMessages.appendChild(div);

  }

  function ensureAIReady() {
    const settings = getSettings();
    if (!settings.url || !settings.key || !settings.model) {
      showToast('请先在设置中配置 AI 模型');
      openPanel('settings');
      return null;
    }
    return settings;
  }

  async function callAIText(messages, temperature) {
    const settings = ensureAIReady();
    if (!settings) throw new Error('AI 模型未配置');
    const resp = await fetch(settings.url, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + settings.key
      },
      body: JSON.stringify({
        model: settings.model,
        messages,
        temperature: temperature ?? 0.7,
        stream: false
      })
    });
    if (!resp.ok) {
      const errText = await resp.text();
      throw new Error(`API 错误 (${resp.status}): ${errText.slice(0, 200)}`);
    }
    const data = await resp.json();
    return data.choices?.[0]?.message?.content?.trim() || '';
  }

  function getNoteOperationCandidates(query) {
    const keywords = getKeywords(query);
    return notes.map(n => ({
      note: n,
      score: scoreText(`${n.title || ''}\n${n.content || ''}`, keywords, n.updatedAt, n.id === activeNoteId ? 100 : 0)
    })).sort((a, b) => b.score - a.score || b.note.updatedAt - a.note.updatedAt).slice(0, 12);
  }

  function parseJsonObject(text) {
    const raw = String(text || '').trim().replace(/^```json\s*/i, '').replace(/^```\s*/i, '').replace(/```$/i, '').trim();
    const match = raw.match(/\{[\s\S]*\}/);
    return JSON.parse(match ? match[0] : raw);
  }

  async function aiOperateNotes(userText) {
    const settings = ensureAIReady();
    if (!settings) return false;
    autoSave();
    isStreaming = true;
    aiTyping.style.display = 'block';
    aiInput.disabled = true;

    const candidates = getNoteOperationCandidates(userText).map(({ note }, index) => ({
      index: index + 1,
      id: note.id,
      title: note.title || '无标题',
      updatedAt: new Date(note.updatedAt).toLocaleString('zh-CN'),
      isActive: note.id === activeNoteId,
      snippet: makeSnippet(note.content || '（空）', getKeywords(userText), 700)
    }));

    try {
      const result = await callAIText([
        {
          role: 'system',
          content: buildAISystemPrompt(settings, userText) + `

你现在是“笔记操作规划器”。必须只返回一个 JSON 对象，不要 Markdown，不要解释。
可用 action：
- create_note：创建新笔记。字段：title, content

- open_note：打开笔记。字段：targetId

规则：
1. 如果用户说“修改/改写/优化/润色/整理/追加/添加到某篇笔记”，使用 modify_note_new_version，并输出修改后的完整正文 content。
2. 如果用户说“修改当前笔记”，targetId 使用当前正在编辑的笔记。
3. 删除、重命名、打开必须有明确目标；不明确就返回 need_clarification。
4. targetId 必须来自候选笔记列表，除非是 create_note。
5. create_note 的 content 必须是可直接保存的正文。
6. 只返回 JSON，例如：{"action":"modify_note_new_version","targetId":"...","title":"...（AI修改版）","content":"..."}` },
        {
          role: 'user',
          content: `用户指令：${userText}

当前笔记ID：${activeNoteId || '无'}
候选笔记：
${JSON.stringify(candidates, null, 2)}`
        }
      ], 0.2);

      const op = parseJsonObject(result);
      let message = '';
      if (op.action === 'create_note') {
        const note = createNote(op.title || 'AI 创建笔记', op.content || '', true);
        message = `已创建笔记：${note.title}`;
      } else if (op.action === 'modify_note_new_version') {
        const target = notes.find(n => n.id === op.targetId) || getActiveNote();
        if (!target) throw new Error('没有找到要修改的笔记');
        const title = op.title || `${target.title || '无标题'}（AI修改版）`;
        const content = op.content || target.content || '';
        const note = createNote(title, content, true);
        message = `已创建修改版本：${note.title}\n原笔记“${target.title || '无标题'}”未删除。`;
      } else if (op.action === 'rename_note') {
        const target = notes.find(n => n.id === op.targetId);
        if (!target) throw new Error('没有找到要重命名的笔记');
        const oldTitle = target.title || '无标题';
        target.title = op.title || oldTitle;
        target.updatedAt = Date.now();
        saveNotes();
        renderNote();
        renderNotesList();
        message = `已将“${oldTitle}”重命名为“${target.title}”。`;
      } else if (op.action === 'delete_note') {
        const target = notes.find(n => n.id === op.targetId);
        if (!target) throw new Error('没有找到要删除的笔记');
        const oldTitle = target.title || '无标题';
        deleteNote(target.id);
        message = `已删除笔记：${oldTitle}`;
      } else if (op.action === 'open_note') {
        const target = notes.find(n => n.id === op.targetId);

      }
    }
    isStreaming = false;
    aiTyping.style.display = 'none';
    aiInput.disabled = false;
    aiInput.focus();
  }

  async function sendAIMessage() {
    const text = aiInput.value.trim();
    if (!text || isStreaming) return;

    const settings = ensureAIReady();
    if (!settings) return;

    aiInput.value = '';
    aiInput.style.height = 'auto';
    appendMessage('user', text);

    if (/生成待办|创建待办|新建待办|拆解待办/.test(text)) {
      await aiGenerateTodosFromText(text);
      appendMessage('assistant', '已尝试根据你的内容生成待办，请打开“待办”查看和编辑。');
      return;
    }

    if (/(笔记|记事本)/.test(text) && /(创建|新建|生成|修改|改写|优化|润色|整理|追加|添加|重命名|改名|删除|打开|操作|改一下|改成)/.test(text)) {
      await aiOperateNotes(text);
      return;
    }

    const messages = [{ role: 'system', content: buildAISystemPrompt(settings, text) }];

    // Include recent messages of current session
    const recent = getActiveMessages().slice(-12);
    recent.forEach(m => {
      if (m.role === 'user' || m.role === 'assistant') {
        messages.push({ role: m.role, content: m.content });
      }
    });

    isStreaming = true;
    aiTyping.style.display = 'block';
    aiInput.disabled = true;

    let fullResponse = '';

    try {
      const resp = await fetch(settings.url, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + settings.key
        },
        body: JSON.stringify({
          model: settings.model,
          messages: messages,
          stream: true
        })
      });

      if (!resp.ok) {
        const errText = await resp.text();
        throw new Error(`API 错误 (${resp.status}): ${errText.slice(0, 200)}`);
      }

      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop() || '';

        for (const line of lines) {
          const trimmed = line.trim();
          if (!trimmed || !trimmed.startsWith('data:')) continue;
          const data = trimmed.slice(5).trim();
          if (data === '[DONE]') continue;

          try {
            const json = JSON.parse(data);
            const delta = json.choices?.[0]?.delta?.content;
            if (delta) {
              fullResponse += delta;
              appendStreamChunk(fullResponse);
            }
          } catch {}
        }
      }

      // Save final assistant message
      if (fullResponse) {
        const session = getActiveSession();
        chatHistory = session.messages;
        chatHistory.push({ role: 'assistant', content: fullResponse, ts: Date.now() });
        session.updatedAt = Date.now();
        saveChatHistory();
        renderChatSessions();
      }
    } catch (err) {
      fullResponse = '请求失败: ' + err.message;
      appendMessage('assistant', fullResponse);
    }

    finalizeStream(fullResponse);
  }

  // ===== Auto-resize textarea =====
  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function autoGrowTodoText(el) {
    if (!el) return;
    el.style.height = '0px';
    el.style.height = Math.max(el.scrollHeight, 22) + 'px';
  }

  function autoGrowAllTodoText() {
    document.querySelectorAll('.todo-title-input').forEach(autoGrowTodoText);
  }

  function autoGrowManualTodoTitle() {
    const el = $('manualTodoTitle');
    if (!el) return;
    el.style.height = 'auto';
    const maxHeight = parseFloat(getComputedStyle(el).lineHeight) * 5 + 20;
    const nextHeight = Math.min(el.scrollHeight, maxHeight);
    el.style.height = nextHeight + 'px';
    el.style.overflowY = el.scrollHeight > maxHeight ? 'auto' : 'hidden';
  }

  function fixManualTodoInput() {
    const el = $('manualTodoTitle');
    if (!el) return;
    el.focus();
    el.select();
    document.execCommand('delete');
    document.execCommand('insertText', false, '1');
    document.execCommand('undo');
    requestAnimationFrame(autoGrowManualTodoTitle);
  }

  // ===== Event Bindings =====
  $('btnNew').addEventListener('click', () => createNote());
  $('btnRefresh').addEventListener('click', () => { autoSave(); location.reload(); });
  $('btnNotes').addEventListener('click', () => { autoSave(); renderNotesList(); openPanel('notes'); });
  $('btnUndo').addEventListener('click', () => { document.execCommand('undo'); });
  $('btnRedo').addEventListener('click', () => { document.execCommand('redo'); });
  $('btnTodos').addEventListener('click', () => { autoSave(); openPanel('todos'); });
  $('btnAI').addEventListener('click', () => { openPanel('ai'); });
  $('btnSettings').addEventListener('click', () => openPanel('settings'));

  $('closeNotes').addEventListener('click', () => closePanel('notes'));
  $('closeTodos').addEventListener('click', () => closePanel('todos'));
  $('closeNewPage').addEventListener('click', () => closePanel('new'));
  $('closeAI').addEventListener('click', () => closePanel('ai'));
  $('closeSettings').addEventListener('click', () => closePanel('settings'));

  $('notesOverlay').addEventListener('click', () => closePanel('notes'));
  $('aiOverlay').addEventListener('click', () => closePanel('ai'));
  $('settingsOverlay').addEventListener('click', () => closePanel('settings'));

  $('btnSaveSettings').addEventListener('click', saveSettings);
  $('btnCancelSettings').addEventListener('click', () => closePanel('settings'));

  $('cfgFontSize').addEventListener('input', () => {
    const v = $('cfgFontSize').value;
    $('fontSizeLabel').textContent = v;
    applyFontSize(parseInt(v, 10));
  });

  $('btnFixTodoInput').addEventListener('click', fixManualTodoInput);

  document.querySelectorAll('.mode-card').forEach(btn => {
    btn.addEventListener('click', () => {
      setNewMode(btn.dataset.mode);
      if (btn.dataset.mode === 'todoManual') {
        requestAnimationFrame(() => {
          $('manualTodoTitle').focus();
          autoGrowManualTodoTitle();
        });
      }
    });
  });

  $('btnTodoFromPage').addEventListener('click', () => {
    closePanel('todos');
    openPanel('new');
    setNewMode('todoManual');
    requestAnimationFrame(() => {
      $('manualTodoTitle').focus();
      autoGrowManualTodoTitle();
    });
  });

  $('btnCreateNoteFromPage').addEventListener('click', () => {
    createNote($('newNoteTitle').value.trim(), $('newNoteContent').value.trim());
    $('newNoteTitle').value = '';
    $('newNoteContent').value = '';
    closePanel('new');
  });

  $('btnCreateTodoManual').addEventListener('click', () => {
    const title = $('manualTodoTitle').value.trim();
    if (!title) { showToast('请输入待办标题'); return; }
    createTodo(title, '');
    $('manualTodoTitle').value = '';
    autoGrowManualTodoTitle();
    closePanel('new');
    openPanel('todos');
    showToast('已创建待办');
  });

  $('manualTodoTitle').addEventListener('input', autoGrowManualTodoTitle);

  $('btnGenerateTodosAI').addEventListener('click', () => aiGenerateTodosFromText($('aiTodoSource').value));

  $('btnNewChat').addEventListener('click', () => {
    createChatSession();
    aiInput.focus();
    showToast('已创建新会话');
  });

  $('btnClearDoneTodos').addEventListener('click', () => {
    const before = todos.length;
    todos = todos.filter(t => !t.done);
    saveTodos();
    renderTodosList();
    showToast(`已清除 ${before - todos.length} 个已完成待办`);
  });

  // ===== Data Management =====
  function buildAllNotesText() {
    const sorted = [...notes].sort((a, b) => b.updatedAt - a.updatedAt);
    return sorted.map(n => {
      const date = new Date(n.updatedAt).toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai' });
      return `【${n.title || '无标题'}】\n时间：${date}\n\n${n.content || '（空）'}`;
    }).join('\n\n' + '='.repeat(40) + '\n\n');
  }

  $('btnCopyAll').addEventListener('click', () => {
    if (!notes.length) { showToast('暂无笔记'); return; }
    const text = buildAllNotesText();
    navigator.clipboard.writeText(text).then(() => showToast('已复制所有笔记')).catch(() => {
      // fallback
      const ta = document.createElement('textarea');
      ta.value = text; document.body.appendChild(ta);
      ta.select(); document.execCommand('copy');
      document.body.removeChild(ta);
      showToast('已复制所有笔记');
    });
  });

  $('btnExportAll').addEventListener('click', () => {
    if (!notes.length) { showToast('暂无笔记'); return; }
    const text = buildAllNotesText();
    const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    const now = new Date();
    const pad = n => String(n).padStart(2, '0');
    a.download = `笔记备份_${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}.txt`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast('已导出笔记文件');
  });

  $('btnClearChat').addEventListener('click', () => {
    const session = getActiveSession();
    session.messages = [];
    session.title = '新会话';
    session.updatedAt = Date.now();
    chatHistory = session.messages;
    saveChatHistory();
    renderChatSessions();
    renderChatHistory();
    showToast('当前会话已清空');
  });

  aiInput.addEventListener('input', () => autoResize(aiInput));
  aiInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey && !e.ctrlKey && !e.metaKey) {
      e.preventDefault();
      sendAIMessage();
    }
  });

  noteTitle.addEventListener('input', scheduleAutoSave);
  noteContent.addEventListener('input', () => { scheduleAutoSave(); updateCharCount(); });

  // Keyboard shortcuts
  document.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'n') { e.preventDefault(); createNote(); }
    if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); autoSave(); showToast('已保存'); }
    if (e.key === 'Escape') {
      closePanel('new');
      closePanel('todos');
      closePanel('notes');
      closePanel('ai');
      closePanel('settings');
    }
  });

  // ===== Robust Auto-Save =====
  // Save on page unload / refresh / close / visibility change
  window.addEventListener('beforeunload', () => { autoSave(); });
  window.addEventListener('pagehide', () => { autoSave(); });
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'hidden') autoSave();
  });
  window.addEventListener('resize', () => requestAnimationFrame(autoGrowAllTodoText));
  // Periodic save every 10s as safety net
  setInterval(() => { autoSave(); }, 10000);

  // ===== Init =====
  loadNotes();
  loadTodos();
  renderNote();
  renderNotesList();
  renderTodosList();
  requestAnimationFrame(autoGrowAllTodoText);
  loadChatHistory();
  renderChatSessions();
  renderChatHistory();

  // Apply saved font size
  const savedSettings = getSettings();
  if (savedSettings.fontSize) applyFontSize(savedSettings.fontSize);

  if (!notes.length) createNote();
})();
</script>
</body>
</html>
