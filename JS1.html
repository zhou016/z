<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI角色聊天平台</title>
    <style>
        :root {
            --bg: #f5f6fa;
            --sidebar-bg: #ffffff;
            --chat-bg: #ffffff;
            --bubble-user: #d2e3fc;
            --bubble-ai: #f1f3f4;
            --text: #202124;
            --text-secondary: #5f6368;
            --border: #dadce0;
            --accent: #1a73e8;
            --accent-hover: #1765cc;
            --danger: #c5221f;
            --danger-hover: #b41c1b;
            --input-bg: #f1f3f4;
            --font-size: 17px;
            --bubble-font-size: 17px;
            --header-height: 56px;
            --sidebar-width: 280px;
            --transition: 0.2s ease;
            --bubble-padding-v: 8px;
            --bubble-padding-h: 12px;
            --bubble-line-height: 1.45;
        }

        body.dark {
            --bg: #1a1a2e;
            --sidebar-bg: #16162a;
            --chat-bg: #1e1e35;
            --bubble-user: #2b5a8c;
            --bubble-ai: #2a2a45;
            --text: #e0e0e0;
            --text-secondary: #a0a0b8;
            --border: #2a2a40;
            --accent: #4a90d9;
            --accent-hover: #5aa0e9;
            --danger: #c0392b;
            --danger-hover: #e74c3c;
            --input-bg: #252540;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            height: 100dvh;
            display: flex;
            overflow: hidden;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* ========== 侧边栏 ========== */
        .sidebar {
            width: var(--sidebar-width);
            min-width: var(--sidebar-width);
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            height: 100%;
            z-index: 10;
            transition: transform var(--transition);
        }
        .sidebar-header {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }
        .sidebar-header h2 {
            font-size: 17px;
            font-weight: 600;
            letter-spacing: 0.3px;
        }
        .sidebar-header button {
            background: var(--accent);
            border: none;
            color: #fff;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition);
        }
        .sidebar-header button:hover {
            background: var(--accent-hover);
            transform: scale(1.05);
        }
        .sidebar-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
            scroll-behavior: smooth;
        }
        .sidebar-scroll::-webkit-scrollbar {
            width: 4px;
        }
        .sidebar-scroll::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 2px;
        }
        .role-group {
            margin-bottom: 6px;
        }
        .role-group-header {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
            padding: 8px 10px 4px;
            font-weight: 600;
        }
        .role-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 10px;
            cursor: pointer;
            transition: all var(--transition);
            margin-bottom: 2px;
            position: relative;
        }
        .role-item:hover {
            background: var(--input-bg);
        }
        .role-item.active {
            background: var(--bubble-ai);
            border: 1px solid var(--accent);
        }
        .role-avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
            background: var(--input-bg);
        }
        .role-info {
            flex: 1;
            min-width: 0;
        }
        .role-name {
            font-size: 14px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .role-desc {
            font-size: 11px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .role-actions {
            display: flex;
            gap: 4px;
            opacity: 0;
            transition: opacity var(--transition);
        }
        .role-item:hover .role-actions {
            opacity: 1;
        }
        .role-actions button {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 13px;
            padding: 3px 6px;
            border-radius: 4px;
            transition: all var(--transition);
        }
        .role-actions button:hover {
            color: var(--text);
            background: var(--border);
        }
        .session-list {
            margin-left: 12px;
            border-left: 2px solid var(--border);
            padding-left: 8px;
        }
        .session-item {
            font-size: 12px;
            padding: 6px 10px;
            border-radius: 6px;
            cursor: pointer;
            color: var(--text-secondary);
            transition: all var(--transition);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 6px;
        }
        .session-item:hover {
            background: var(--input-bg);
            color: var(--text);
        }
        .session-item.active {
            background: var(--bubble-ai);
            color: var(--text);
            font-weight: 500;
        }
        .session-del {
            opacity: 0;
            cursor: pointer;
            color: #e74c3c;
            font-size: 14px;
            transition: opacity var(--transition);
            padding: 2px 5px;
        }
        .session-item:hover .session-del {
            opacity: 1;
        }

        /* ========== 主聊天区 ========== */
        .main-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            min-width: 0;
            background: var(--chat-bg);
        }
        .chat-header {
            height: var(--header-height);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 16px;
            gap: 12px;
            flex-shrink: 0;
        }
        .chat-header .title {
            font-weight: 600;
            font-size: 15px;
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .chat-header button {
            background: var(--input-bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 7px 13px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            transition: all var(--transition);
            white-space: nowrap;
        }
        .chat-header button:hover {
            background: var(--border);
        }
        .chat-header button.accent {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }
        .chat-header button.accent:hover {
            background: var(--accent-hover);
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 12px 16px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            scroll-behavior: smooth;
        }
        .chat-messages::-webkit-scrollbar {
            width: 5px;
        }
        .chat-messages::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }
        .msg-row {
            display: flex;
            gap: 10px;
            align-items: flex-start;
            animation: fadeInUp 0.25s ease;
            margin-bottom: 6px;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .msg-row.user {
            flex-direction: row-reverse;
        }
        .msg-avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            flex-shrink: 0;
            background: var(--input-bg);
            margin-top: 2px;
        }
        .msg-bubble {
            max-width: 72%;
            padding: var(--bubble-padding-v) var(--bubble-padding-h);
            border-radius: 14px;
            font-size: var(--bubble-font-size);
            line-height: var(--bubble-line-height);
            word-break: break-word;
            position: relative;
            white-space: pre-wrap;
            color: var(--text);
            overflow-wrap: break-word;
        }
        .msg-row.user .msg-bubble {
            background: var(--bubble-user);
            border-bottom-right-radius: 4px;
        }
        .msg-row.ai .msg-bubble {
            background: var(--bubble-ai);
            border-bottom-left-radius: 4px;
        }
        .msg-row.system .msg-bubble {
            background: var(--input-bg);
            border: 1px dashed var(--border);
            font-style: italic;
            color: var(--text-secondary);
            font-size: 12px;
            max-width: 90%;
            text-align: center;
            border-radius: 10px;
        }
        /* 按钮组：放在气泡下方，但不撑开气泡 */
        .msg-bubble .bubble-actions {
            position: absolute;
            bottom: -22px;
            right: 4px;
            display: flex;
            gap: 4px;
            opacity: 0;
            transition: opacity var(--transition);
            z-index: 2;
            white-space: nowrap;
        }
        .msg-row.user .msg-bubble .bubble-actions {
            right: auto;
            left: 4px;
        }
        .msg-bubble:hover .bubble-actions {
            opacity: 1;
        }
        .msg-copy-btn, .msg-backtrack-btn {
            font-size: 10px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 2px 8px;
            border-radius: 4px;
            cursor: pointer;
            transition: all var(--transition);
            line-height: 1.3;
        }
        .msg-copy-btn:hover, .msg-backtrack-btn:hover {
            color: var(--text);
            background: var(--border);
        }
        .msg-backtrack-btn {
            color: #f0a060;
        }
        .msg-backtrack-btn:hover {
            color: #fff;
            background: #5a4030;
        }
        .typing-indicator {
            display: flex;
            gap: 4px;
            align-items: center;
            padding: 4px 0;
            font-size: 13px;
            color: var(--text-secondary);
        }
        .typing-dots {
            display: inline-flex;
            gap: 3px;
        }
        .typing-dots span {
            width: 5px;
            height: 5px;
            background: var(--text-secondary);
            border-radius: 50%;
            animation: blink 1.4s infinite;
        }
        .typing-dots span:nth-child(2) {
            animation-delay: 0.2s;
        }
        .typing-dots span:nth-child(3) {
            animation-delay: 0.4s;
        }
        @keyframes blink {
            0%,
            80%,
            100% {
                opacity: 0.3;
                transform: scale(0.8);
            }
            40% {
                opacity: 1;
                transform: scale(1.2);
            }
        }

        /* 无头像满屏模式 */
        .chat-messages.full-width .msg-bubble {
            max-width: 95%;
            border-radius: 8px;
        }
        .chat-messages.full-width .msg-avatar {
            display: none;
        }
        .chat-messages.full-width .msg-row {
            gap: 0;
        }
        .chat-messages.full-width .msg-row.user .msg-bubble {
            border-bottom-right-radius: 8px;
        }
        .chat-messages.full-width .msg-row.ai .msg-bubble {
            border-bottom-left-radius: 8px;
        }

        /* ========== 输入区 ========== */
        .chat-input-area {
            border-top: 1px solid var(--border);
            padding: 10px 14px;
            display: flex;
            gap: 8px;
            align-items: flex-end;
            flex-shrink: 0;
            background: var(--bg);
        }
        .chat-input-area textarea {
            flex: 1;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 10px 14px;
            color: var(--text);
            font-size: 15px;
            resize: none;
            outline: none;
            font-family: inherit;
            line-height: 1.5;
            min-height: 42px;
            max-height: 130px;
            transition: border-color var(--transition);
            overflow-y: auto;
        }
        .chat-input-area textarea:focus {
            border-color: var(--accent);
        }
        .chat-input-area textarea::-webkit-scrollbar {
            width: 3px;
        }
        .chat-input-area textarea::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 2px;
        }
        .send-btn {
            background: var(--accent);
            border: none;
            color: #fff;
            padding: 10px 18px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all var(--transition);
            white-space: nowrap;
            flex-shrink: 0;
            height: 42px;
        }
        .send-btn:hover {
            background: var(--accent-hover);
        }
        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .stop-btn {
            background: var(--danger);
            border: none;
            color: #fff;
            padding: 10px 16px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all var(--transition);
            white-space: nowrap;
            flex-shrink: 0;
            height: 42px;
            display: none;
        }
        .stop-btn:hover {
            background: var(--danger-hover);
        }

        /* ========== 弹窗 ========== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        .modal {
            background: var(--chat-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px 24px;
            width: 90%;
            max-width: 560px;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            color: var(--text);
        }
        .modal::-webkit-scrollbar {
            width: 4px;
        }
        .modal::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 2px;
        }
        .modal h3 {
            margin-bottom: 14px;
            font-size: 17px;
            letter-spacing: 0.3px;
        }
        .modal label {
            display: block;
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 4px;
            margin-top: 10px;
            letter-spacing: 0.5px;
        }
        .modal input,
        .modal textarea,
        .modal select {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 9px 12px;
            color: var(--text);
            font-size: 13px;
            outline: none;
            font-family: inherit;
            transition: border-color var(--transition);
        }
        .modal input:focus,
        .modal textarea:focus,
        .modal select:focus {
            border-color: var(--accent);
        }
        .modal textarea {
            resize: vertical;
            min-height: 60px;
        }
        .modal .btn-row {
            display: flex;
            gap: 8px;
            margin-top: 16px;
            justify-content: flex-end;
            flex-wrap: wrap;
        }
        .modal .btn-row button {
            padding: 9px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            border: none;
            transition: all var(--transition);
            font-weight: 500;
        }
        .btn-primary {
            background: var(--accent);
            color: #fff;
        }
        .btn-primary:hover {
            background: var(--accent-hover);
        }
        .btn-secondary {
            background: var(--input-bg);
            color: var(--text);
            border: 1px solid var(--border);
        }
        .btn-secondary:hover {
            background: var(--border);
        }
        .btn-danger {
            background: var(--danger);
            color: #fff;
        }
        .btn-danger:hover {
            background: var(--danger-hover);
        }
        .modal .range-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .modal .range-row input[type="range"] {
            flex: 1;
        }
        .modal .range-row span {
            font-size: 13px;
            min-width: 40px;
            text-align: center;
            font-weight: 600;
        }

        /* ========== 群聊标签 ========== */
        .group-badge {
            display: inline-block;
            background: #4a9060;
            color: #fff;
            font-size: 10px;
            padding: 2px 7px;
            border-radius: 10px;
            margin-left: 6px;
            font-weight: 600;
        }
        .group-member-tag {
            display: inline-block;
            background: var(--input-bg);
            color: var(--text);
            font-size: 10px;
            padding: 3px 8px;
            border-radius: 10px;
            margin: 2px;
            cursor: pointer;
            transition: all var(--transition);
        }
        .group-member-tag.muted {
            text-decoration: line-through;
            opacity: 0.5;
        }
        .group-member-tag:hover {
            background: var(--border);
        }

        /* ========== 响应式 ========== */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                bottom: 0;
                transform: translateX(-100%);
                width: 270px;
                min-width: 270px;
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .mobile-menu-btn {
                display: flex !important;
            }
            .msg-bubble {
                max-width: 85% !important;
            }
            .chat-messages.full-width .msg-bubble {
                max-width: 97% !important;
            }
            .modal {
                width: 95%;
                max-width: 95%;
                padding: 14px 16px;
            }
        }
        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            color: var(--text);
            font-size: 22px;
            cursor: pointer;
            padding: 4px 8px;
        }
        @media (min-width: 769px) {
            .mobile-menu-btn {
                display: none !important;
            }
        }

        /* 亲密度指示器 */
        .intimacy-bar {
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            margin-top: 4px;
            overflow: hidden;
            width: 100%;
        }
        .intimacy-fill {
            height: 100%;
            border-radius: 2px;
            transition: width 0.5s ease, background 0.5s ease;
        }
        .intimacy-label {
            font-size: 10px;
            color: var(--text-secondary);
            text-align: right;
        }
    </style>
</head>
<body>

    <!-- ==================== 侧边栏 ==================== -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2>🤖 角色</h2>
            <button title="新建角色" id="btnNewRole">+</button>
        </div>
        <div class="sidebar-scroll" id="sidebarScroll">
            <div class="role-group">
                <div class="role-group-header">📌 预设角色</div>
                <div id="presetRoles"></div>
            </div>
            <div class="role-group">
                <div class="role-group-header">✏️ 自定义角色</div>
                <div id="customRoles"></div>
            </div>
            <div class="role-group">
                <div class="role-group-header">👥 群聊</div>
                <div id="groupChats"></div>
            </div>
        </div>
    </aside>

    <!-- ==================== 主聊天区 ==================== -->
    <div class="main-area" id="mainArea">
        <div class="chat-header">
            <button class="mobile-menu-btn" id="btnToggleSidebar">☰</button>
            <span class="title" id="chatTitle">选择角色开始对话</span>
            <span id="intimacyDisplay" style="font-size:11px;color:#f0a060;display:none;"></span>
            <button id="btnSettings" title="设置">⚙️</button>
            <button id="btnClearChat" title="清空当前会话">🗑️ 清空</button>
            <button id="btnToggleView" title="切换视图模式">🖼️</button>
        </div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-area">
            <textarea id="chatInput" rows="1" placeholder="输入消息…（Enter换行，点击发送）"></textarea>
            <button class="send-btn" id="btnSend">发送</button>
            <button class="stop-btn" id="btnStop">⏹ 停止</button>
        </div>
    </div>

    <!-- ==================== 弹窗容器 ==================== -->
    <div id="modalContainer"></div>
    <div id="toastContainer" style="position:fixed;top:16px;right:16px;z-index:200;display:flex;flex-direction:column;gap:6px;"></div>

    <script>
        (function() {
            // ==================== 数据管理 ====================
            const STORAGE_KEY = 'ai_chat_platform_data_v2';
            const DEFAULT_PRESET_ROLES = [
                { id: 'preset_mentor', name: '职场导师', avatar: '👔', setting: '你是一位经验丰富的职场导师，拥有20年企业管理经验。你善于给予职业规划建议、职场沟通技巧和领导力指导。回答简洁务实，语气温和而坚定。', isPreset: true,
                    intimacy: 50, intimacyEnabled: false },
                { id: 'preset_coder', name: '编程专家', avatar: '💻', setting: '你是一位资深全栈工程师，精通多种编程语言和框架。你擅长用简洁清晰的方式解释技术概念，提供代码优化建议。回答专业但易懂，乐于帮助解决编程难题。',
                    isPreset: true, intimacy: 50, intimacyEnabled: false },

            function loadData() {

                    roles,

                    customRoles: [],

                        activeRoleId: roles[0].id,
                        activeSessionIndex: 0,
                        activeGroupId: null,

            function getAllRoles() {
                return [...state.roles.filter(r => r.isPreset), ...(state.customRoles || []), ...(state.groupChats ||

            function getCurrentRole() {
                if (isGroupMode) {
                    return (state.groupChats || []).find(g => g.id === currentGroupId) || null;
                }
                return getAllRoles().find(r => r.id === currentRoleId) || null;
            }

            function getCurrentSession() {
                if (isGroupMode && currentGroupId) {
                    if (!state.sessions[currentGroupId]) state.sessions[currentGroupId] = [{ id: generateId(),
                        name: '群聊会话', messages: [], createdAt: Date.now() }];
                    if (currentSessionIndex >= state.sessions[currentGroupId].length) currentSessionIndex = 0;
                    return state.sessions[currentGroupId][currentSessionIndex] || state.sessions[currentGroupId][0];
                }
                if (!state.sessions[currentRoleId]) state.sessions[currentRoleId] = [{ id: generateId(), name: '默认会话',
                    messages: [], createdAt: Date.now() }];
                if (currentSessionIndex >= state.sessions[currentRoleId].length) currentSessionIndex = 0;
                return state.sessions[currentRoleId][currentSessionIndex] || state.sessions[currentRoleId][0];
            }

            function getCurrentMessages() {
                const session = getCurrentSession();
                return session ? session.messages : [];
            }

            // ==================== Toast ====================

                setTimeout(() => { el.style.opacity = '0';

            // ==================== 渲染侧边栏 ====================

              </div>
            </div>
            <div class="session-list">

                <div class="session-item ${isActive&&i===activeSessIdx?'active':''}" onclick="event.stopPropagation();window._selectSession('${role.id}',${i})">
                  <span>💬 ${escHtml(s.name||'会话'+(i+1))} (${(s.messages||[]).length}条)</span>

            // ==================== 消息DOM操作（优化：流式更新直接操作DOM） ====================
            const messagesContainer = document.getElementById('chatMessages');

            function createMessageRow(msg, index) {
                const row = document.createElement('div');
                row.className = 'msg-row';
                if (msg.role === 'user') row.classList.add('user');
                else if (msg.role === 'system') row.classList.add('system');
                else row.classList.add('ai');
                row.dataset.msgIndex = index;

                if (msg.role === 'system') {
                    row.innerHTML = `<div class="msg-bubble">${escHtml(msg.content)}</div>`;
                    return row;
                }

                const avatar = document.createElement('div');
                avatar.className = 'msg-avatar';
                avatar.textContent = msg.role === 'user' ? '👤' : (msg.senderAvatar || '🤖');

                const bubble = document.createElement('div');
                bubble.className = 'msg-bubble';
                const senderName = msg.senderName || '';
                bubble.innerHTML = senderName ? `<strong>${escHtml(senderName)}</strong>: ${escHtml(msg.content||'')}` : escHtml(msg.content||'');

                const actions = document.createElement('div');
                actions.className = 'bubble-actions';
                actions.innerHTML = `
              <button class="msg-copy-btn">复制</button>
              <button class="msg-backtrack-btn">回溯</button>`;
                actions.querySelector('.msg-copy-btn').onclick = (e) => { e.stopPropagation();
                    window._copyMsg(index); };
                actions.querySelector('.msg-backtrack-btn').onclick = (e) => { e.stopPropagation();
                    window._backtrack(index); };
                bubble.appendChild(actions);

                row.appendChild(avatar);
                row.appendChild(bubble);
                return row;

            function appendMessageToDOM(msg, index) {
                const row = createMessageRow(msg, index);
                messagesContainer.appendChild(row);
                return row;
            }

            function updateMessageBubble(row, content) {
                const bubble = row.querySelector('.msg-bubble');
                if (!bubble) return;
                // 保留 sender name 的 strong 标签
                const strong = bubble.querySelector('strong');
                if (strong) {
                    bubble.innerHTML = `<strong>${strong.textContent}</strong>: ${escHtml(content||'')}`;
                } else {
                    bubble.innerHTML = escHtml(content||'');
                }
                // 重新添加操作按钮
                const actions = document.createElement('div');
                actions.className = 'bubble-actions';
                const index = parseInt(row.dataset.msgIndex, 10);
                actions.innerHTML = `
              <button class="msg-copy-btn">复制</button>
              <button class="msg-backtrack-btn">回溯</button>`;
                actions.querySelector('.msg-copy-btn').onclick = (e) => { e.stopPropagation();
                    window._copyMsg(index); };
                actions.querySelector('.msg-backtrack-btn').onclick = (e) => { e.stopPropagation();
                    window._backtrack(index); };
                bubble.appendChild(actions);
            }

                currentRoleId = roleId;

            // ==================== API调用 ====================
            function getApiConfig() {
                const platform = state.settings.apiPlatform;
                let base = state.settings.apiBase;
                let key = state.settings.apiKey;
                let model = state.settings.model;
                if (platform === 'deepseek') {

                    base = base || 'https://api.siliconflow.cn/v1';

                }

            }

            function buildSystemPrompt(role) {
                let prompt = role.setting || '';
                if (timeAware) {
                    const now = new Date();
                    const bjTime = now.toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai' });
                    prompt += `\n\n当前北京时间：${bjTime}。请在对话中自然地感知此时间信息。`;
                }
                if (isGroupMode && role.userIdentity) {
                    prompt +=
                        `\n\n参与群聊的用户身份：${role.userIdentity}。请在对话中自然地使用此身份称呼用户。群聊背景主题：${role.topic||'自由交流'}。`;
                }
                if (role.intimacyEnabled && !isGroupMode) {
                    const intimacy = role.intimacy || 50;
                    let toneMod = '';
                    if (intimacy < 25) toneMod = '语气冷淡疏远，保持距离感';
                    else if (intimacy < 50) toneMod = '语气礼貌但不太热情';
                    else if (intimacy < 75) toneMod = '语气友好温暖，乐于交流';
                    else toneMod = '语气亲密热情，像老朋友一样';
                    prompt += `\n\n当前亲密度：${intimacy}/100。${toneMod}。`;
                }
                return prompt;
            }

            function getContextMessages() {
                const messages = getCurrentMessages();
                const limited = messages.slice(-contextMessages);
                return limited.map(m => {
                    if (m.role === 'user') return { role: 'user', content: m.content };
                    if (m.role === 'assistant' || m.role === 'ai') return { role: 'assistant', content: m
                        .content };
                    return null;
                }).filter(Boolean);
            }

            async function callAI(messages, onChunk, onDone, onError) {
                const { base, key, model } = getApiConfig();
                if (!base) { onError('请先配置API地址'); return; }
                if (!key) { onError('请先配置API Key'); return; }
                if (!model) { onError('请先配置模型名称'); return; }

                const url = base.replace(/\/$/, '') + '/chat/completions';
                abortController = new AbortController();

                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${key}`,
                        },
                        body: JSON.stringify({
                            model: model,
                            messages: messages,
                            stream: true,
                            max_tokens: Math.min(contextTokens, 60000),
                        }),
                        signal: abortController.signal,
                    });

                    if (!response.ok) {
                        const errText = await response.text();
                        throw new Error(`API错误 ${response.status}: ${errText.substring(0,200)}`);
                    }

                    const reader = response.body.getReader();
                    const decoder = new TextDecoder();
                    let buffer = '';
                    let fullContent = '';

                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;
                        buffer += decoder.decode(value, { stream: true });
                        const lines = buffer.split('\n');
                        buffer = lines.pop() || '';
                        for (const line of lines) {
                            const trimmed = line.trim();
                            if (!trimmed || !trimmed.startsWith('data: ')) continue;
                            const dataStr = trimmed.slice(6);
                            if (dataStr === '[DONE]') {
                                onDone(fullContent);
                                return;
                            }
                            try {
                                const parsed = JSON.parse(dataStr);
                                const delta = parsed.choices?.[0]?.delta?.content;
                                if (delta) {
                                    fullContent += delta;
                                    onChunk(delta, fullContent);
                                }
                            } catch (e) {}
                        }
                    }
                    onDone(fullContent);
                } catch (e) {
                    if (e.name === 'AbortError') {
                        onDone(null, true);
                    } else {
                        onError(e.message);
                    }
                }
            }

            function stopGeneration() {
                if (abortController) {
                    abortController.abort();
                    abortController = null;
                }
                isGenerating = false;
                updateSendStopButtons();
            }

            function updateSendStopButtons() {
                const sendBtn = document.getElementById('btnSend');
                const stopBtn = document.getElementById('btnStop');
                if (isGenerating) {
                    sendBtn.style.display = 'none';
                    stopBtn.style.display = 'inline-block';
                } else {
                    sendBtn.style.display = 'inline-block';
                    stopBtn.style.display = 'none';
                }
            }

            // ==================== 发送消息（优化流式更新） ====================
            async function sendMessage() {
                if (isGenerating) return;
                const input = document.getElementById('chatInput');
                const content = input.value.trim();
                if (!content) return;

                const role = getCurrentRole();
                if (!role) { showToast('请先选择角色'); return; }

                const session = getCurrentSession();
                if (!session) return;

                // 添加用户消息
                const userMsg = { role: 'user', content, timestamp: Date.now() };
                session.messages.push(userMsg);
                appendMessageToDOM(userMsg, session.messages.length - 1);
                input.value = '';
                input.style.height = '42px';
                scrollToBottom();

                isGenerating = true;
                updateSendStopButtons();

                // 构建请求消息
                const systemPrompt = buildSystemPrompt(role);
                const contextMsgs = getContextMessages();
                const apiMessages = [
                    { role: 'system', content: systemPrompt },
                    ...contextMsgs,
                ];

                // 显示打字指示器
                const typingRow = document.createElement('div');
                typingRow.className = 'msg-row ai';
                typingRow.innerHTML =
                    `<div class="msg-avatar">${role.avatar||'🤖'}</div><div class="msg-bubble"><span class="typing-indicator">正在输入<span class="typing-dots"><span></span><span></span><span></span></span></span></div>`;
                messagesContainer.appendChild(typingRow);
                scrollToBottom();

                // 创建AI消息占位
                const aiMsg = { role: 'assistant', content: '', timestamp: Date.now(), senderName: role.name, senderAvatar: role
                        .avatar || '🤖' };
                session.messages.push(aiMsg);
                const aiMsgIndex = session.messages.length - 1;

                // 创建实际的AI消息DOM节点（替换打字指示器）
                const aiRow = createMessageRow(aiMsg, aiMsgIndex);
                // 暂时隐藏，等有内容再替换
                aiRow.style.display = 'none';
                messagesContainer.appendChild(aiRow);

                callAI(apiMessages,
                    (delta, fullContent) => {
                        // 首次收到内容时移除打字指示器，显示AI气泡
                        if (typingRow.parentNode) {
                            typingRow.remove();
                            aiRow.style.display = '';
                        }
                        session.messages[aiMsgIndex].content = fullContent;
                        updateMessageBubble(aiRow, fullContent);
                        scrollToBottom();
                    },
                    (fullContent, wasAborted) => {
                        if (typingRow.parentNode) typingRow.remove();
                        aiRow.style.display = '';
                        if (wasAborted && !session.messages[aiMsgIndex].content) {
                            session.messages[aiMsgIndex].content = '（已停止生成）';
                        }
                        if (!session.messages[aiMsgIndex].content && !wasAborted) {
                            session.messages[aiMsgIndex].content = '（无响应）';
                        }
                        updateMessageBubble(aiRow, session.messages[aiMsgIndex].content);
                        isGenerating = false;
                        updateSendStopButtons();
                        updateIntimacy();
                        saveData();
                        scrollToBottom();
                    },
                    (error) => {
                        if (typingRow.parentNode) typingRow.remove();
                        aiRow.style.display = '';
                        session.messages[aiMsgIndex].content = '❌ 错误：' + error;
                        updateMessageBubble(aiRow, session.messages[aiMsgIndex].content);
                        isGenerating = false;
                        updateSendStopButtons();
                        saveData();
                        scrollToBottom();
                    }
                );
            }

            function updateIntimacy() {
                const role = getCurrentRole();
                if (!role || role.isGroup || !role.intimacyEnabled) return;
                const msgs = getCurrentMessages();
                const lastUserMsg = [...msgs].reverse().find(m => m.role === 'user');
                if (!lastUserMsg) return;
                const content = lastUserMsg.content.toLowerCase();
                const positiveWords = ['谢谢', '感谢', '太棒了', '好厉害', '喜欢你', '厉害', '赞', '优秀', '佩服', '爱', '开心', '哈哈',
                    '😊', '👍', '真棒', '感激', 'nice', 'great', 'awesome'
                ];
                const negativeWords = ['滚', '烦', '讨厌', '差劲', '没用', '傻', '笨', '垃圾', '恶心', '无聊', '失望', '😡', '👎',
                    'fuck', 'shit', 'stupid'
                ];
                let hasPositive = positiveWords.some(w => content.includes(w));
                let hasNegative = negativeWords.some(w => content.includes(w));
                let change = 0;
                if (hasNegative) { change = -(1 + Math.floor(Math.random() * 2)); } else if (hasPositive && Math.random() <
                    0.3) { change = 1 + Math.floor(Math.random() * 2); } else if (Math.random() < 0.08) { change = Math
                        .random() < 0.5 ? -1 : 1; }
                if (change !== 0) {
                    role.intimacy = Math.max(1, Math.min(100, (role.intimacy || 50) + change));
                    renderMessages();
                }
            }

            // ==================== 群聊发送（同样优化） ====================
            async function sendGroupMessage() {
                if (isGenerating) return;
                const input = document.getElementById('chatInput');
                const content = input.value.trim();
                if (!content) return;

                const group = getCurrentRole();
                if (!group || !group.isGroup) return;
                const session = getCurrentSession();
                if (!session) return;

                const userIdentity = group.userIdentity || '用户';
                const userMsg = { role: 'user', content, timestamp: Date.now(), senderName: userIdentity };
                session.messages.push(userMsg);
                appendMessageToDOM(userMsg, session.messages.length - 1);
                input.value = '';
                input.style.height = '42px';
                scrollToBottom();
                isGenerating = true;
                updateSendStopButtons();

                const activeMembers = group.members.filter(m => !m.muted).sort((a, b) => (a.order || 0) - (b.order || 0));
                if (activeMembers.length === 0) { showToast('没有可发言的成员');
                    isGenerating = false;
                    updateSendStopButtons(); return; }

                for (const member of activeMembers) {
                    if (!isGenerating) break;
                    const systemPrompt = member.setting + `\n\n你正在群聊"${group.name}"中发言。群聊主题：${group.topic||'自由交流'}。发言用户身份：${userIdentity}。请根据上下文自然发言，简短有力。`;
                    const contextMsgs = getContextMessages();
                    const apiMessages = [
                        { role: 'system', content: systemPrompt },
                        ...contextMsgs,
                    ];

                    const typingRow = document.createElement('div');
                    typingRow.className = 'msg-row ai';
                    typingRow.innerHTML =
                        `<div class="msg-avatar">${member.avatar||'🤖'}</div><div class="msg-bubble"><span class="typing-indicator">${escHtml(member.name)}正在输入<span class="typing-dots"><span></span><span></span><span></span></span></span></div>`;
                    messagesContainer.appendChild(typingRow);
                    scrollToBottom();

                    const aiMsg = { role: 'assistant', content: '', timestamp: Date.now(), senderName: member.name,
                        senderAvatar: member.avatar || '🤖' };
                    session.messages.push(aiMsg);
                    const aiMsgIndex = session.messages.length - 1;

                    const aiRow = createMessageRow(aiMsg, aiMsgIndex);
                    aiRow.style.display = 'none';
                    messagesContainer.appendChild(aiRow);

                    await new Promise((resolve) => {
                        callAI(apiMessages,
                            (delta, fullContent) => {
                                if (typingRow.parentNode) {
                                    typingRow.remove();
                                    aiRow.style.display = '';
                                }
                                session.messages[aiMsgIndex].content = fullContent;
                                updateMessageBubble(aiRow, fullContent);
                                scrollToBottom();
                            },
                            (fullContent, wasAborted) => {
                                if (typingRow.parentNode) typingRow.remove();
                                aiRow.style.display = '';
                                if (!session.messages[aiMsgIndex].content && !wasAborted)
                                    session.messages[aiMsgIndex].content = '（沉默）';
                                if (wasAborted && !session.messages[aiMsgIndex].content)
                                    session.messages[aiMsgIndex].content = '（已停止）';
                                updateMessageBubble(aiRow, session.messages[aiMsgIndex].content);
                                saveData();
                                scrollToBottom();
                                resolve();
                            },
                            (error) => {
                                if (typingRow.parentNode) typingRow.remove();
                                aiRow.style.display = '';
                                session.messages[aiMsgIndex].content = '❌ ' + error;
                                updateMessageBubble(aiRow, session.messages[aiMsgIndex].content);
                                saveData();
                                scrollToBottom();
                                resolve();
                            }
                        );
                    });
                    if (!isGenerating) break;
                    await new Promise(r => setTimeout(r, 600));
                }
                isGenerating = false;
                updateSendStopButtons();
                saveData();
            }

            // ==================== 事件绑定 ====================
            document.getElementById('btnSend').addEventListener('click', () => {
                if (isGroupMode) sendGroupMessage();
                else sendMessage();
            });

            document.getElementById('btnStop').addEventListener('click', stopGeneration);

            const chatInput = document.getElementById('chatInput');
            chatInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    const val = this.value;
                    const cursorPos = this.selectionStart;
                    this.value = val.substring(0, cursorPos) + '\n' + val.substring(cursorPos);
                    this.selectionStart = this.selectionEnd = cursorPos + 1;
                    autoResizeTextarea();
                }
            });

            chatInput.addEventListener('input', autoResizeTextarea);

            function autoResizeTextarea() {
                const ta = chatInput;
                ta.style.height = '42px';
                const scrollH = ta.scrollHeight;
                const maxH = 130;
                if (scrollH > maxH) {
                    ta.style.height = maxH + 'px';
                    ta.style.overflowY = 'auto';
                } else if (scrollH > 42) {
                    ta.style.height = scrollH + 'px';
                    ta.style.overflowY = 'hidden';
                } else {
                    ta.style.height = '42px';
                    ta.style.overflowY = 'hidden';
                }
            }

            chatInput.addEventListener('focus', function() {
                const msgs = getCurrentMessages();
                if (msgs.length > 0 && !this.value) {
                    const lastMsg = msgs[msgs.length - 1];
                    if (lastMsg.role === 'assistant' || lastMsg.role === 'ai') {
                        this.placeholder = '上次回复: ' + lastMsg.content.substring(0, 60) + '…';
                    }
                }
            });
            chatInput.addEventListener('blur', function() {
                this.placeholder = '输入消息…（Enter换行，点击发送）';
            });

            document.getElementById('btnNewRole').addEventListener('click', () => showRoleModal(null));
            document.getElementById('btnSettings').addEventListener('click', showSettingsModal);
            document.getElementById('btnClearChat').addEventListener('click', () => {
                if (!confirm('确定清空当前会话的所有聊天记录和记忆吗？角色和模型设置不受影响。')) return;
                const session = getCurrentSession();
                if (session) session.messages = [];
                refreshAll();
                showToast('✅ 已清空');
            });
            document.getElementById('btnToggleView').addEventListener('click', () => {
                viewMode = viewMode === 'fullwidth' ? 'default' : 'fullwidth';
                state.settings.viewMode = viewMode;
                updateChatTitle();
                renderMessages();
                saveData();
                showToast(viewMode === 'fullwidth' ? '已切换为满屏气泡模式' : '已切换为默认模式');
            });
            document.getElementById('btnToggleSidebar').addEventListener('click', () => {
                document.getElementById('sidebar').classList.toggle('open');
            });

            // 点击聊天区关闭侧边栏（移动端）
            document.getElementById('mainArea').addEventListener('click', function(e) {
                if (window.innerWidth <= 768 && !e.target.closest('.mobile-menu-btn')) {
                    document.getElementById('sidebar').classList.remove('open');
                }
            });

            // ==================== 初始化 ====================
            function init() {
                fontSize = state.settings.fontSize || 17;
                viewMode = state.settings.viewMode || 'default';
                contextMessages = state.settings.contextMessages || 50;
                contextTokens = state.settings.contextTokens || 60000;
                timeAware = state.settings.timeAware !== false;
                currentTheme = state.settings.theme || 'light';
                currentRoleId = state.settings.activeRoleId || DEFAULT_PRESET_ROLES[0].id;
                currentSessionIndex = state.settings.activeSessionIndex || 0;
                currentGroupId = state.settings.activeGroupId || null;
                isGroupMode = !!currentGroupId;

                if (!state.customRoles) state.customRoles = [];
                if (!state.groupChats) state.groupChats = [];
                if (!state.settings.customPlatforms) state.settings.customPlatforms = [];

                applyTheme(currentTheme);

                document.documentElement.style.setProperty('--bubble-font-size', fontSize + 'px');
                updateSendStopButtons();
                refreshAll();
                updateChatTitle();
                saveData();
            }

            // 暴露全局
            window._createGroupChat = window._createGroupChat;
            window._editGroup = window._editGroup;
            window._deleteGroup = window._deleteGroup;
            window._addCustomPlatform = window._addCustomPlatform;

            init();
            console.log('✅ AI角色聊天平台已就绪（界面优化，流式无闪动）');
        })();
    </script>
</body>
</html>
