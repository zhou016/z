  <main class="app">
    <header class="hero">

        <button class="btn secondary" id="manageBtn" type="button">查看/编辑</button>
        <button class="btn secondary" id="importBtn" type="button">导入TXT</button>
      </div>
    </header>

    <section class="card" id="inputCard" aria-labelledby="saveTitle">

        <h2 id="saveTitle">内容输入与保存区</h2>
        <button class="icon-btn" id="fullscreenBtn" type="button" title="全屏输入" aria-label="全屏输入">⛶</button>
      </div>
      <textarea class="field" id="noteInput" placeholder="例如：明天下午提醒我给客户发方案；今天会议决定下周三前完成报价；想到一个新产品名字……"></textarea>
      <div class="row">
        <button class="btn" id="saveBtn" type="button">发送</button>
        <span class="status" id="saveStatus" aria-live="polite"></span>
      </div>
    </section>

    <section class="card" aria-labelledby="searchTitle">
      <div class="card-head">
        <h2 id="searchTitle">提问查找区</h2>
      </div>
      <div class="row nowrap">
        <textarea class="field" id="searchInput" rows="1" enterkeyhint="enter" placeholder=""></textarea>
        <button class="btn success" id="searchBtn" type="button">查找答案</button>
      </div>
      <div class="result-list" id="results" aria-live="polite"></div>
    </section>

    <div class="footer-count">
      <span id="countText">当前共保存了 0 条笔记</span>
    </div>
  </main>

  <input id="importFile" type="file" accept=".txt,text/plain" style="display:none" />

  <div class="overlay" id="settingsOverlay" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
    <div class="modal">
      <div class="modal-head">
        <div>
          <h3 id="settingsTitle">AI配置</h3>
          <div class="hint">配置会按平台分别保存。API Key 仅保存在本浏览器 localStorage 中。</div>
        </div>
        <button class="icon-btn" id="closeSettingsBtn" type="button" aria-label="关闭">×</button>
      </div>
      <div class="modal-body">
        <div class="settings-grid">
          <label for="platformSelect">当前平台</label>
          <select class="field" id="platformSelect">
            <option value="deepseek">DeepSeek</option>
            <option value="siliconflow">硅基流动</option>
            <option value="custom">自定义API地址</option>
          </select>

          <label for="apiUrl">API地址</label>
          <input class="field" id="apiUrl" type="text" placeholder="https://api.deepseek.com/v1/chat/completions" />

          <label for="modelName">子模型名称</label>
          <input class="field" id="modelName" type="text" placeholder="deepseek-chat / Qwen/Qwen2.5-7B-Instruct / 自定义模型名" />

          <label for="apiKey">API Key</label>
          <input class="field" id="apiKey" type="password" placeholder="sk-..." autocomplete="off" />

          <label for="aiEnabled">启用AI调用</label>
          <select class="field" id="aiEnabled">
            <option value="true">启用，失败时自动本地兜底</option>
            <option value="false">关闭，仅使用本地规则</option>
          </select>
        </div>
        <p class="hint">提示：DeepSeek 和硅基流动通常兼容 OpenAI Chat Completions 格式。若浏览器因跨域策略无法调用，会自动切换为本地整理/查找。</p>
      </div>
      <div class="modal-foot">
        <button class="btn secondary" id="testAiBtn" type="button">测试AI</button>
        <button class="btn" id="saveSettingsBtn" type="button">保存配置</button>
      </div>
    </div>
  </div>

  <div class="overlay" id="manageOverlay" role="dialog" aria-modal="true" aria-labelledby="manageTitle">
    <div class="modal">
      <div class="modal-head">
        <div>
          <div class="manage-title-row">
            <h3 id="manageTitle">查看/编辑所有事项</h3>
            <button class="icon-btn" id="closeManageBtn" type="button" aria-label="关闭">×</button>
            <button class="icon-btn" id="aiOrganizeBtn" type="button" title="AI整理" aria-label="AI整理">🧠</button>
          </div>
          <div class="hint" id="manageSummary">共 0 条笔记</div>
        </div>
      </div>
      <div class="modal-body">
        <div class="note-list" id="noteList"></div>

      <div class="modal-foot">

  </div>

      <input class="field" id="authPassword" type="password" inputmode="numeric" autocomplete="off" placeholder="新设备首次打开需要密码" />

        <button class="btn" id="authSubmit" type="button">进入</button>
      </div>
      <div class="auth-error" id="authError" aria-live="polite"></div>
    </div>
  </div>

  <div class="toast" id="toast" aria-live="polite"></div>

      var EMERGENCY_INPUT_KEY = "ai_secretary_emergency_input_v1";
      var EMERGENCY_RESTORE_KEY = "ai_secretary_emergency_restore_v1";
      var AUTH_KEY = "ai_secretary_device_authorized_v1";
      var AUTH_PASSWORD = "456258";

      var defaultConfigs = {
        deepseek: {
          apiUrl: "https://api.deepseek.com/v1/chat/completions",
          modelName: "deepseek-chat",
          apiKey: "",
          enabled: true
        },

      function normalizeText(text) {
        return String(text || "")
          .toLowerCase()
          .replace(/[^\u4e00-\u9fa5a-z0-9]+/g, " ")
          .replace(/\s+/g, " ")
          .trim();
      }

      function splitKeywords(text) {
        var stopWords = ["一个", "一下", "这个", "那个", "什么", "怎么", "如何", "请问", "相关", "事项", "内容", "笔记", "今天", "明天", "需要", "我要", "我们", "你能"];
        var normalized = normalizeText(text);
        var latin = normalized.match(/[a-z0-9]{2,}/g) || [];
        var chinese = normalized.replace(/[a-z0-9\s]/g, "");
        var words = [];

        for (var i = 0; i < chinese.length - 1; i += 1) {
          words.push(chinese.slice(i, i + 2));
        }
        for (var j = 0; j < chinese.length - 2; j += 1) {
          words.push(chinese.slice(j, j + 3));
        }
        words = words.concat(latin);

        var seen = {};
        return words.filter(function (word) {
          if (!word || stopWords.indexOf(word) >= 0 || seen[word]) return false;
          seen[word] = true;
          return true;
        }).slice(0, 28);
      }

      function detectCategory(text) {
        var value = String(text || "");
        var groups = [
          { name: "客户/销售", keys: ["客户", "报价", "合同", "销售", "方案", "需求", "跟进"] },
          { name: "会议", keys: ["会议", "纪要", "讨论", "决定", "同步", "复盘"] },
          { name: "待办", keys: ["提醒", "待办", "完成", "处理", "安排", "提交", "发送", "检查"] },
          { name: "财务", keys: ["发票", "付款", "报销", "预算", "费用", "账单", "金额"] },
          { name: "灵感", keys: ["想法", "灵感", "创意", "产品", "名字", "点子"] },
          { name: "个人", keys: ["健身", "家", "朋友", "旅行", "生活", "学习"] }
        ];
        for (var i = 0; i < groups.length; i += 1) {
          for (var j = 0; j < groups[i].keys.length; j += 1) {
            if (value.indexOf(groups[i].keys[j]) >= 0) return groups[i].name;
          }
        }
        return "其他";
      }

      function localOrganize(raw, time) {
        var compact = String(raw || "")
          .split(/\n+/)
          .map(function (line) { return line.trim(); })
          .filter(Boolean)
          .join("；")
          .replace(/\s+/g, " ")
          .trim();

        var sentences = compact.split(/[。！？!?；;]/).map(function (item) {
          return item.trim();
        }).filter(Boolean);

        var trimmed = sentences.slice(0, 6).join("；");
        if (!trimmed) trimmed = compact;
        if (trimmed.length > 420) trimmed = trimmed.slice(0, 420) + "…";

        var category = detectCategory(compact);
        var tags = splitKeywords(compact).slice(0, 5);
        return {
          content: "【" + time + "】" + trimmed,
          category: category,
          tags: tags
        };
      }

      async function callAi(messages, temperature) {
        var current = currentConfig();
        var cfg = current.config;
        if (!cfg.enabled || !cfg.apiUrl || !cfg.modelName || !cfg.apiKey) {
          throw new Error("AI配置不完整");
        }

        var response = await fetch(cfg.apiUrl, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + cfg.apiKey
          },
          body: JSON.stringify({
            model: cfg.modelName,
            messages: messages,
            temperature: typeof temperature === "number" ? temperature : 0.2
          })
        });

        if (!response.ok) {
          var detail = await response.text().catch(function () { return ""; });
          throw new Error("AI请求失败：" + response.status + " " + detail.slice(0, 120));
        }
        var data = await response.json();
        var text = data && data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content;
        if (!text) throw new Error("AI返回为空");
        return text;
      }

      function parseAiJson(text) {
        var cleaned = String(text || "").trim();
        cleaned = cleaned.replace(/^```json\s*/i, "").replace(/^```\s*/i, "").replace(/```$/i, "").trim();
        var start = cleaned.indexOf("{");
        var end = cleaned.lastIndexOf("}");
        if (start >= 0 && end > start) cleaned = cleaned.slice(start, end + 1);
        return JSON.parse(cleaned);
      }

      async function aiOrganize(raw, time) {
        var prompt = [
          "你是用户的AI秘书。请把用户输入整理为一条可保存的笔记。",
          "要求：保留原意，润色，简写，去掉废话；如有多个事项，用分号或短句合并；不要编造。",
          "必须返回严格JSON，不要Markdown：",
          "{\"content\":\"【" + time + "】整理后的内容\",\"category\":\"事项分类\",\"tags\":[\"关键词1\",\"关键词2\"]}",
          "用户输入：",
          raw
        ].join("\n");
        var text = await callAi([
          { role: "system", content: "你只返回可解析的JSON。" },
          { role: "user", content: prompt }
        ], 0.2);
        var data = parseAiJson(text);
        if (!data.content) throw new Error("AI整理结果缺少content");
        if (data.content.indexOf("【") !== 0) {
          data.content = "【" + time + "】" + data.content;
        }
        return {
          content: String(data.content).trim(),
          category: String(data.category || detectCategory(raw)).trim(),
          tags: Array.isArray(data.tags) ? data.tags.slice(0, 8).map(String) : splitKeywords(raw).slice(0, 5)
        };
      }

      function keywordScore(query, note) {
        var queryWords = splitKeywords(query);
        var target = normalizeText([note.content, note.raw, note.category, (note.tags || []).join(" ")].join(" "));
        var score = 0;
        queryWords.forEach(function (word) {
          if (target.indexOf(word) >= 0) score += word.length >= 3 ? 3 : 2;
        });
        var normalizedQuery = normalizeText(query);
        if (normalizedQuery && target.indexOf(normalizedQuery) >= 0) score += 10;
        return score;
      }

      function similarity(note, organized, raw) {
        var a = splitKeywords([organized.content, raw, organized.category, (organized.tags || []).join(" ")].join(" "));
        var b = splitKeywords([note.content, note.raw, note.category, (note.tags || []).join(" ")].join(" "));
        if (!a.length || !b.length) return 0;
        var setB = {};
        b.forEach(function (word) { setB[word] = true; });
        var common = a.filter(function (word) { return setB[word]; }).length;
        var categoryBonus = note.category && organized.category && note.category === organized.category ? 0.18 : 0;
        return common / Math.max(a.length, b.length) + categoryBonus;
      }

      async function mergeContent(existing, organized, time) {
        var current = currentConfig().config;
        if (current.enabled && current.apiUrl && current.modelName && current.apiKey) {
          try {
            var text = await callAi([
              { role: "system", content: "你是AI秘书。你只返回合并后的笔记正文，不要JSON，不要解释。" },
              {
                role: "user",
                content: [
                  "请把同类事项合并为一条简洁笔记，保留关键细节，删除重复信息。",
                  "合并后的内容必须以【" + time + "】开头。",
                  "已有笔记：\n" + existing.content,
                  "新增笔记：\n" + organized.content
                ].join("\n")
              }
            ], 0.2);
            var merged = text.trim();
            if (merged) {
              return merged.indexOf("【") === 0 ? merged : "【" + time + "】" + merged;
            }
          } catch (error) {
            console.warn(error);
          }
        }
        var oldBody = existing.content.replace(/^【[^】]+】\s*/, "");
        var newBody = organized.content.replace(/^【[^】]+】\s*/, "");
        return "【" + time + "】" + oldBody + "；" + newBody;
      }

      async function saveNote() {
        var raw = els.noteInput.value.trim();
        if (!raw) {
          showToast("请输入要保存的内容");
          els.noteInput.focus();
          return;
        }

        var time = nowBeijing();
        addRawMemory(raw, time);
        els.saveBtn.disabled = true;
        els.saveBtn.innerHTML = '<span class="loading-dot">整理中</span>';

        var organized;
        var usedFallback = false;
        try {
          organized = await aiOrganize(raw, time);
        } catch (error) {
          console.warn(error);
          organized = localOrganize(raw, time);
          usedFallback = true;
        }

        var notes = getNotes();
        var bestIndex = -1;
        var bestScore = 0;
        notes.forEach(function (note, index) {
          var score = similarity(note, organized, raw);
          if (score > bestScore) {
            bestScore = score;
            bestIndex = index;
          }
        });

        if (bestIndex >= 0 && bestScore >= 0.42) {
          notes[bestIndex].content = await mergeContent(notes[bestIndex], organized, time);
          notes[bestIndex].raw = [notes[bestIndex].raw, raw].filter(Boolean).join("\n");
          notes[bestIndex].time = time;
          notes[bestIndex].updatedAt = new Date().toISOString();
          notes[bestIndex].category = organized.category || notes[bestIndex].category;
          notes[bestIndex].tags = Array.from(new Set((notes[bestIndex].tags || []).concat(organized.tags || []))).slice(0, 10);
        } else {
          notes.unshift({
            id: uid(),
            time: time,
            content: organized.content,
            raw: raw,
            category: organized.category,
            tags: organized.tags || [],
            createdAt: new Date().toISOString(),
            updatedAt: new Date().toISOString()
          });
        }

        setNotes(notes);
        els.noteInput.value = "";
        renderManageList();
        flashSaved("✅ 保存成功！");
        if (usedFallback) {
          showToast("已保存。AI未调用成功，已使用本地规则整理。");
        }
        els.saveBtn.disabled = false;
        els.saveBtn.textContent = "发送";
      }

      async function aiSearch(query, notes) {
        var currentTime = nowBeijing();
        var rawMemories = getRawMemories();
        var sample = notes.map(function (note, index) {
          return {
            index: index,
            time: note.time,
            category: note.category,
            tags: note.tags || [],
            content: note.content
          };
        });
        var text = await callAi([
          { role: "system", content: "你是AI秘书。请基于用户所有笔记、用户保存时的原话记忆和当前时间进行智能问答，并找出最相关的记录。原话记忆是隐藏长期记忆，不要展示为事项列表。只能依据这些内容回答，不要编造。查找区对话内容只用于本次问答，不保存为事项。必须返回严格JSON对象：{\"answer\":\"回答内容\",\"indexes\":[0,2,5]}，indexes最多20条。" },
          { role: "user", content: "当前北京时间：" + currentTime + "\n\n用户问题：\n" + query + "\n\n事项展示用笔记JSON：\n" + JSON.stringify(sample) + "\n\n隐藏原话记忆JSON：\n" + JSON.stringify(rawMemories) }
        ], 0);
        var cleaned = String(text).trim().replace(/^```json\s*/i, "").replace(/^```\s*/i, "").replace(/```$/i, "").trim();
        var objStart = cleaned.indexOf("{");
        var objEnd = cleaned.lastIndexOf("}");
        if (objStart >= 0 && objEnd > objStart) cleaned = cleaned.slice(objStart, objEnd + 1);
        var data = JSON.parse(cleaned);
        if (Array.isArray(data)) {
          return { answer: "", matches: data.map(function (i) { return notes[Number(i)]; }).filter(Boolean) };
        }
        var indexes = Array.isArray(data.indexes) ? data.indexes : [];
        return {
          answer: String(data.answer || "").trim(),
          matches: indexes.map(function (i) { return notes[Number(i)]; }).filter(Boolean)
        };
      }

      async function searchNotes() {
        var query = els.searchInput.value.trim();
        if (!query) {
          showToast("请输入问题或关键词");
          els.searchInput.focus();
          return;
        }

        var notes = getNotes();
        if (!notes.length) {
          renderResults([], "");
          return;
        }

        els.searchBtn.disabled = true;
        els.searchBtn.innerHTML = '<span class="loading-dot">查找中</span>';

        var matches = [];
        var answer = "";
        try {
          var aiResult = await aiSearch(query, notes);
          matches = aiResult.matches;
          answer = aiResult.answer;
        } catch (error) {
          console.warn(error);
          matches = notes
            .map(function (note) {
              return { note: note, score: keywordScore(query, note) };
            })
            .filter(function (item) { return item.score > 0; })
            .sort(function (a, b) { return b.score - a.score; })
            .map(function (item) { return item.note; });
        }

        renderResults(matches, answer);
        els.searchBtn.disabled = false;
        els.searchBtn.textContent = "查找答案";
      }

      function truncate(text, length) {
        var value = String(text || "");
        return value.length > length ? value.slice(0, length) + "..." : value;
      }

      function escapeHtml(text) {
        return String(text || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function stripMarkdown(text) {
        return String(text || "")
          .replace(/```[\s\S]*?```/g, function (block) { return block.replace(/```/g, ""); })
          .replace(/`([^`]+)`/g, "$1")
          .replace(/!\[([^\]]*)\]\([^)]+\)/g, "$1")
          .replace(/\[([^\]]+)\]\([^)]+\)/g, "$1")
          .replace(/^\s{0,3}#{1,6}\s*/gm, "")
          .replace(/^\s{0,3}>\s?/gm, "")
          .replace(/^\s*[-*+]\s+/gm, "")
          .replace(/^\s*\|?[\s:|-]+\|?\s*$/gm, "")
          .replace(/(\*\*|__)(.*?)\1/g, "$2")
          .replace(/(\*|_)(.*?)\1/g, "$2")
          .replace(/~~(.*?)~~/g, "$1")
          .replace(/^\s*[-*_]{3,}\s*$/gm, "")
          .replace(/[|>#*_`~]/g, "")
          .replace(/\n{3,}/g, "\n\n")
          .trim();
      }

      function renderResults(matches, answer) {
        if (!matches.length && !answer) {
          els.results.innerHTML = '<div class="empty">未找到相关笔记</div>';
          return;
        }

        var answerHtml = answer ? [
          '<article class="answer-card">',
          '<h3>AI回答</h3>',
          '<p>' + escapeHtml(answer) + '</p>',
          '</article>'
        ].join("") : "";

        var listHtml = matches.map(function (note, index) {
          var tags = (note.tags || []).slice(0, 3).map(function (tag) {
            return '<span class="tag">' + escapeHtml(tag) + '</span>';
          }).join("");
          return [
            '<article class="result-item">',
            '<div class="result-top">',
            '<div><span class="result-index">' + (index + 1) + '</span>' + escapeHtml(note.time || "") + tags + '</div>',
            '<button class="btn secondary view-result edit-result" data-id="' + escapeHtml(note.id) + '" type="button" title="查看" aria-label="查看">👁</button>',
            '</div>',
            '<p class="result-content">' + escapeHtml(truncate(note.content || "", 100)) + '</p>',
            '</article>'
          ].join("");
        }).join("");

        els.results.innerHTML = answerHtml + listHtml;
      }

      function renderManageList() {
        var notes = getNotes();
        els.manageSummary.textContent = "共 " + notes.length + " 条笔记";
        if (!notes.length) {
          els.noteList.innerHTML = '<div class="empty">暂无笔记</div>';
          return;
        }
        els.noteList.innerHTML = notes.map(function (note, index) {
          var tags = (note.tags || []).slice(0, 5).map(function (tag) {
            return '<span class="tag">' + escapeHtml(tag) + '</span>';
          }).join("");
          return [
            '<article class="note-item">',
            '<div class="note-top">',
            '<div class="note-meta"><strong>#' + (index + 1) + '</strong>　' + escapeHtml(note.time || "") + (note.category ? '<span class="tag">' + escapeHtml(note.category) + '</span>' : '') + tags + '</div>',
            '<div class="note-actions">',
            '<button class="btn secondary note-action-btn save-note-edit" data-id="' + escapeHtml(note.id) + '" type="button" title="保存修改" aria-label="保存修改">💾</button>',
            '<button class="btn danger note-action-btn delete-note" data-id="' + escapeHtml(note.id) + '" type="button" title="删除" aria-label="删除">🗑</button>',
            '</div>',
            '</div>',
            '<textarea class="field note-editor" rows="1" data-id="' + escapeHtml(note.id) + '">' + escapeHtml(note.content || "") + '</textarea>',
            '</article>'
          ].join("");
        }).join("");
        adjustAllNoteEditors();
      }

      function openOverlay(overlay) {
        overlay.classList.add("show");
      }

      function closeOverlay(overlay) {
        overlay.classList.remove("show");
      }

      function loadSettingsForm() {
        var store = getConfigStore();
        var platform = store.currentPlatform || "deepseek";
        var cfg = store.platforms[platform];
        activeSettingsPlatform = platform;
        els.platformSelect.value = platform;
        els.apiUrl.value = cfg.apiUrl || "";
        els.modelName.value = cfg.modelName || "";
        els.apiKey.value = cfg.apiKey || "";
        els.aiEnabled.value = String(cfg.enabled !== false);
      }

      function saveCurrentSettingsFromForm() {
        var store = getConfigStore();
        var platform = activeSettingsPlatform || els.platformSelect.value;
        store.currentPlatform = platform;
        store.platforms[platform] = {
          apiUrl: els.apiUrl.value.trim(),
          modelName: els.modelName.value.trim(),
          apiKey: els.apiKey.value.trim(),
          enabled: els.aiEnabled.value === "true"
        };
        setConfigStore(store);
      }

      function switchPlatform() {
        saveCurrentSettingsFromForm();
        var store = getConfigStore();
        var platform = els.platformSelect.value;
        store.currentPlatform = platform;
        setConfigStore(store);
        activeSettingsPlatform = platform;
        var cfg = store.platforms[platform];
        els.apiUrl.value = cfg.apiUrl || "";
        els.modelName.value = cfg.modelName || "";
        els.apiKey.value = cfg.apiKey || "";
        els.aiEnabled.value = String(cfg.enabled !== false);
      }

      async function testAi() {
        saveCurrentSettingsFromForm();
        els.testAiBtn.disabled = true;
        els.testAiBtn.innerHTML = '<span class="loading-dot">测试中</span>';
        try {
          var text = await callAi([
            { role: "system", content: "请简短回答。" },
            { role: "user", content: "请回复：AI秘书连接成功" }
          ], 0);
          showToast("测试成功：" + truncate(text.trim(), 60));
        } catch (error) {
          showToast(error.message || "测试失败，请检查配置或浏览器跨域限制");
        }
        els.testAiBtn.disabled = false;
        els.testAiBtn.textContent = "测试AI";
      }

      function exportNotes() {
        var notes = getNotes();
        if (!notes.length) {
          showToast("当前没有可导出的笔记");
          return;
        }
        var lines = [];
        lines.push("# AI秘书笔记备份");
        lines.push("# 导出时间：" + nowBeijing());
        lines.push("# 共 " + notes.length + " 条笔记。可通过【导入TXT】恢复。");
        lines.push("");
        notes.forEach(function (note, index) {
          lines.push("----- 笔记 " + (index + 1) + " -----");
          lines.push("ID: " + (note.id || ""));
          lines.push("时间: " + (note.time || ""));
          if (note.category) lines.push("分类: " + note.category);
          if (note.tags && note.tags.length) lines.push("标签: " + note.tags.join(", "));
          if (note.createdAt) lines.push("创建: " + note.createdAt);
          if (note.updatedAt) lines.push("更新: " + note.updatedAt);
          lines.push("内容:");
          lines.push(note.content || "");
          lines.push("");
        });
        var blob = new Blob([lines.join("\n")], { type: "text/plain;charset=utf-8" });
        var url = URL.createObjectURL(blob);
        var link = document.createElement("a");
        link.href = url;
        link.download = "AI秘书笔记_" + nowBeijing().replace(/[:\s]/g, "-") + ".txt";
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
        showToast("已导出 TXT 备份");
      }

      function localOrganizeAllNotes(notes) {
        var groups = {};
        notes.forEach(function (note) {
          var category = note.category || detectCategory(note.content);
          if (!groups[category]) groups[category] = [];
          groups[category].push(note);
        });

        var lines = [];
        lines.push("AI整理全部事项");
        lines.push("整理时间：" + nowBeijing());
        lines.push("事项总数：" + notes.length);
        lines.push("");

        Object.keys(groups).forEach(function (category) {
          lines.push("【" + category + "】");
          groups[category].forEach(function (note, index) {
            lines.push((index + 1) + ". " + (note.time || "无时间") + "｜" + (note.content || "").replace(/\n+/g, " "));
          });
          lines.push("");
        });

        lines.push("重点汇总");
        notes.slice(0, 20).forEach(function (note, index) {
          lines.push((index + 1) + ". " + truncate((note.content || "").replace(/^【[^】]+】\s*/, ""), 120));
        });
        return lines.join("\n");
      }

      async function organizeAllNotes() {
        var notes = getNotes();
        if (!notes.length) {
          showToast("暂无事项可整理");
          return;
        }

        els.organizeOverlay.classList.add("show");
        document.body.classList.add("no-scroll");
        els.organizeContent.value = "正在整理全部事项...";
        els.aiOrganizeBtn.disabled = true;

        try {
          var text = await callAi([
            { role: "system", content: "你是AI秘书。请把用户的全部事项整理成一份详细、清晰、可直接复制使用的中文文本。要求：按主题分类，保留时间线、待办、决定、重点、风险和后续建议；不要编造；只输出整理后的正文。" },
            { role: "user", content: "当前北京时间：" + nowBeijing() + "\n\n全部事项JSON：\n" + JSON.stringify(notes) }
          ], 0.2);
          els.organizeContent.value = stripMarkdown(text.trim() || localOrganizeAllNotes(notes));
        } catch (error) {
          console.warn(error);
          els.organizeContent.value = stripMarkdown(localOrganizeAllNotes(notes));
          showToast("AI未调用成功，已使用本地规则整理");
        }

        els.aiOrganizeBtn.disabled = false;
      }

      function toggleOrganizeOverlay() {
        if (els.organizeOverlay.classList.contains("show")) {
          els.organizeOverlay.classList.remove("show");
          document.body.classList.remove("no-scroll");
          return;
        }
        organizeAllNotes();
      }

      async function copyOrganizedText() {
        var text = els.organizeContent.value.trim();
        if (!text) {
          showToast("没有可复制的内容");
          return;
        }
        try {
          await navigator.clipboard.writeText(text);
          showToast("已复制");
        } catch (error) {
          els.organizeContent.focus();
          els.organizeContent.select();
          document.execCommand("copy");
          showToast("已复制");
        }
      }

      function parseImportedText(text) {
        var imported = [];
        var blocks = text.split(/-----\s*笔记\s*\d+\s*-----/);
        blocks.forEach(function (block) {
          var trimmed = block.trim();
          if (!trimmed) return;
          var lines = trimmed.split(/\r?\n/);
          var note = { id: "", time: "", category: "", tags: [], content: "" };
          var contentStart = -1;
          for (var i = 0; i < lines.length; i++) {
            var line = lines[i];
            if (/^ID:\s*/.test(line)) note.id = line.replace(/^ID:\s*/, "").trim();
            else if (/^时间:\s*/.test(line)) note.time = line.replace(/^时间:\s*/, "").trim();
            else if (/^分类:\s*/.test(line)) note.category = line.replace(/^分类:\s*/, "").trim();
            else if (/^标签:\s*/.test(line)) note.tags = line.replace(/^标签:\s*/, "").split(/[,，]/).map(function (s) { return s.trim(); }).filter(Boolean);
            else if (/^创建:\s*/.test(line)) note.createdAt = line.replace(/^创建:\s*/, "").trim();
            else if (/^更新:\s*/.test(line)) note.updatedAt = line.replace(/^更新:\s*/, "").trim();
            else if (/^内容:\s*$/.test(line)) { contentStart = i + 1; break; }
          }
          if (contentStart >= 0) {
            note.content = lines.slice(contentStart).join("\n").trim();
          }
          if (note.content) {
            if (!note.id) note.id = uid();
            if (!note.time) note.time = nowBeijing();
            if (!note.category) note.category = detectCategory(note.content);
            if (!note.tags || !note.tags.length) note.tags = splitKeywords(note.content).slice(0, 8);
            if (!note.createdAt) note.createdAt = new Date().toISOString();
            if (!note.updatedAt) note.updatedAt = note.createdAt;
            imported.push(note);
          }
        });
        return imported;
      }

      function importNotesFromFile(file) {
        var reader = new FileReader();
        reader.onload = function () {
          try {
            var text = String(reader.result || "");
            var parsed = parseImportedText(text);
            if (!parsed.length) {
              showToast("未识别到可导入的笔记");
              return;
            }
            var existing = getNotes();
            var existingIds = {};
            existing.forEach(function (n) { existingIds[n.id] = true; });
            var added = 0;
            parsed.forEach(function (note) {
              if (!existingIds[note.id]) {
                existing.push(note);
                existingIds[note.id] = true;
                added++;
              }
            });
            existing.sort(function (a, b) { return (a.createdAt || "") < (b.createdAt || "") ? 1 : -1; });
            setNotes(existing);
            updateCount();
            renderManageList();
            showToast("已导入 " + added + " 条笔记（自动去重）");
          } catch (error) {
            showToast("导入失败：" + (error.message || error));
          }
        };
        reader.readAsText(file, "utf-8");
      }

      function autoResizeSearchInput() {
        els.searchInput.style.height = "auto";
        var styles = window.getComputedStyle(els.searchInput);
        var lineHeight = parseFloat(styles.lineHeight) || 24;
        var paddingTop = parseFloat(styles.paddingTop) || 0;
        var paddingBottom = parseFloat(styles.paddingBottom) || 0;
        var maxHeight = lineHeight * 5 + paddingTop + paddingBottom;
        var nextHeight = Math.min(els.searchInput.scrollHeight, maxHeight);
        els.searchInput.style.height = nextHeight + "px";
        els.searchInput.style.overflowY = els.searchInput.scrollHeight > maxHeight ? "auto" : "hidden";
      }

      function autoResizeNoteEditor(editor) {
        if (!editor) return;
        var styles = window.getComputedStyle(editor);
        var lineHeight = parseFloat(styles.lineHeight) || 28;
        var paddingTop = parseFloat(styles.paddingTop) || 0;
        var paddingBottom = parseFloat(styles.paddingBottom) || 0;
        var borderTop = parseFloat(styles.borderTopWidth) || 0;
        var borderBottom = parseFloat(styles.borderBottomWidth) || 0;
        var oneLineHeight = Math.ceil(lineHeight + paddingTop + paddingBottom + borderTop + borderBottom);
        editor.style.height = "auto";
        editor.style.height = Math.max(editor.scrollHeight + borderTop + borderBottom, oneLineHeight) + "px";
      }

      function adjustAllNoteEditors() {
        els.noteList.querySelectorAll(".note-editor").forEach(autoResizeNoteEditor);
        window.requestAnimationFrame(function () {
          els.noteList.querySelectorAll(".note-editor").forEach(autoResizeNoteEditor);
        });
      }

      function bindEvents() {
        els.saveBtn.addEventListener("click", handleSendClick);
        els.searchBtn.addEventListener("click", searchNotes);
        els.searchInput.addEventListener("input", autoResizeSearchInput);
        els.authSubmit.addEventListener("click", unlockApp);
        els.authPassword.addEventListener("keydown", function (event) {
          if (event.key === "Enter") unlockApp();
        });

        els.fullscreenBtn.addEventListener("click", function () {
          els.inputCard.classList.toggle("fullscreen-card");
          var isFullscreen = els.inputCard.classList.contains("fullscreen-card");
          document.body.classList.toggle("no-scroll", isFullscreen);
          els.fullscreenBtn.textContent = isFullscreen ? "×" : "⛶";
          els.fullscreenBtn.title = isFullscreen ? "退出全屏" : "全屏输入";
          els.noteInput.focus();
        });

        els.settingsBtn.addEventListener("click", function () {
          loadSettingsForm();
          openOverlay(els.settingsOverlay);
        });
        els.closeSettingsBtn.addEventListener("click", function () {
          closeOverlay(els.settingsOverlay);
        });
        els.settingsOverlay.addEventListener("click", function (event) {
          if (event.target === els.settingsOverlay) closeOverlay(els.settingsOverlay);
        });
        els.platformSelect.addEventListener("change", switchPlatform);
        els.saveSettingsBtn.addEventListener("click", function () {
          saveCurrentSettingsFromForm();
          showToast("AI配置已保存");
          closeOverlay(els.settingsOverlay);
        });
        els.testAiBtn.addEventListener("click", testAi);

        els.manageBtn.addEventListener("click", function () {
          renderManageList();
          openOverlay(els.manageOverlay);
          adjustAllNoteEditors();
        });
        els.closeManageBtn.addEventListener("click", function () {
          closeOverlay(els.manageOverlay);
        });
        els.aiOrganizeBtn.addEventListener("click", toggleOrganizeOverlay);
        els.copyOrganizeBtn.addEventListener("click", copyOrganizedText);
        els.closeOrganizeBtn.addEventListener("click", function () {
          els.organizeOverlay.classList.remove("show");
          document.body.classList.remove("no-scroll");
        });
        els.manageOverlay.addEventListener("click", function (event) {
          if (event.target === els.manageOverlay) closeOverlay(els.manageOverlay);
        });

        els.noteList.addEventListener("click", function (event) {
          var saveBtn = event.target.closest(".save-note-edit");
          var deleteBtn = event.target.closest(".delete-note");
          var notes = getNotes();

          if (saveBtn) {
            var id = saveBtn.getAttribute("data-id");
            var editor = els.noteList.querySelector('.note-editor[data-id="' + cssEscape(id) + '"]');
            notes = notes.map(function (note) {
              if (note.id === id) {
                note.content = editor.value.trim();
                note.time = nowBeijing();
                note.updatedAt = new Date().toISOString();
                note.category = detectCategory(note.content);
                note.tags = splitKeywords(note.content).slice(0, 8);
              }
              return note;
            });
            setNotes(notes);
            renderManageList();
            showToast("修改已保存");
          }

          if (deleteBtn) {
            var deleteId = deleteBtn.getAttribute("data-id");
            if (confirm("确定删除这条笔记吗？")) {
              setNotes(notes.filter(function (note) { return note.id !== deleteId; }));
              renderManageList();
              showToast("已删除");
            }
          }
        });
        els.noteList.addEventListener("input", function (event) {
          if (event.target.classList.contains("note-editor")) {
            autoResizeNoteEditor(event.target);
          }
        });

        els.results.addEventListener("click", function (event) {
          var btn = event.target.closest(".edit-result");
          if (!btn) return;
          renderManageList();
          openOverlay(els.manageOverlay);
          adjustAllNoteEditors();
          var id = btn.getAttribute("data-id");
          window.setTimeout(function () {
            var editor = els.noteList.querySelector('.note-editor[data-id="' + cssEscape(id) + '"]');
            if (editor) {
              editor.scrollIntoView({ behavior: "smooth", block: "center" });
              editor.focus();
            }
          }, 80);
        });

        els.importBtn.addEventListener("click", function () {
          els.importFile.value = "";
          els.importFile.click();
        });
        els.importFile.addEventListener("change", function (event) {
          var file = event.target.files && event.target.files[0];
          if (file) importNotesFromFile(file);
        });
        els.clearAllBtn.addEventListener("click", function () {
          if (confirm("确定清空全部笔记吗？此操作不可恢复。")) {
            setNotes([]);
            renderManageList();
            renderResults([]);
            showToast("已清空全部笔记");
          }
        });

        document.addEventListener("keydown", function (event) {
          if (event.key === "Escape") {
            closeOverlay(els.settingsOverlay);
            closeOverlay(els.manageOverlay);
            if (els.organizeOverlay.classList.contains("show")) {
              els.organizeOverlay.classList.remove("show");
              document.body.classList.remove("no-scroll");
            }
            if (els.inputCard.classList.contains("fullscreen-card")) {
              els.inputCard.classList.remove("fullscreen-card");
              document.body.classList.remove("no-scroll");
              els.fullscreenBtn.textContent = "⛶";
              els.fullscreenBtn.title = "全屏输入";
            }
          }
        });
      }

      bindEvents();
      initAuthGate();
      restoreEmergencyInput();
      autoResizeSearchInput();
      updateCount();
      updateAiHint();
    })();
  </script>
</body>
</html>
